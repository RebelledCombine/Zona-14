  description: Made of shit and sticks, but if you rummage through it in large piles of garbage, you may find something.
  suffix: Stalker, metal detector # Zona14: Stalker, metal detector
  components:
    - type: STWeight
      self: 6
    - type: Item
      size: Large
      shape:
        - 0,0,1,1
    - type: Sprite
      sprite: _Stalker/Objects/Tools/Trash_detectors/T1_trash_detector.rsi
      state: icon
    - type: TrashDetector
      searchTime: 40
      probability: 0.1

