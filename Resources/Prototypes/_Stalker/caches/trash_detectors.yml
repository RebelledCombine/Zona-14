# Zona14: translated Russian names/descriptions to English
- type: entity
  id: RandomTrashDetectorSpawner
  name: random garbage spawner (metal detector)
  suffix: Stalker
  parent: FlexibleMarker
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Other/Boxes/green_crate.rsi
      state: icon
    - type: RandomSpawner
      prototypes:
        # Tier 2 Crafting Materials
        - STCraftStandardPCBT2
        - STCraftTapeKitT2
        - STCraftHideT2
        - STCraftGlassT2
        - STCraftBirchPlankT2
        - STCraftPlasticFittingT2
        - STCraftSheetIronT2
        # values
        - IngotGold1
        - IngotSilver1
        - DrinkGoldenCup



      rarePrototypes:
        # Zona14: Tier 3 Crafting Materials (moved to rare)
        - STCraftMultilayerPCBT3
        - STCraftGlueKitT3
        - STCraftSturdyHideT3
        - STCraftQuartzCrystalT3
        - STCraftOakPlankT3
        - STCraftPlasticFittingT3
        - STCraftSheetBrassT3


        #  Weapons
        - STWeaponShotgunMP153
        - STWeaponShotgunMossbergM88
        - WeaponPistolStalkerAPS
        - KhattabkaGrenade
        - STWeaponRifleAKS74U
        - STWeaponRifleSaiga545
        - STWeaponSniperMosin
        - STWeaponSniperSKS

        # Utility Items
        - DoubleEmergencyOxygenTankStalkerFilled
        - ExtendedEmergencyOxygenTankFilledStalker
        - Binocularus1
      rareChance: 0.05 # Zona14: 5% rare item spawn chance
      chance: 1
      offset: 0.5

- type: entity
