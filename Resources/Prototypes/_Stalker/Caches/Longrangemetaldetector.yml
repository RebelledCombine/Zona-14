# Zona14: translated Russian names/descriptions to English
- type: entity
  id: longrangemetaldetector
  parent: BaseItem
  name: Long-range metal detector
  description: "A metal detector that's been modified to detect hidden caches from a distance."
  suffix: ST
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Devices/longrangemetaldetector.rsi
    layers:
      - state: icon
      - state: screen
        shader: unshaded
        visible: false
        map: ["enum.ToggleableVisuals.Layer"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: ItemToggle
  - type: ProximityBeeper
  - type: ProximityDetector
    range: 30
    components:
    - type: Rangedetector # reacts to AI eye, intentional
  - type: Beeper
    isMuted: true
    minBeepInterval: 0.15
    maxBeepInterval: 2
    beepSound:
      path: "/Audio/Items/locator_beep.ogg"
      params:
        maxDistance: 1
        volume: -8
  - type: Craftable

- type: entity
  parent: BaseItem
  id: longrangemetaldetectorBox
  name: Cache box
  description: Cache Crate
  components:
    - type: Item
      size: Large
      shape:
        - 0,0,6,6
    - type: Sprite
      sprite: _Stalker/Structures/Furniture/carton_box.rsi
      state: kb2
    - type: Icon
      sprite: _Stalker/Structures/Furniture/carton_box.rsi
      state: kb2
    - type: SpawnItemsOnUse
      items:
        - id: MedkitAI2
          prob: 0.2
        - id: MedkitMilitary
          prob: 0.1
        - id: WristwatchGold
          prob: 0.005
        - id: STWeaponShotgunAnomalyToz34
          prob: 0.02
        - id: STWeaponSMGVZ61
          prob: 0.02
        - id: ClothingNeckBling
          prob: 0.02
        - id: STWeaponShotgunSawedOfAnomaly
          prob: 0.02
        - id: SilverRingGem
          prob: 0.07
        - id: Roubles1000
          prob: 0.5
        - id: ZoneArtifactBattery
          prob: 0.1
        - id: ZoneArtifactBaloon
          prob: 0.02
        - id: Roubles2000
          prob: 0.2
        - id: Roubles5000
          prob: 0.05
        - id: DG05SmokeGrenade
          prob: 0.2
        - id: IpritGrenadeStalker
          prob: 0.2
        - id: RGD5Grenade
          prob: 0.1
      sound:
        path: /Audio/Effects/unwrap.ogg

- type: lightCraftingRecipe
  id: Tainik
  results:
  - longrangemetaldetectorBox
  steps:
    firstIngredient: longrangemetaldetectorCrate
    secondIngredient: AAAAStalkerLopata
    keepSecond: true
    exactSecond: false
    time: 20

- type: lightCraftingRecipe
  id: Tainikgrass
  results:
  - longrangemetaldetectorBox
  steps:
    firstIngredient: longrangemetaldetectorCrategrass
    secondIngredient: AAAAStalkerLopata
    keepSecond: true
    exactSecond: false
    time: 20

- type: entity
  id: longrangemetaldetectorCrate
  parent: BaseStructure
  name: Geocache (Invisible)
  description: Buried Stash
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Sprite
    noRot: true
    sprite: _Stalker/Objects/Decoration/invisible.rsi
    layers:
      - state: invisible
  - type: Craftable
  - type: Rangedetector
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - SubfloorMask
  - type: Stealth
  - type: Tag
    tags:
      - HideContextMenu

- type: entity
  name: invisible cache spawner (25%)
  id: longrangemetaldetectorCrateSpawner25
  parent: MarkerBase
  components:
    - type: Sprite
      layers:
        - state: green
        - sprite: _Stalker/Structures/Furniture/carton_box.rsi
          state: kb1
    - type: RandomSpawner
      prototypes:
        - longrangemetaldetectorCrate
      chance: 0.25

