- type: storeContract
  id: trade_contract_ZoneArtifactVyvert
  name: Obtain Vyvert
  description: "Need a Vyvert for the ointment. The respected Frog's back hurts."
  difficulty: Easy
  targets:
  - id: ZoneArtifactVyvert
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

