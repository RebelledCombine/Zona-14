- type: storeContract
  id: trade_contract_delivery_BoxCrate
  name: Deliver crate to buyer
  description: "Need to deliver the crate to the buyer. Don't ask questions."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    targetPrototype: BoxCrateQests
    proofPrototype: NcTradeContractProofDeliveryReceipt
    spawnAtStore: true
    dropoffPointTag: TradeContractDeliveryBolotoEasy
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: BoxCrateQests
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

- type: storeContract
  id: trade_contract_recovery_BoxCrate
  name: Retrieve crate from swamp
  description: The client never picked up their cargo, and now a pack of mature boars is lurking there. Head to the location, deal with the boars and bring the crate back to the vending machine.
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    spawnPointTag: TradeContractDeliveryBolotoEasy
    targetPrototype: BoxCrateQests
    allowStoreWorldTurnIn: true
    guardPrototype: MobMutantOldBoar
    guardCount: 3
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: BoxCrateQests
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

