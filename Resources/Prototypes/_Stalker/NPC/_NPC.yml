# Zona14: translated Russian names/descriptions to English
#NPC Base please don`t touch it - Start
- type: entity
  save: true
  id: NPCDoll
  abstract: true
  placement:
    mode: SnapgridCenter
  suffix: NPC
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _Stalker/NPC/
    drawdepth: 4
  - type: Fixtures
    fixtures: # Stalker-TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.5
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Body
    prototype: Human
    requiredLegs: 2
  - type: Internals
  # - type: Inventory
  # - type: InventorySlots
  - type: Grammar
    attributes:
      proper: true
  - type: Tag
  - type: ContainerContainer
    containers: # Stalker-TODO: Figure out why tests don't like it being empty
      body_root_part: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
  - type: Vocalizer
    hideChat: true
#NPC Base please don`t touch it - End

#NPC Train Station - Start
- type: entity
  parent: NPCDoll
  id: NPCAlexBaron
