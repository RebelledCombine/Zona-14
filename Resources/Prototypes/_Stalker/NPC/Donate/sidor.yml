  - type: AiNpc
    canChat: true # Enabled chat for better interaction
    canPunish: true
    canGiveItems: false
    canTakeItems: false
    canOfferQuests: true
    enabled: true
    sponsorOnly: true
    maxHistoryPerPlayer: 500
    interactionRange: 3
