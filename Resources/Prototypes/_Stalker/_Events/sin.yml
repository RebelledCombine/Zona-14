# Zona14: translated Russian names/descriptions to English
- type: entity
  name: glowing notification for sin
  id: GrehAlarmLightingnorth
  suffix: north # Zona14: север
  parent: MarkerBase
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    layers:
      - state: blue
  - type: SinLightPoint
    side: church # Zona14: церковь
  - type: PointLight
    color: red
    energy: 0
    radius: 1.3
    castShadows: false

