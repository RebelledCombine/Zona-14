# Zona14: translated Russian names/descriptions to English
- type: entity
  id: StalkerSinMobControllerOffAction
  name: Stop attack
  description: Makes all nearby people unattackable by mutants. Humans will be attacked by mutants again, either after 2 minutes or if this is cancelled.
  suffix: ST
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 1
    checkCanInteract: false
    checkConsciousness: false
    icon:
      sprite: _Stalker/Interface/Actions/sin.rsi
      state: off
  - type: InstantAction
    event: !type:StalkerSinMobControllerOffActionEvent

- type: entity
  id: StalkerSinMobControllerOnAction
  name: Into Battle
  description: Tells all nearby specimens to continue attacking.
  suffix: ST
  categories: [ HideSpawnMenu ]
  components:
    - type: Action
      useDelay: 1
      checkCanInteract: false
      checkConsciousness: false
      icon:
        sprite: _Stalker/Interface/Actions/sin.rsi
        state: on
    - type: InstantAction
      event: !type:StalkerSinMobControllerOnActionEvent
