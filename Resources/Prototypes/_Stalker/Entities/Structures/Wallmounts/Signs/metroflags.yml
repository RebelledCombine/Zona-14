# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseSign
  id: MetroFlagBase
  abstract: true
  components:
  - type: WallMount
    arc: 360
  - type: Sprite
    drawdepth: OverMobs
    sprite: _Stalker/Structures/Wallmounts/metroflags.rsi
    snapCardinals: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 9999
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/poster_broken.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          PosterBroken:
            min: 1
            max: 1
        offset: 0

- type: entity
  parent: MetroFlagBase
  id: MetroFlagAnarchy
  name: flag of the Gulyai-Polye Republic
  description: The Anarchists declared themselves an independent force at the end of the war between the Red Line and the Hanseatic Commonwealth of Ring Line Stations.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: AnarhyFlag

- type: entity
  parent: MetroFlagBase
  id: MetroFlagAnarchy2
  name: flag of the Gulyai-Polye Republic
  description: The Anarchists declared themselves an independent force at the end of the war between the Red Line and the Hanseatic Commonwealth of Ring Line Stations.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: Anarhy2Flag

- type: entity
  parent: MetroFlagBase
  id: MetroFlagBandits
  name: Bandits flag
  description: Not bad guys and not good guys all at the same time.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: BanditFlag

- type: entity
  parent: MetroFlagBase
  id: MetroFlagBaumanskyAlliance
  name: flag of the Bauman Alliance
  description: For example, in our Moscow, people said there was a real force - the Baumanites. That is, in metro stations and underground bunkers near the Bauman School, which had long become a university, gathered not scientists but engineers, and they formed their own technocratic commune. Unlike the "clean" university folk, the Baumanites engaged in real engineering and applied work, repeatedly went to the surface, and waged an unseen struggle with the "university people" for power. Then again, those were only rumors. We had been living for an eternity in a world built on rumors, and over that eternity we had learned not to trust them.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: BaumanskyAliensFlag

- type: entity
  parent: MetroFlagBase
  id: MetroFlagEmeraldTown
  name: flag of the Emerald City
  description: "An intellectual? - daydream about the Emerald City while wearing out your trousers in Polis. A handy system, isn't it."
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: EmeraldTownFlag

- type: entity
  parent: MetroFlagBase
  id: MetroFlagHanza1
  name: Hansa flag
  description: Hansa was the name of the commonwealth of stations on the Ring Line.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: Hanza1Flag

- type: entity
  parent: MetroFlagBase
  id: MetroFlagHanza2
  name: Hansa flag
  description: Hansa was the name of the commonwealth of stations on the Ring Line.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: Hanza2Flag

- type: entity
  parent: MetroFlagBase
  id: MetroFlagRedLine
  name: flag of the Red Line
  description: The Sokolnicheskaya Line was always special. Glance at the map and your eye is drawn to it at once. First, it is straight as an arrow. Second, it is bright red on every map. And the station names too - Krasnoselskaya, Krasnye Vorota, Komsomolskaya, Lenin Library, and Lenin Hills again. Whether because of names like these, or for some other reason, everyone nostalgic for the glorious past was drawn to that line.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: RedLineFlag

- type: entity
  parent: MetroFlagBase
  id: MetroFlagSparta
  name: Sparta flag
  description: Imagine that the entire metro is a human organism... I am a macrophage. That is my profession. Any threat serious enough to endanger the whole organism must be eliminated. That is my job. I am a hunter. A macrophage.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: SpartaFlag

- type: entity
