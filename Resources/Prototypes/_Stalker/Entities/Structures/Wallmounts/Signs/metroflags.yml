  id: MetroFlagVDNH1
  name: VDNKh flag
  description: The Botanical Garden and VDNKh have grown together into a single dark, impassable thicket, amid which rise the peeling white domes and roofs of the Exhibition pavilions.
  suffix: ST, Mapping
  components:
  - type: Sprite
    state: VDNH1Flag

