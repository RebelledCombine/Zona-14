# Zona14: translated Russian names/descriptions to English
- type: entity
  id: StalkerRail
  name: rails
  description: Old railway tracks, the sleepers of which are already rotten, and the metal is rusted.
  suffix: ST, Mapping
  placement:
    mode: AlignTileAny
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Stalker/Structures/Railroad/rails.rsi
    drawdepth: FloorTiles
    layers:
      - state: rail
        scale: 0.6, 0.6
  - type: Transform
    anchored: true
  # - type: Physics
    # bodyType: Static
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepCatwalk
      params:
        volume: 8

# Zona14: TANKER WAGONS

- type: entity
  id: StalkerCargoTank
  parent: BaseStructure
  name: Wagon with tank
  description: A type of railway rolling stock for the transportation of liquids, including oil and its refined products, chemically active and corrosive liquid substances.
  suffix: ST, Mapping
  placement:
    mode: AlignTileAny
  components:
  - type: Sprite
    sprite: _Stalker/Structures/Railroad/Train.rsi
    layers:
      - state: cargo_tank
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,-1.0,1.5,1.0"
        density: 5000
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: Appearance

