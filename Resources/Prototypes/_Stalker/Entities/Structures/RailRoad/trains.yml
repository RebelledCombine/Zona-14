# Zona14: DIESEL LOCOMOTIVES

- type: entity
  id: StalkerPassHead
  parent: BaseStructure
  name: Diesel locomotive M62
  description: Soviet mainline six-axle diesel locomotive, originally developed for operation in the CMEA countries. It has been produced by the Lugansk Diesel Locomotive Plant since 1965.
  suffix: ST, Mapping
  placement:
    mode: AlignTileAny
  components:
  - type: Sprite
    sprite: _Stalker/Structures/Railroad/Train.rsi
    layers:
