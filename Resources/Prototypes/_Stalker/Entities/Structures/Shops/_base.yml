# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseStructure
  id: StalkerShop
  name: Torgomat, General
  description: Now he also buys!
  suffix: ST, Mapping, general # Zona14: ST, Mapping, general
  components:
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.35,0.25,0.35"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Rotatable
  - type: Sprite
    drawdepth: Objects
    sprite: _Stalker/Structures/Machines/VendingMachines/torgomat_red.rsi
    layers:
    - state: torgomat_red
      map: [ "enum.ConstructionVisuals.Layer" ]
    - state: normal-unshaded
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: ActivatableUI
    key: enum.ShopUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.ShopUiKey.Key:
        type: ShopBoundUserInterface
  - type: Shop
    moneyId: Roubles
    shopPresetId: NpcSidor

