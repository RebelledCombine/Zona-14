# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STBaseFenceMetal
  id: STFenceMetalBroken
  name: broken chain link fence
  description: Someone got real mad at an inanimate object.
  components:
  - type: Sprite
    layers:
    - state: straight_broken
    - state: electrified
      sprite: Effects/electricity.rsi
      map: ["enum.ElectrifiedLayers.Sparks"]
      shader: unshaded
      visible: false
  - type: Physics
    canCollide: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.10,-0.5,0.10,0.5"
        density: 1000
        mask:
        - FullTileMask
        layer:
        - TableLayer
  - type: InteractionPopup
    interactSuccessString: fence-rattle-success
    messagePerceivedByOthers: fence-rattle-success
    interactSuccessSound:
      collection: FenceRattle

- type: entity
  parent: StalkerFenceMetalStraight
  id: StalkerFenceMetalStraightPerimetr
  name: Perimeter Barbed Wire
  description: Material that is used to fence and protect an area from unauthorized entry. This thorn can be snacked on with a bolt cutter.
  suffix: ST, Mapping, traight
  components:
  - type: Craftable

- type: entity
  parent: StalkerFenceMetalBroken
  id: StalkerFenceMetalBrokenPerimetr
  name: Barbed Wire
  description: Material that is used to fence and protect an area from unauthorized entry. This part was bitten off with a bolt cutter, it can be restored.
  suffix: ST, Mapping
  components:
  - type: Craftable
