# Zona14: translated Russian names/descriptions to English
- type: entity
  description: "If you want to get cancer, might as well do it in style."
  id: STBaseSmokable
  parent: BaseItem
  abstract: true
  components:
  - type: Smokable
  - type: Sprite
  - type: Appearance
  - type: BurnStateVisuals
  - type: Tag
    tags:
    - Trash
  - type: SpaceGarbage
  - type: StaticPrice
    price: 5
  - type: InjectableSolution
    solution: smokable

# Base for all cigars and cigarettes.
- type: entity
  parent: STBaseSmokable
  id: STBaseCigar
  abstract: true
  components:
  - type: Smokable
    exposeTemperature: 1173.15
  - type: Cigar
  - type: Tag
    tags:
    - Trash
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
        reagents:
          - ReagentId: Nicotine
            Quantity: 10


- type: entity
  id: CigPackMarlboro
  parent: CigPackBase
  name: Marlboro
  description: "The company's blenders prepare smoking mixtures based on dozens of tobacco varieties. The leaves are carefully selected by professional tasters. Raw materials are subjected to long-term fermentation. In short, premium cigarettes."
  suffix: Stalker, Marlboro # Zona14: Stalker, мальборо
  components:
  - type: STWeight
    self: 0.1
  - type: Sprite
    sprite: _Stalker/Cigarettes/Packs/marlboro.rsi
  - type: Item
    sprite: _Stalker/Cigarettes/Packs/marlboro.rsi

- type: entity
  id: CigPackSuka
  parent: CigPackBase
  name: Suka
  description: Bitch cigarettes - only for the most powerful bandits!
  suffix: Stalker, damn # Zona14: Stalker, сука
  components:
  - type: STWeight
    self: 0.1
  - type: Sprite
    sprite: _Stalker/Cigarettes/Packs/suka.rsi
  - type: Item
    sprite: _Stalker/Cigarettes/Packs/suka.rsi

- type: entity
  id: CigPackKosmos
  parent: CigPackBase
  name: Kosmos
  description: The most common cigarettes of the USSR! They were produced by almost all tobacco factories in the Union and, remarkably, despite the same design, the cigarettes differed in both taste and quality.
  suffix: Stalker, space # Zona14: Stalker, космос
  components:
  - type: STWeight
    self: 0.1
  - type: Sprite
    sprite: _Stalker/Cigarettes/Packs/kosmos.rsi
  - type: Item
    sprite: _Stalker/Cigarettes/Packs/kosmos.rsi
