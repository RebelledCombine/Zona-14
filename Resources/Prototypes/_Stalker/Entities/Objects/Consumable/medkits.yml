# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseHealingItem
  abstract: true
  id: STBaseHealingItem
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 5
  - type: Healing
    selfHealPenaltyMultiplier: 2.5
  - type: Item
    size: Tiny
  - type: STWeight
    self: 0.2

- type: entity
  parent: STBaseHealingItem
  id: BaseMedkit
  suffix: Stalker
  abstract: true
  components:
  - type: Tag
    tags:
      - Medkit
  - type: Sprite
    sprite: _Stalker/Objects/medicine.rsi
  - type: RepositoryItem
    categoryName: Medicine # Zona14: Медицина
  - type: Healing
    damageContainers:
      - Biological
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
  - type: Stack

- type: entity
  parent: [STBaseHealingItem, Brutepack]
  id: STBrutepack
  suffix: ST, T1
  name: Bruise Kit
  description: Compact Injury Treatment Kit containing a cooling pack and anti-inflammatories. It helps relieve pain, reduce swelling and speed up the healing of bruises. Useful after skirmishes with mutants or an unfortunate fall.
  components:
  - type: Healing
    damageContainers:
      - Biological
    damage:
      groups:
        Brute: -24
    delay: 4
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
  - type: Stack
    stackType: STBrutepack
    count: 10
  - type: Item
    sprite: _Stalker/Objects/medicine.rsi
    heldPrefix: brutepack
  - type: Sprite
    sprite: _Stalker/Objects/medicine.rsi
    state: brutepack

- type: stack
  id: STBrutepack
  name: stack-brutepack
  icon:
    sprite: _Stalker/Objects/medicine.rsi
    state: brutepack
  spawn: STBrutepack
  maxCount: 10

- type: entity
  parent: STBaseHealingItem
  id: STTourniquet
  name: tourniquet
  description: Applies strong pressure to a limb to block blood flow; if used carelessly may tear skin or leave bruises.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Specific/Medical/Other
      state: esmarch
      scale: 0.6, 0.6
    - type: Healing
      damageContainers:
      - Biological
      damage:
        groups:
          Brute: 1 # Tourniquets HURT!
        types:
          Asphyxiation: 2 # Essentially Stopping all blood reaching a part of your body
      bloodlossModifier: -20 # Tourniquets stop bleeding
      delay: 2
      healingBeginSound:
        path: "/Audio/Items/Medical/brutepack_begin.ogg"
      healingEndSound:
        path: "/Audio/Items/Medical/brutepack_end.ogg"

- type: entity
  parent: STBrutepack
  id: STBrutepackSera
  suffix: ST, Skin, T1 # Zona14: ST, Скин, T1
  name: jar of ointment
  description: A foul-smelling ointment made from ground Larkspur root and the crushed eye of Flesh is great for treating bruises.
  components:
  - type: Stack
    stackType: STBrutepackSera
    count: 10
  - type: Item
    sprite: _Stalker/Objects/Counsumable/Medicine/brutepacksera.rsi # Stalker-TODO: Need an inhand sprite for this item
  - type: Sprite
    sprite: _Stalker/Objects/Counsumable/Medicine/brutepacksera.rsi
    state: icon

- type: stack
  id: STBrutepackSera
  name: stack-st-brutepack-sera
  icon:
    sprite: _Stalker/Objects/Counsumable/Medicine/brutepacksera.rsi
    state: icon
  spawn: STBrutepackSera
  maxCount: 10

- type: entity
  parent: [STBaseHealingItem, Ointment]
  id: STOintment
  suffix: ST, T1
  name: ointment
  description: All-purpose treatment for minor wounds, burns, and irritations. It accelerates tissue regeneration and protects against infections. It is applied in a thin layer, used sparingly. It has a faint but specific smell, characteristic of pharmacy drugs.
  components:
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        Cold: -3
        Heat: -8
        Caustic: -4
        Shock: -4
    delay: 4
  - type: Stack
    stackType: STOintment
    count: 10
  - type: Item
    sprite: _Stalker/Objects/medicine.rsi
    heldPrefix: ointment
  - type: Sprite
    sprite: _Stalker/Objects/medicine.rsi
    state: ointment

- type: stack
  id: STOintment
  name: stack-ointment
  icon:
    sprite: _Stalker/Objects/medicine.rsi
    state: ointment
  spawn: STOintment
  maxCount: 10

- type: entity
  parent: [STBaseHealingItem, Ointment]
  id: STOintmentGood
  suffix: ST, T3
  name: antibiotic ointment
  description: An expensive ointment from a known producer, contains antibiotic, numbs, disinfects, and effectively heals burns of all kinds.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Medicine/GoodOinment.rsi
  - type: Item
    sprite: _Stalker/Objects/Medicine/GoodOinment.rsi
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        Cold: -25
        Heat: -25
        Caustic: -15
        Shock: -15
    delay: 4
  - type: Stack
    stackType: STOintmentGoodstack
    count: 4

- type: stack
  id: STOintmentGoodstack
  name: stack-st-ointment-good
  icon:
    sprite: _Stalker/Objects/Medicine/GoodOinment.rsi
    state: ointment
  spawn: STOintmentGood
  maxCount: 4

- type: entity
  parent: STOintment
  id: STOintmentSera
  suffix: ST, Skin, T1 # Zona14: ST, Скин, T1
  name: bitter ointment
  description: A disgusting, viscous goo with a horrible smell made from Boar liver pomace, but it is still surprisingly good at healing chemical and radiation burns. It is used by seraphim, among other things, as a means of combating skin cancer.
  components:
  - type: Stack
    stackType: STOintmentSera
    count: 10
  - type: Item
    sprite: _Stalker/Objects/Counsumable/Medicine/ointmentsera.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Counsumable/Medicine/ointmentsera.rsi
    state: icon

- type: stack
  id: STOintmentSera
  name: stack-st-ointment-sera
  icon:
    sprite: _Stalker/Objects/Counsumable/Medicine/ointmentsera.rsi
    state: icon
  spawn: STOintmentSera
  maxCount: 10

- type: entity
  parent: [STBaseHealingItem, Gauze]
  id: STGauze
  suffix: ST, T1
  name: bandage
  description: Used to stop bleeding and dress wounds. It effectively reduces the risk of infection if applied in time. A must-have item in survival, it takes up little space, but can save lives in extreme conditions.
  components:
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        Slash: -0
        Piercing: -0
    bloodlossModifier: -10
    delay: 2.5
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
  - type: Stack
    stackType: STGauze
    count: 5
  - type: Item
    sprite: _Stalker/Objects/medicine.rsi # Stalker-TODO: Need an inhand sprite for this item
  - type: Sprite
    sprite: _Stalker/Objects/medicine.rsi
    state: gauze
  - type: Craftable

- type: stack
  id: STGauze
  name: stack-gauze
  icon:
    sprite: _Stalker/Objects/medicine.rsi
    state: gauze
  spawn: STGauze
  maxCount: 5

- type: entity
  parent: STGauze
  id: STGauzeBarbaris
  suffix: ST, T1
  name: barberry-soaked bandage
  description: The pulp of Zone barberry has strong antiseptic properties; stalkers use it to soak bandages, which lets them effectively fight infections and speeds up wound healing.
  components:
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        Slash: -2
        Piercing: -2
    bloodlossModifier: -17
    delay: 3
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
  - type: Stack
    stackType: STGauzeBarbaris
    count: 5
  - type: Item
    sprite: _Stalker/Objects/medicine.rsi
  - type: Sprite
    sprite: _Stalker/Objects/medicine.rsi
    state: gauzebarbaris

- type: stack
  id: STGauzeBarbaris
  name: stack-st-gauze-barbaris
  icon:
    sprite: _Stalker/Objects/medicine.rsi
    state: gauzebarbaris
  spawn: STGauzeBarbaris
  maxCount: 5

- type: entity
  parent: STGauze
  id: STGauzeUniversal
  suffix: ST, T1
  name: universal-salve-soaked bandage
  description: A universal salve made from a mixture of pulp from various Zone berries and herbs has powerful antiseptic properties and promotes the rapid healing of various wounds.
  components:
  - type: Healing
    damageContainers:
      - Biological
    damage:
      types:
        Heat: -10
        Cold: -5
        Shock: -5
        Caustic: -10
        Slash: -5
        Blunt: -5
    bloodlossModifier: -2
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
  - type: Stack
    stackType: STGauzeUniversal
    count: 5
  - type: Item
    sprite: _Stalker/Objects/medicine.rsi
  - type: Sprite
    sprite: _Stalker/Objects/medicine.rsi
    state: cast

- type: stack
  id: STGauzeUniversal
  name: stack-st-gauze-barbaris
  icon:
    sprite: _Stalker/Objects/medicine.rsi
    state: cast
  spawn: STGauzeUniversal
  maxCount: 5

- type: entity
  parent: STGauze
  id: STGauzeSera
  suffix: ST, Skin, T1 # Zona14: ST, Скин, T1
  name: piece of rag
  description: "Whether it's boiled cloth or an old bandage found in the rubble, those living in the Seraphim zone use this to bandage wounds."
  components:
  - type: Stack
    stackType: STGauzeSera
    count: 5
  - type: Item
    sprite: _Stalker/Objects/Counsumable/Medicine/gausesera.rsi # Stalker-TODO: Need an inhand sprite for this item
  - type: Sprite
    sprite: _Stalker/Objects/Counsumable/Medicine/gausesera.rsi
    state: icon

- type: stack
  id: STGauzeSera
  name: stack-st-gauze-sera
  icon:
    sprite: _Stalker/Objects/Counsumable/Medicine/ointmentsera.rsi
    state: icon
  spawn: STGauzeSera
  maxCount: 5

- type: entity
  parent: BaseMedkit
  id: MedkitAI2
  name: AI-2 first aid kit
  suffix: ST, T2
  description: Regular Military Universal First Aid Kit. With its help, you can cope with injuries such as cuts, burns, bullet and shrapnel wounds, poisoning and others. Includes a standard set of medicines. Easy to use.
  components:
  - type: RepositoryItem
    categoryName: Medicine # Zona14: Медицина
  - type: Sprite
    sprite: _Stalker/Objects/Medicine/medkit/ai1.rsi
    state: medkit-1
  - type: Item
    sprite: _Stalker/Objects/Medicine/medkit/ai1.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Healing
    damage:
      types:
        Piercing: -20
        Blunt: -15
        Slash: -20
        Radiation: -10
        Compression: -15
  - type: Stack
    stackType: MedkitAI2
    count: 4

- type: stack
  id: MedkitAI2
  name: stack-medkit-ai-2
  icon:
    sprite: "_Stalker/Objects/Medicine/medkit/ai1.rsi"
    state: medkit-1
  spawn: MedkitAI2
  maxCount: 4

- type: entity
  parent: MedkitAI2
  id: MedkitAI2Sera
  suffix: ST, Skin, T2 # Zona14: ST, Скин, T2
  name: Homemade Medicine Kit
  description: A cloth-wrapped set of different jars, flasks, and powders, as well as old surgical instruments. It is used by seraphim for the thorough treatment of both deep bites of mutants and bullet and shrapnel wounds. In comparison with modern medicine, it is an extremely impractical way of providing medical care to the wounded, and nevertheless, its creators use it, having no other alternative.
  components:
  - type: Stack
    stackType: MedkitAI2Sera
    count: 4
  - type: Item
    sprite: _Stalker/Objects/Counsumable/Medicine/ai2sera.rsi # Stalker-TODO: Need an inhand sprite for this item
  - type: Sprite
    sprite: _Stalker/Objects/Counsumable/Medicine/ai2sera.rsi
    state: icon

- type: stack
  id: MedkitAI2Sera
  name: stack-medkit-ai-2-sera
  icon:
    sprite: _Stalker/Objects/Counsumable/Medicine/ai2sera.rsi
    state: icon
  spawn: MedkitAI2Sera
  maxCount: 4

