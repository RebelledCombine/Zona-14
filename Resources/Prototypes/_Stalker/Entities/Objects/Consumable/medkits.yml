- type: entity
  id: STpillboxbase
  parent: BaseStorageItem
  abstract: true
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 10
  - type: Item
    size: Tiny
  - type: Storage
    grid:
    - 0,0,4,1
    quickInsert: true
    areaInsert: true
    areaInsertRadius: 1
    storageInsertSound: /Audio/Effects/pill_insert.ogg
    storageRemoveSound: /Audio/Effects/pill_remove.ogg
    whitelist:
      tags:
      - Pill
  - type: Dumpable
  - type: Sprite
    layers:
      - map: [ base ]
        state: icon
  - type: Tag
    tags:
    - PillCanister
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: icon-open }
          False: { state: icon }
  - type: Appearance

- type: entity
  name: iodoradine pack
  description: A pack of iodoradine tablets, each tablet weighs 10 grams. Helps remove radionuclides from the body. Take up to 30 grams at a time!
  parent: STpillboxbase
  id: STPillboxAntirad
  suffix: ST, T1
  components:
  - type: StorageFill
    contents:
    - id: antiradpill
      amount: 10
  - type: Sprite
    sprite: _Stalker/Objects/Medicine/pillboxes/antirad.rsi
    state: icon
  - type: Item
    sprite: _Stalker/Objects/Medicine/pillboxes/antirad.rsi

- type: entity
  name: probudophilin pack
  description: A pack of probudophilin tablets, each tablet weighs 10 grams. Helps restore circulation and breathing. Take up to 20 grams at a time!
  parent: STpillboxbase
  id: STPillboxProbud
  suffix: ST, T2
  components:
  - type: StorageFill
    contents:
    - id: wakeuppill
      amount: 10
  - type: Sprite
    sprite: _Stalker/Objects/Medicine/pillboxes/probud.rsi
    state: icon
  - type: Item
    sprite: _Stalker/Objects/Medicine/pillboxes/probud.rsi

- type: entity
  name: fuflomycin pack
  description: A pack of fuflomycin tablets, each tablet weighs 10 grams. Helps convince yourself of your invulnerability to psi-waves. Take up to 10 grams at a time!
  parent: STpillboxbase
  id: STPillboxShiza
  suffix: ST, T5
  components:
  - type: StorageFill
    contents:
    - id: shizopill
      amount: 10
  - type: Sprite
    sprite: _Stalker/Objects/Medicine/pillboxes/shizabox.rsi # Stalker-TODO: Need an inhand sprite for this item
  - type: Item
    sprite: _Stalker/Objects/Medicine/pillboxes/shizabox.rsi
