- type: entity
  parent: BaseMedkit
  id: MedkitScience
  suffix: ST, T3
  name: Scientific first aid kit
  description: A medical kit designed specifically for the Site. The kit is selected both to combat injuries and to remove radionuclides from the body. It prevents the development of radiation sickness, and also reduces the dose of accumulated radiation.
