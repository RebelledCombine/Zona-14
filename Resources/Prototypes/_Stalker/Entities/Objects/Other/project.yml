# Zona14: translated Russian names/descriptions to English
### PROJECT ###


- type: entity
  parent: ClothingHeadsetGrey
  id: ClothingHeadsetProject
  name: A.A.A.
  description: Algorithm Active. Cannot deactivate. Obey the Algorithm.
  components:
    - type: ContainerContainer
      containers:
        key_slots: !type:Container
    - type: ContainerFill
      containers:
        key_slots:
        - EncryptionKeyPROJECT
    - type: Headset
    - type: EncryptionKeyHolder
      keySlots: 1
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/Ears/code_project_garniture.rsi
    - type: Item
      size: Small
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/Ears/code_project_garniture.rsi
      slots:
      - ears
    - type: Armor
      armorClass: 0
      modifiers:
        flatReductions:
          Psy: 5
    - type: Unremoveable

- type: entity
  parent: BaseItem
  id: EncryptionKeyPROJECT
  name: A.A.A. Chip
  description: Algorithm inactive. Reactivation impossible. Do not obey the Algorithm.
  components:
  - type: EncryptionKey
    channels:
    - Project
    - Project1
    - Project2
    - Project3
    defaultChannel: Project
  - type: Sprite
    sprite: _Stalker/Objects/Other/crypt_project.rsi
    state: icon

- type: radioChannel
  id: Project3
  name: channel-name-stalker-project-3
  keycode: '4'
  frequency: 56573
  color: "#ff0000"
  longRange: true

- type: radioChannel
  id: Project2
  name: channel-name-stalker-project-2
  keycode: '5'
  frequency: 75923
  color: "#ffff00"
  longRange: true

- type: radioChannel
  id: Project1
  name: channel-name-stalker-project-1
  keycode: '6'
  frequency: 25858
  color: "#04ff00"
  longRange: true

- type: radioChannel
  id: Project
  name: channel-name-stalker-project
  keycode: '7'
  frequency: 94384
  color: "#00e1d7"
  longRange: true

- type: entity
  parent: IDCardStandard
  id: PROJECTIDCard
  name: Algorithm Keycard
  description: The Algorithm is eternal!
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Misc/id_cards.rsi
    layers:
    - state: project
  - type: Access
    tags:
    - Project

- type: entity
  parent: BaseItem
  id: ProjectPDA
  name: "PDA &#@*$!^"
  suffix: Project
  description: "&#@*$!^ Error Screen, A problem has been detected and &#@*$!^ has been shut down to prevent damage to your device. Technical Information: STOP: 0x0000008E (0xC0000005, 0x804E3B58, 0xBA4C7B28, 0x00000000) KERNEL_STACK_INPAGE_ERROR. Refer to your &#@*$!^ user manual or visit www.&#@*$!^.com/support for more information."
  components:
  - type: Trash
    time: 600
  - type: Unremoveable
  - type: Sprite
    sprite: _Stalker/Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "project_death"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Icon
    sprite: _Stalker/Objects/Devices/pda.rsi
    state: stalker_off
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        project_death
  - type: Pda
    id: PROJECTIDCard
    paiSlot:
      priority: -2
      whitelist:
        components:
          - PAI
    penSlot:
      priority: -1
      whitelist:
        tags:
          - Write
    idSlot:
      name: Algorithm Keycard
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Machines/id_insert.ogg
      whitelist:
        components:
          - IdCard
  - type: ContainerContainer
    containers:
      PDA-id: !type:ContainerSlot {}
      PDA-pen: !type:ContainerSlot {}
      PDA-pai: !type:ContainerSlot {}
  - type: ItemSlots
  - type: Item
    size: Small
  - type: Clothing
    quickEquip: false
    slots:
    - idcard
    - Belt

- type: entity
  parent: ClothingShoesMilitaryBase
