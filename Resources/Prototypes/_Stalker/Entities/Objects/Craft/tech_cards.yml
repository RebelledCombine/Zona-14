# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseCraftItem
  id: BaseTechCard
  suffix: Stalker, Craft item, Tech card
  abstract: true
  components:
    - type: Item
      sprite: _Stalker/Objects/Craft/tech_card.rsi
    - type: Sprite
      sprite: _Stalker/Objects/Craft/tech_card.rsi

- type: entity
  parent: BaseCraftItem
  id: TechCardCalibrationDosimeter
  name: dosimeter calibration card
  description: Used to configure new sensors for a universal dosimeter. Allows them to determine the nature of the radiation without complex calculations on the main microcontroller.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Craft/tech_card.rsi
      layers:
        - state: base
        - state: contacts_gold
        - state: label_orange

- type: entity
  parent: BaseCraftItem
  id: HotelCard
  name: Hotel Access Card
  description: "The card is ONLY for authorized users. When it is passed along the door, it scans the retina of the person's eye."
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Craft/tech_card.rsi
      layers:
        - state: base
        - state: contacts_gold
        - state: label_orange
    - type: CkeyAccess
