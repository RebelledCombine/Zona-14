# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STBaseIngridient
  id: STCraftBasicPCBT1
  name: T1 Basic PCB
  description: single-sided board with a minimum number of components, used for simple electrical circuits. T1
  suffix: Stalker, craft, T1 # Zona14: Stalker, craft, T1
  components:
    - type: PhysicalComposition
      materialComposition:
        Glass: 200
      chemicalComposition:
        Silicon: 20
    - type: Sprite
      state: basic_pcb
      sprite: _Stalker/Objects/Craft/Materials/craft_chips.rsi
    - type: Stack
      stackType: STBasicPCB
      count: 1
    - type: Craftable
    - type: RepositoryItem
      categoryName: Crafting # Zona14: Crafts

