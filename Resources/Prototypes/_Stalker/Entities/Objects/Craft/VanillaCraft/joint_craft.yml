# Zona14: translated Russian names/descriptions to English
# Zona14: ##############   СТАДИЯ 1 СЕМЕНА И ЛИСТЬЯ

- type: seed
  id: STcannabisGrow
  name: cannabis sativa
  # Zona14: suffix: ST, Stalker, ботаника # This field does not exist!
  displayName: cannabis sativa # Zona14: каннабис сатива
  plantRsi: Objects/Specific/Hydroponics/cannabis.rsi
  packetPrototype: CannabisSeeds
  productPrototypes:
    - STLeavesCannabis
  harvestRepeat: Repeat
  lifespan: 75
  maturation: 8
  production: 12
  yield: 2
  potency: 20
  growthStages: 3
  waterConsumption: 0.40
  idealLight: 9
  idealHeat: 298
  chemicals:
    THC:
      Min: 1
      Max: 10
      PotencyDivisor: 10

- type: entity
  id: CannabisSeedsStalker
  parent: SeedBase
  name: marijuana seeds
  suffix: ST, Stalker, craft, botanics # Zona14: ST, Stalker, craft, ботаника
  description: "Just don't get caught by the cops."
  components:
    - type: Seed
      seedId: STcannabisGrow
    - type: Sprite
      sprite: Objects/Specific/Hydroponics/cannabis.rsi

- type: entity
  name: buds
  parent: ProduceBase
  id: STLeavesCannabis
  suffix: ST, Stalker, craft
  description: At first glance, ordinary marijuana buds. Probably due to the abnormal effect of the local soil on the seeds, the fruits acquired an unusual color.
  components:
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/rainbow_cannabis.rsi
  - type: Produce
    seedId: STcannabisGrow
  - type: Edible
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: THC
          Quantity: 15
  - type: Craftable

# Zona14: ##############   СТАДИЯ 2 СУШКА И ПЕРЕМОЛКА

- type: entity
  name: dried buds
  parent: BaseItem
  id: STLeavesCannabisDried
  suffix: ST, Stalker, craft
  description: Almost ready-to-eat dried marijuana fruit, but the buds are too large to be easy to smoke.
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: THC
          Quantity: 12
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/cannabis.rsi
    state: dried
  - type: Craftable

- type: entity
  name: ground buds
  parent: BaseItem
  id: STGroundCannabis
  suffix: ST, Stalker, craft
  description: Fully finished hand for tight jambing.
  components:
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/rainbow_cannabis.rsi
    state: powderpile_rainbow
    color: white
  - type: Tag
    tags:
    - Cannabis
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: THC
          Quantity: 20
  - type: Craftable




# Zona14: ##############   СТАДИЯ 3 КРУТИМ И КУРИМ

- type: entity
  id: STPaperRolling
  name: Roll-Up Paper
  description: Roll-your-own paper is a thin and light material that is ideal for rolling tobacco yourself, providing even burning and a clean taste.
  suffix: ST,Stalker,craft
  parent: BaseItem
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cigarettes/paper.rsi
    state: cigpaper
  - type: Item
    sprite: Objects/Consumable/Smokeables/Cigarettes/paper.rsi
    size: Tiny
  - type: Tag
    tags:
    - RollingPaper
    - Trash
  - type: SpaceGarbage
  - type: Craftable

- type: entity
  id: STJoint
  suffix: ST, Stalker, craft
  parent: STBaseCigar
  name: picket fence
  description: A tightly packed picket of local sativa. Holding it in your teeth, you are overwhelmed with an intoxicating feeling of freedom. All that remains is to blow smoke and have a good time.
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    state: unlit-icon
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    slots: [ mask ]
  - type: Construction
    graph: smokeableJointRainbow
    node: jointRainbow
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
        reagents:
        - ReagentId: THC
          Quantity: 20
        - ReagentId: SpaceDrugs
          Quantity: 4
        - ReagentId: Lipolicide
          Quantity: 4
        - ReagentId: MindbreakerToxin
          Quantity: 2.66
        - ReagentId: Happiness
          Quantity: 2.66
        - ReagentId: Psicodine
          Quantity: 0.8

