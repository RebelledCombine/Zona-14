# Zona14: Pseudo blueprint. In short, to avoid making a separate craft for each item that uses the same object but with a different reskin, tags should be used. But unfortunately vanilla does not support this, which is why these workarounds exist.

- type: entity
  parent: BaseItem
  name: Professional gray backpack recipe (T5)
  description: Any backpack (T4) - 1pc, T2 hide - 5pcs, basic thread set T1 - 2pcs, Vyvert artifact - 3pcs.
  id: ClothingBackpackDuffelSuperStalkerGrayBlueprint
  suffix: ST, craft # Zona14: ST, craft
  components:
    - type: Sprite
      state: blueprint
      sprite: _Stalker/Objects/Craft/blueprint.rsi
    - type: Craftable
    - type: RepositoryItem
      categoryName: Crafting # Zona14: Crafts

