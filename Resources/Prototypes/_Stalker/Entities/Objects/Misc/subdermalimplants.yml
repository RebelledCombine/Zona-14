# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseSubdermalImplant
  id: STSeraBombImplant
  name: self-destruct
  description: Detonate your PDA with a guaranteed splitting of your Self into two whole parts in the name of the Son of the Star!
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      permanent: true
      implantAction: STActivateSeraSuicideEvent
    - type: TriggerOnActivateImplant
    - type: TimerTrigger
      delay: 3
      initialBeepDelay: 0
      beepSound:
        path: /Audio/Machines/Nuke/general_beep.ogg
        params:
          volume: -2
    - type: ExplodeOnTrigger
      keysIn:
      - timer
    - type: Explosive
      explosionType: Default
      totalIntensity: 100
      intensitySlope: 30
      maxIntensity: 60
      canCreateVacuum: false
    - type: Tag
      tags:
        - SubdermalImplant
        - HideContextMenu
