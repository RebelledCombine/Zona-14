# Zona14: translated Russian names/descriptions to English
- type: entity
  id: STBasaltCube
  suffix: ST, Basalt, Mapping
  name: Basalt Cube
  description: A mysterious geological object with unusual symmetry, made of volcanic formations.
  abstract: true
  components:
  - type: Sprite
    noRot: true
    sprite: _Stalker/Objects/Decoration/basalt-cube.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 6500
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 1000
        layer:
        - HalfWallLayer
        - Opaque
  - type: Climbable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic



- type: entity
  parent: STBasaltCube
  id: STBasaltCubeGaint
  components:
  - type: Sprite
    state: basalt-cube-giant
    
    
- type: entity
  parent: STBaseItem
  name: Small basalt cube
  description: A pleasant-to-touch small basalt cube.
  id: STBasaltCubeSmall
  components:
  - type: STWeight
    self: 2
  - type: Sprite
    noRot: true
    sprite: _Stalker/Objects/Decoration/basalt-cube.rsi
    state: basalt-cube-small