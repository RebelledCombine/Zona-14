# Zona14: translated Russian names/descriptions to English
- type: entity
  id: TrashCanS1
  parent: STBaseStructure
  name: trash can
  suffix: ST, Mapping
  description: A specialized container used to collect household or construction waste.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/trashcan.rsi
    state: tc1
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 6000
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 300
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
          - !type:DoActsBehavior
            acts: [ "Destruction" ]

- type: entity
  id: TrashCanS2
  parent: TrashCanS1
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/trashcan.rsi
    state: tc2
  - type: Storage
    maxItemSize: Ginormous
    grid:
      - 0,0,32,32
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface

