# Zona14: translated Russian names/descriptions to English
- type: entity
  id: STBasaltColumn
  suffix: ST, Basalt, Mapping
  name: Basalt Column
  description: Basalt is a widespread volcanic rock that is formed as a result of the rapid cooling of basaltic lava.
  abstract: true
  components:
  - type: Sprite
    noRot: true
    sprite: _Stalker/Objects/Decoration/basalt-columns.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 6500
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 1000
        layer:
        - HalfWallLayer
        - Opaque
  - type: Climbable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic



- type: entity
  parent: STBasaltColumn
  id: STBasaltMiddleColumn
  components:
  - type: Sprite
    state: basalt-column-medium


- type: entity
  parent: STBasaltColumn
  id: STBasaltMediumColumnBroken
  name: Ruined Basalt Column
  description: This column is the remains of volcanic rock. Numerous cracks on its surface, as well as debris scattered around, testify to the power of nature and time.
  components:
  - type: Sprite
    state: basalt-column-medium-broken

- type: entity
  parent: STBasaltColumn
  suffix: ST, Basalt,Small, Mapping
  id: STBasaltSmallColumn01
  components:
  - type: Sprite
    state: basalt-column-small-0

- type: entity
  parent: STBasaltColumn
  suffix: ST, Basalt,Small, Mapping
  id: STBasaltSmallColumn02
  components:
  - type: Sprite
    state: basalt-column-small-1
