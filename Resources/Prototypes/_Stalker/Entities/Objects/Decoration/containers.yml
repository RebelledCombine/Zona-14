# Zona14: translated Russian names/descriptions to English
- type: entity
  id: ContainerBoxStalker
  parent: BaseShippingContainer
  name: trailer cabin
  description: A universal non-permanent structure that is characterized by mobility. It is installed on site in a few hours and can be used for a variety of purposes. It can be a small warehouse, office, summer cottage, security post, housing.
  suffix: ST, Mapping
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Containers.rsi
    state: box

- type: entity
  id: ContainereStalkerParent
  parent: BaseShippingContainer
  abstract: true
  name: Dad Container
  description: A sea container of this standard size is usually used for the transportation of large and bulky cargo, goods up to 9 meters in length. One of the main advantages of such containers is the increased height, so the use of such containers, with the same freight price, allows you to transport more cargo.
  suffix: ST, Mapping
  components:
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.9,0.9,1.9,-0.9"
        density: 1000
        layer:
        - WallLayer

