  description: A sea container of this standard size is usually used for the transportation of large and bulky cargo, goods up to 9 meters in length. One of the main advantages of such containers is the increased height, so the use of such containers, with the same freight price, allows you to transport more cargo. The container is completely covered with rust.
  suffix: ST, Mapping
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/containerss.rsi
    state: blue_rusted

