# Zona14: translated Russian names/descriptions to English
- type: entity
  id: BarricadaStalker1
  parent: BaseStructure
  name: barricade
  suffix: ST, Mapping
  description: An artificial fortification barrier made of improvised materials and located across a road or street
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/baricada.rsi
    state: b1
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.3,0.5,0.1"
        density: 155
        mask:
        - MachineMask
        layer:
        - WallLayer

