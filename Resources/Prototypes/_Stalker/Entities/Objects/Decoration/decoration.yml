# Zona14: translated Russian names/descriptions to English
- type: entity
  id: GasStationstalker
  parent: BaseStructure
  name: gas station
  suffix: ST, Mapping
  description: Old gas station, hardly it works.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Stalker/Structures/Machines/gasstation.rsi
    state: gasstation
  - type: Physics
    bodyType: Static
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.18,-0.18,0.18,0.38"
        mask:
        - TabletopMachineMask
        layer:
        - WallLayer
        density: 200
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Breakage"]
      - !type:EjectVendorItems
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/metal_break1.ogg

