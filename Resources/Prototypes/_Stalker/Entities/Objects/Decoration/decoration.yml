- type: entity
  id: WoodenCrib
  name: Baby Crib
  suffix: ST, Mapping
  description: A vintage baby crib with side rails darkened by time and squeaky fittings. The headboard bears teeth marks and scratches — signs of early childhood and escape attempts.
  parent: STBaseStructure
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/mapping.rsi
    state: crib

- type: entity
  id: WoodenPiano
  name: Piano
  suffix: ST, Mapping
  description: A Soviet 'Belarus' brand piano with its distinct tone and straight body lines. The ivory keys are cracked in places, the pedals creak, but the soul of the instrument lives on in its deep bass and bright high notes.
  parent: STBaseStructure
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/mapping.rsi
    state: piano

- type: entity
  id: PhoneStalker
  name: Landline Telephone
  parent: FanStalker
  suffix: ST, Mapping
  description: A massive Soviet-era landline telephone with a coiled cord and a handset yellowed by time. Despite its appearance, the mechanism inside seems to work just fine. A symbol of an era when calls were rare and costly.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/mapping.rsi
    drawdepth: SmallObjects
    state: phone

- type: entity
  id: WoodenBench2
  name: Wooden Bench
  suffix: ST, Mapping
  parent: ChairBase
  description: A simple wooden bench with a surface worn to a shine. Years of use have rounded off its corners and given the wood a warm hue. Perfect for a tired traveler to rest on.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/mapping.rsi
    state: bench

- type: entity
  id: RustySlide
  name: Rusty Slide
  suffix: ST, Mapping
  description: "A brightly colored children's slide with worn sides from countless descents. The steps are worn smooth by thousands of tiny feet, and the plastic has faded in the sun — but the cheerful squeak when sliding down remains."
  parent: STBaseStructure
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/gorka.rsi
    state: gorka
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.80,-0.50,0.80,0.45"
        density: 6000
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  id: HalfTire
  name: Half Tire
  suffix: ST, Mapping
  description: "A half-decayed car tire, half-buried in the ground. The rubber is cracked and no longer elastic, filled with mud and last year's leaves. A silent witness to decades under the open sky."
  parent: STBaseStructure
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/mapping.rsi
    state: tire
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.40,-0.30,0.40,0.10"
        density: 6000
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  id: StackBooks
  name: Stack of Books
  suffix: ST, Mapping
  description: A tattered stack of books with yellowed pages and faded covers. Among them are Soviet textbooks, collections of literary classics, and a few popular science journals. Some spines are cracked from frequent reading, and the margins contain pencil notes from previous owners.
  parent: STBaseStructure
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/mapping.rsi
    state: books
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.10,0.45,0.50"
        density: 6000
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  id: OldGen
  name: Old Generator
  suffix: ST, Mapping
  description: A massive diesel generator from the Soviet era, covered in chipped green paint and signs of repeated repair. Its bulky size and rugged design speak to its industrial past. Despite the rust and oil stains around the fuel tank, the inner mechanism seems capable of starting again with proper handling. Its low hum was once a common sound at many facilities where centralized power often failed.
  parent: STBaseStructure
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/mapping.rsi
    state: gen

- type: entity
  id: WoodenKomod
  name: old Soviet dresser
  suffix: ST, Mapping
  description: A bulky dresser from the Soviet era with characteristic geometric patterns and metal overlays. Despite its clumsy appearance, its sturdiness commands respect — such furniture will survive any changes.
  parent: WoodenYaschik1
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/yashik.rsi
    state: komod
