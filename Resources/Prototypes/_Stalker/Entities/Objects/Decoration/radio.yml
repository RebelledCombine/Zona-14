# Zona14: translated Russian names/descriptions to English
# Zona14: ПЕРЕНОСНОЙ ПЛЕЕР

- type: entity
  parent: BaseItem
  id: RadioStalkerPlayer
  name: Cassette Player
  suffix: ST, portable # Zona14: ST, переносной
  description: A cassette player introduced in 1983 and made in an ultra-compact case, which is smaller than even the audio cassette itself. This became possible due to the sliding design, which made it possible to install the cassette inside.
  components:
  - type: STWeight
    self: 0.5
  - type: Boombox
  - type: ContainerContainer
    containers:
      cassette_slot: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      cassette_slot:
        name: Cassete
        whitelist:
          tags:
            - Cassete
  - type: Sprite
    sprite: _Stalker/Objects/Devices/mp3player.rsi
    state: base

- type: entity
  id: RadioStandStalkerIgorIvanovichTheme
  parent: RadioBaseStalker
  suffix: ST, IgorIvanovichTheme
  components:
  - type: AmbientSound
    volume: 1
    enabled: true
    sound:
      path: /Audio/_Stalker/Music/Radio/wolf_hunt.ogg

- type: entity
  parent: RadioStalkerPlayer
  id: RadioBandPlayer
  name: Bandit Cassette Player
  suffix: ST, portable # Zona14: ST, переносной
  description: "{ ent-RadioStalkerPlayer.desc }"
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Devices/mp3playerband.rsi
    state: base

