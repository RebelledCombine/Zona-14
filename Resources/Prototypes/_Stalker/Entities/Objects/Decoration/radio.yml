- type: entity
  id: RadioStalkerJukebox
  parent: BaseStructure
  name: Radio
  suffix: Stalker, switchable # Zona14: Stalker, переключаемое
  description: The first wireless communication. The carrier of the signal is radio waves propagating in space.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/radio.rsi
    state: base
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.08,-0.08,0.08,0.08"
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
        density: 200
  - type: Anchorable
  - type: Appearance
  - type: Jukebox
  - type: ActivatableUI
    key: enum.JukeboxUiKey.Key
  - type: UserInterface
    interfaces:
      enum.JukeboxUiKey.Key:
        type: JukeboxBoundUserInterface
