# Zona14: translated Russian names/descriptions to English
- type: entity
  id: TrubaSoloStalker
  parent: BaseStructure
  name: reinforced concrete pipe
  suffix: ST, Mapping
  description: An old reinforced concrete pipe.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Other/truba(32x48).rsi
    state: truba1
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.4,0.3,0.4"
        density: 155
        mask:
        - MachineMask
        layer:
        - WallLayer

