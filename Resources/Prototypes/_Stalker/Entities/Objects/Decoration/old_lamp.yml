# Zona14: translated Russian names/descriptions to English
- type: entity
  name: old lamp
  id: OldLampa
  parent: BaseLamp
  suffix: ST, Mapping
  description: An old lamp that miraculously still works.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/old_lamp.rsi
    layers:
      - state: lampa
        map: [ "base" ]
      - state: lampa_on
        shader: unshaded
        visible: false
        map: [ "light" ]
  - type: PointLight
    radius: 1.5
    energy: 3.0
    color: "#fad082"
    castShadows: false

- type: entity
  id: BrokenOldLampa
  parent: STBaseStructure
  name: Broken Old Lamp
  suffix: ST, Mapping
  description: "An old lamp that hasn't worked in a long time."
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/old_lamp.rsi
    state: lampa
  - type: Clickable
  - type: Physics
    bodyType: Static
    canCollide: false
