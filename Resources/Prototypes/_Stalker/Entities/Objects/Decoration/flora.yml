# Zona14: Birch
- type: entity
  parent: STBaseTree
  id: BirchTreeNew01
  suffix: ST, Mapping
  name: birch
  description: One of the most recognizable trees of the deciduous genus, the tree is characterized by white bark with black patches, as well as small, pointed leaves.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Flora/birch.rsi
    state: birch
  - type: Craftable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 750
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 700
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/tree_fell.ogg
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          STLogStalkerT2:
            min: 1
            max: 2

