# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseCraftItem
  id: BaseDosimeter
  name: Geiger counter
  description: A handheld device used for detecting and measuring radiation pulses.
  suffix: Stalker, Dosimeter
  abstract: true
  components:
    - type: Sprite
      layers:
        - state: geiger_base
        - state: geiger_on_idle
          map: ["enum.GeigerLayers.Screen"]
          shader: unshaded
          visible: false
    - type: Item
    - type: Geiger
      showControl: true
      showExamine: true
      showAll: false
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.GeigerVisuals.IsEnabled:
          GeigerLayers.Screen:
            True: { visible: True }
            False: { visible: False }
        enum.GeigerVisuals.DangerLevel:
          GeigerLayers.Screen:
            None: {state: geiger_on_idle}
            Low: {state: geiger_on_low}
            Med: {state: geiger_on_med}
            High: {state: geiger_on_high}
            Extreme: {state: geiger_on_ext}

- type: entity
  parent: BaseDosimeter
  id: DosimeterModified
  name: modified dosimeter
  description: A modified Geiger counter that now shows the sum of all types of negative radiation except radiation. Indispensable in anomalous fields and psi-radiation.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Tools/geiger_modified.rsi
    - type: Item
      sprite: _Stalker/Objects/Tools/geiger_modified.rsi
    - type: Geiger
      # Zona14: configured advanced dosimeter fields (prefix + summed damageTypes + ShowAll)
      showAll: true
      prefix: geiger-prefix-ceu # Zona14: localized unit key
      damageTypes:
        - id: Asphyxiation
          name: geiger-damage-asphyxiation
        - id: Bloodloss
          name: geiger-damage-bloodloss
        - id: Blunt
          name: geiger-damage-blunt
        - id: Piercing
          name: geiger-damage-piercing
        - id: Slash
          name: geiger-damage-slash
        - id: Heat
          name: geiger-damage-heat
        - id: Shock
          name: geiger-damage-shock
        - id: Cold
          name: geiger-damage-cold
        - id: Caustic
          name: geiger-damage-caustic
        - id: Poison
          name: geiger-damage-poison
        - id: Cellular
          name: geiger-damage-cellular
        - id: Psy
          name: geiger-damage-psy
        - id: Compression
          name: geiger-damage-compression
        - id: Structural
          name: geiger-damage-structural

