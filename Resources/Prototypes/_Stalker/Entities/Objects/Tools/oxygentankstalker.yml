# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: EmergencyOxygenTank
  id: ExtendedEmergencyOxygenTankStalker
  name: Small Oxygen Tank
  suffix: Stalker, Empty # Zona14: Stalker, Empty
  description: Small oxygen air container, especially used only for the environment in the Chernobyl Exclusion Zone. It is very compact and cheap. But it will not be able to protect you from an unsuitable atmosphere for a long time.
  components:
  - type: Trash
    time: 300
  - type: Sprite
    sprite: _Stalker/Objects/Tools/Oxygentanks/emergency_extended_stalker.rsi
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
    sprite: _Stalker/Objects/Tools/Oxygentanks/emergency_extended_stalker.rsi
  - type: GasTank
    air:
      volume: 1.5
      temperature: 293.15
  - type: STWeight
    self: 2.25
  - type: Clothing
    sprite: _Stalker/Objects/Tools/Oxygentanks/emergency_extended_stalker.rsi

- type: entity
  id: ExtendedEmergencyOxygenTankFilledStalker
  parent: ExtendedEmergencyOxygenTankStalker
  suffix: Stalker, Filled # Zona14: Stalker, Filled
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      # 9 minutes
      volume: 1.5
      moles:
        - 0.615413715 # oxygen
      temperature: 293.15

- type: entity
  parent: ExtendedEmergencyOxygenTank
  id: DoubleEmergencyOxygenTankStalker
  name: Double Oxygen Tank
  suffix: Stalker, Empty # Zona14: Stalker, Empty
  description: High quality air container with two cylinders. It holds a large amount of oxygen with its small size. It can be used to protect against unsuitable atmosphere in the Chernobyl Exclusion Zone, as well as in other situations.
  components:
  - type: Trash
    time: 600
  - type: Sprite
    sprite: _Stalker/Objects/Tools/Oxygentanks/emergency_double_stalker.rsi
  - type: Item
    size: Large
    shape:
    - 0,0,2,1
    sprite: _Stalker/Objects/Tools/Oxygentanks/emergency_double_stalker.rsi
  - type: GasTank
    air:
      volume: 2.5
      temperature: 293.15
  - type: STWeight
    self: 2.25
  - type: Clothing
    sprite: _Stalker/Objects/Tools/Oxygentanks/emergency_double_stalker.rsi
  - type: MeleeWeapon
    attackRate: 0.9
    damage:
      types:
        Blunt: 7

- type: entity
  id: DoubleEmergencyOxygenTankStalkerFilled
  parent: DoubleEmergencyOxygenTankStalker
  suffix: Stalker, Filled # Zona14: Stalker, Filled
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      # 15 minutes
      volume: 2.5
      moles:
        - 3.07707 # oxygen
      temperature: 293.15
