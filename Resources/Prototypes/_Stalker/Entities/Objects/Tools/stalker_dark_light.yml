# Zona14: translated Russian names/descriptions to English
- type: entity
  id: STDarkLight
  name: dim light source
  description: An invisible, non-physical source of illumination for use in completely dark areas.
  # This prototype has no sprite or item components. It's purely a
  # light emitter and can be spawned anywhere without a physical
  # representation.
  components:
    - type: PointLight
      radius: 4
      color: "#a9bbda"
      energy: 1
      enabled: true
      netsync: false
    - type: Tag
      tags:
        - LightSource

- type: entity
  id: STDarkLightSpawner
  name: dim light source spawner
  suffix: ST, Trigger
  parent: FlexibleMarker
  components:
    - type: RandomSpawner
      prototypes:
        - STDarkLight
      chance: 1
      offset: 0.0
