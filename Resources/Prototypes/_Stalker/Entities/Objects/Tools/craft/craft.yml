# Zona14: translated Russian names/descriptions to English

- type: entity
  parent: BaseItem
  id: CraftGunpowderBank
  name: Gunpowder Can
  description: Used to store gunpowder used in firearms or pyrotechnic devices. In the often case of creating ammunition.
  suffix: Stalker, craft # Zona14: Stalker, craft
  components:
  - type: STWeight
    self: 1
  - type: Item
    size: Normal
    shape:
      - 0,0,1,1
  - type: Sprite
    sprite: _Stalker/Objects/Tools/Craft/32.rsi
    state: gunpowder_bank_null
    scale: 0.9, 0.9
  - type: ContainerFill
    containers:
      item:
      - CraftMaterialGunpowder
  - type: Tag
    tags:
    - CraftMaterialGunpowder
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      item:
        name: gunpowder
        insertVerbText: pour gunpowder # Zona14: pour in gunpowder
        ejectVerbText: dump gunpowder # Zona14: pour out gunpowder
        whitelist:
          tags:
          - CraftMaterialGunpowder
  - type: ItemMapper
    mapLayers:
      gunpowder_bank:
        whitelist:
          tags:
          - CraftMaterialGunpowder
  - type: Appearance
  - type: RepositoryItem
    categoryName: Crafting # Zona14: Crafts

- type: entity
  parent: MaterialBase
  id: CraftMaterialGunpowder
  name: black powder
  description: Explosive compound.
  suffix: Stalker, craft # Zona14: Stalker, craft
  components:
  - type: STWeight
    self: 0.1
  - type: Stack
    stackType: GunpowderStalker
    count: 1
  - type: Sprite
    sprite: Objects/Misc/reagent_fillings.rsi
    state: powderpile
    color: darkgray
  # - type: PhysicalComposition
    # materialComposition:
      # GunpowderStalker: 100 # Stalker-TODO: This material does not exist
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - CraftMaterialGunpowder
  - type: Explosive
    explosionType: Default
    totalIntensity: 10
  - type: PacifismDangerousAttack
  - type: Flammable
    fireSpread: true
    canResistFire: false
    alwaysCombustible: true
    canExtinguish: false
    damage:
      types:
        Heat: 1000
  - type: RepositoryItem
    categoryName: Crafting # Zona14: Crafts
  - type: Craftable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ExplodeBehavior

- type: Tag
  id: CraftMaterialGunpowder

- type: Tag
  id: GunpowderStalker

- type: stack
  id: GunpowderStalker
  name: stack-gunpowder-stalker
  icon: { sprite: /Textures/Objects/Misc/reagent_fillings.rsi, state: powderpile }
  spawn: CraftMaterialGunpowder
  maxCount: 5

