# Zona14: translated Russian names/descriptions to English
- type: entity
  name: turret crate
  suffix: Stalker, turret [DO NOT MAP] # Zona14: Stalker, турель [НЕ МАППИТЬ]
  parent: ToolboxElectrical
  id: ToolboxElectricalTurretStalker
  description: A special box for storing, storing, transporting (carrying) and using the RP-74 stationary machine gun. Activation occurs by any hit on the box. Once activated, the Sentry Gun can no longer be picked up.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Tools/Toolboxes/green.rsi
    state: icon
  - type: Item
    sprite: _Stalker/Objects/Tools/Toolboxes/green.rsi
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 1
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:SpawnEntitiesBehavior
            spawn:
              WeaponTurretNanoTrasenDisposableStalker:
                min: 1
                max: 1
