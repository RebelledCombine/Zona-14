# Zona14: translated Russian names/descriptions to English
- type: Tag
  id: PremiumSupplyTalons
- type: entity
  parent: BaseItem
  id: PremiumSupplyTalons
  name: Premium Supply Coupon
  description: Institute supply coupons.
  suffix: ST, DO NOT SPAWN # Zona14: ST, НЕ СПАВНИТЬ
  components:
    - type: Stack
      stackType: PremiumSupplyTalons
      count: 1
      baseLayer: base
    - type: Sprite
      sprite: _Stalker/Objects/Economy/vex.rsi
      state: green
      layers:
      - state: green
        map: ["base"]
    - type: Item
      sprite: _Stalker/Objects/Economy/vex.rsi
      size: Small
    - type: Physics
      bodyType: Dynamic
    - type: Fixtures
      fixtures:
        fix1:
          density: 30
          shape:
            !type:PhysShapeAabb
            bounds: "-0.35,-0.2,0.25,0.1"
          mask:
            - ItemMask
    - type: Appearance
    - type: Tag
      tags:
        - PremiumSupplyTalons

- type: currency
  id: PremiumSupplyTalons
  displayName: store-currency-display-premium-supply-talons
  cash:
    1: PremiumSupplyTalons
  canWithdraw: true

- type: stack
  id: PremiumSupplyTalons
  name: stack-premium-supply-talons
  icon: { sprite: /Textures/_Stalker/Objects/Economy/vex.rsi, state: green }
  spawn: PremiumSupplyTalons

