  name: Fangs
  description: Fangs torn out from the front jaws of various mutants... only a fanatic would do this!
  suffix: ST, DO NOT SPAWN # Zona14: ST, DO NOT SPAWN
  components:
  - type: PhysicalComposition
    materialComposition:
      Credit: 1
  - type: Stack
    stackType: Fangs
    count: 1
    baseLayer: base
  - type: Sprite
    sprite: _Stalker/Objects/Economy/fangs.rsi
    state: cash
    layers:
    - state: cash
      map: ["base"]
  - type: Item
    sprite: _Stalker/Objects/Economy/fangs.rsi
    size: Small
  - type: Physics
    bodyType: Dynamic
