# Zona14: translated Russian names/descriptions to English
# Zona14: ################ Novice Jackets

# Zona14: Canvas

- type: entity
  parent: STBaseItem
  id: SetJacketNoviceBrezentBuyableCrate
  name: "Beginner's Jacket Set"
  description: "Normal clothing of a novice stalker. It does not save the wearer from either a bullet or anomalies, but it is comfortable to wear. Includes a jacket, a gas mask, black city backpack and a set of beginner's pouches."
  suffix: ST, T1, Cache
  components:
    - type: STWeight
      self: 10
    - type: Item
      size: Ginormous
    - type: MultiHandedItem
    - type: Sprite
      sprite: _Stalker/Structures/Furniture/Sets/jacket-novice-brezent.rsi
      state: icon
    - type: SpawnItemsOnUse
      items:
        - id: Z14ClothingOuterJacketStalker # Zona14: ClothingOuterJacketStalker<Z14ClothingOuterJacketStalker
        - id: Z14ClothingMaskGasMarlya # Zona14: ClothingMaskGasMarlya<Z14ClothingMaskGasMarlya
        - id: ClothingBackpackTownBlackStalker
        - id: ClothingBeltBandolierStalker
      sound:
        path: /Audio/Effects/unwrap.ogg

