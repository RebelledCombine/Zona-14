# Zona14: translated Russian names/descriptions to English
# Zona14: ## Военные

- type: entity
  parent: VendingMachine
  id: VendingMachineMilitary
  name: Military Dispenser
  description: Replaced the smoker in modern times.
  suffix: Stalker
  components:
    - type: VendingMachine
      ejectDelay: 0.1
      pack: MilitaryInventory
      dispenseOnHitChance: 0.0
      dispenseOnHitThreshold: 2
      offState: off
      brokenState: broken
      normalState: normal-unshaded
    - type: Sprite
      sprite: Structures/Machines/VendingMachines/secdrobe.rsi
      layers:
        - state: "off"
          map: ["enum.VendingMachineVisualLayers.Base"]
        - state: "off"
          map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
          shader: unshaded
        - state: panel
          map: ["enum.WiresVisualLayers.MaintenancePanel"]
    - type: AccessReader
      access: [["MilitaryOfficer"]]

- type: vendingMachineInventory
  id: MilitaryInventory
  startingInventory:
    Syringe: 6
    ClothingMaskGasM40Military: 6
    ExtendedEmergencyOxygenTankFilledStalker: 4
    DoubleEmergencyOxygenTankStalkerFilled: 2
    GL1Grenade: 3
    DG05SmokeGrenade: 2
    RGD5Grenade: 2
    ClothingHeadBandana1Military: 15
    ClothingHeadBandana2Military: 15
    RazorWire: 200
    545Mag30: 30
    739Mag30: 5
    Base754Mag5: 10
    VityazMag: 5
    BoxZiptie: 10
    CraftBag: 10
    545FMJBox: 50
    545PCBox: 5
    545HPBox: 7
    # Zona14: 545BPBox: 3 Убрано всё т4 по просьбе вииса
    739FMJBox: 5
    754FMJBox: 3
    919PBMBox: 10
    PillDexalin: 50
    # SelfSteampack: 10
    MedkitAI2: 25
    STBrutepack: 50
    STGauze: 50
    # MilitarySteampack: 5
    MedkitMilitary: 10
    antiradpill: 5
    STEnergyDrink: 5
    FoodBreadPlain: 100
    STOintment: 50
    DrinkFlaskOld: 50
    DrinkWaterBottleFull: 50
    FoodTinMRE: 50
    BoxSafebox: 5
    GeigerCounter: 10
    BaseRadio: 30
    STBolt: 1000
    FlashlightSeclite: 50
    PowerCellHyper: 100
    BoxFlare: 50
    HandheldGPSBasic: 50
    # Zona14: Наборы
    #ArmyAKSUCrate: 15
    ArmyCrateNewOfficer: 2
    ArmyCrateNewStandart: 10

- type: entity
  parent: BaseVendingMachineRestock
  id: VendingMachineRestockMilitary
  name: Military Supply
  description: A crate with everything you need to destroy illegal immigrants.
  categories: [ StSkipRestockTest ]
  components:
    - type: VendingMachineRestock
      canRestock:
        - MilitaryInventory
    - type: Sprite
      layers:
        - state: base
        - state: green_bit
          shader: unshaded

# Zona14: ########################################Спавнер снабжения

- type: entity
  name: military supply spawner
  id: SupplySpawner
  parent: FlexibleMarkerTrigger
  suffix: Stalker | CD 30 minutes # Zona14: Stalker | КД 30 минут
  components:
    - type: Sprite
      layers:
        - state: blue
        - sprite: Mobs/Aliens/Xenos/burrower.rsi
          state: crit
        - state: ai
        - type: TimedSpawner
          prototypes:
            - VendingMachineRestockMilitary
          chance: 1
          intervalSeconds: 18000
          minimumEntitiesSpawned: 1
          maximumEntitiesSpawned: 1

