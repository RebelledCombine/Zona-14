# Zona14: translated Russian names/descriptions to English

- type: entity
  name: combat knife
  parent: BaseKnife
  id: STCombatKnife
  description: A deadly knife intended for melee confrontations.
  components:
  - type: Tag
    tags:
    - STCombatKnife
    - Knife
  - type: Sprite
    sprite: Objects/Weapons/Melee/combat_knife.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.1
    damage:
      types:
        Slash: 20
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
