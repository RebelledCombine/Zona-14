# Zona14: translated Russian names/descriptions to English
- type: explosion
  id: Artillery
  damagePerIntensity:
    types:
      Heat: 5
      Blunt: 5
      Piercing: 5
  tileBreakChance: [0, 0, 0]
  tileBreakIntensity: [0, 0, 0]
  tileBreakRerollReduction: 20
  lightColor: Orange
  texturePath: /Textures/Effects/fire.rsi
  fireStates: 3

- type: entity
  id: ArtilleryLanding
  name: Arrival of the explosion
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: TimedDespawn
    lifetime: 3
  - type: Transform
    noRot: true
    anchored: true
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Stalker/Effects/artillery.ogg
  - type: SpawnOnDespawn
    prototype: ArtilleryExplosive

- type: entity
  name: explosion
  id: ArtilleryExplosive
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: TriggerOnSpawn
    keyOut: spawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Artillery
    maxIntensity: 5
    intensitySlope: 5
    totalIntensity: 120
    canCreateVacuum: false
  - type: DeleteOnTrigger
    keysIn:
    - spawn
  
- type: entity
  name: explosion (mortar)
  id: HowitzerExplosive
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: TriggerOnSpawn
    keyOut: spawn
  - type: ExplodeOnTrigger
    keysIn:
    - spawn
  - type: Explosive
    explosionType: Artillery
    maxIntensity: 5
    intensitySlope: 2
    totalIntensity: 40
    canCreateVacuum: false
  - type: DeleteOnTrigger
    keysIn:
    - spawn

- type: entity
  id: HowitzerLanding
  name: "{ ent-ArtilleryLanding }"
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: TimedDespawn
    lifetime: 3
  - type: Transform
    noRot: true
    anchored: true
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Stalker/Effects/artillery.ogg
  - type: SpawnOnDespawn
    prototype: HowitzerExplosive

- type: entity
  name: HowitzerSpawner
  id: HowitzerTargetBase
  categories: [ HideSpawnMenu, Spawner, StSkipSpawnTest ]
  parent: MarkerBase
  components:
    - type: Marker
    - type: Clickable
    - type: InteractionOutline
    - type: Sprite
      drawdepth: Overdoors
      sprite: Markers/cross.rsi
      state: red
    - type: RandomSpawner
      prototypes:
        - HowitzerLanding
      chance: 0.8
      offset: 13

- type: entity
  name: intensive mortar strike call
  id: HowitzerTimedSpawnerIntensive
  suffix: Minute # Zona14: Minute
  parent: MarkerBase
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: Timer
  - type: TimedSpawner
    prototypes:
      - HowitzerTargetBase
    chance: 0.75
    intervalSeconds: 1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 30
  - type: TimedDespawn
    lifetime: 60

- type: entity
  name: mortar strike call
  id: HowitzerTimedSpawnerfast
  suffix: Minute # Zona14: Minute
  parent: MarkerBase
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: Timer
  - type: TimedSpawner
    prototypes:
      - HowitzerTargetBase
    chance: 0.40
    intervalSeconds: 1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 30
  - type: TimedDespawn
    lifetime: 60

- type: entity
  name: mortar strike call
  id: HowitzerTimedSpawnerLong
  suffix: 3 minutes # Zona14: 3 minutes
  parent: MarkerBase
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: Timer
  - type: TimedSpawner
    prototypes:
      - HowitzerTargetBase
    chance: 0.40
    intervalSeconds: 1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 30
  - type: TimedDespawn
    lifetime: 180

- type: entity
  name: ArtillerySpawner
  id: ArtilleryTargetBase
  categories: [ HideSpawnMenu, Spawner, StSkipSpawnTest ]
  parent: MarkerBase
  components:
    - type: Marker
    - type: Clickable
    - type: InteractionOutline
    - type: Sprite
      drawdepth: Overdoors
      sprite: Markers/cross.rsi
      state: red
    - type: RandomSpawner
      prototypes:
        - ArtilleryLanding
      chance: 0.65
      offset: 11

- type: entity
  name: MLRS strike call
  id: ArtilleryTimedSpawnerIntensive
  suffix: Minute # Zona14: Minute
  parent: MarkerBase
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: Timer
  - type: TimedSpawner
    prototypes:
      - ArtilleryTargetBase
    chance: 0.75
    intervalSeconds: 1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 30
  - type: TimedDespawn
    lifetime: 60

- type: entity
  name: call for 152mm bombardment
  id: ArtilleryTimedSpawnerLong
  suffix: 3 minutes # Zona14: 3 minutes
  parent: MarkerBase
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: Timer
  - type: TimedSpawner
    prototypes:
      - ArtilleryTargetBase
    chance: 0.5
    intervalSeconds: 5
    minimumEntitiesSpawned: 3
    maximumEntitiesSpawned: 30
  - type: TimedDespawn
    lifetime: 180 
  
- type: entity
  parent: ArtilleryTimedSpawnerLong
  name: call for 152mm bombardment
  id: ArtilleryTimedSpawnerFast
  suffix: Minute # Zona14: Minute
  components:
  - type: TimedDespawn
    lifetime: 60 





- type: entity
  id: HelicopterLanding
  name: helicopter landing
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: TimedDespawn
    lifetime: 90
  - type: Transform
    noRot: true
    anchored: true
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Stalker/Heli/deploy.ogg

- type: entity
  id: HelicopterCrush
  name: helicopter crash
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: TimedDespawn
    lifetime: 10
  - type: Transform
    noRot: true
    anchored: true
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Stalker/Heli/crush.ogg

- type: entity
  id: HelicopterAmbient
  name: Helicopter Sound
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: Transform
    noRot: true
    anchored: true
  - type: AmbientSound
    enabled: true
    volume: -2
    range: 15
    sound:
      path: /Audio/_Stalker/Heli/ambient.ogg
  - type: Item
