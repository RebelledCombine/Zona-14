# Zona14: ####################### Шахиды
- type: entity
  parent: Clothing
  id: STExplosionPack
  name: Explosive Package
  description: Backpack full of explosives. Alas, without a fuse - you will have to initiate the explosion in some other way.
  suffix: Stalker, Explosive # Zona14: Stalker, Взрывчатка
  components:
  - type: STWeight
    self: 10
  - type: Explosive
    explosionType: Default
    maxIntensity: 10
    intensitySlope: 3
    totalIntensity: 500
    canCreateVacuum: false
  - type: Sprite
    sprite: Corvax/Back/Backpacks/military.rsi
    state: icon
  - type: Item
    size: Huge
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: RepositoryItem
    categoryName: Weapons # Zona14: Оружие
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Appearance

- type: entity
  parent: ClothingBeltTarzanBlack
  id: STClothingBeltShahid
  name: Shahid belt
  description: Belt and pouches packed tightly with explosives.
  suffix: ST, Explosive # Zona14: ST, Взрывчатка
  components:
  - type: STWeight
    self: 5
  - type: Tag
    tags:
    - Folder
  - type: Storage
    maxItemSize: Large
    grid:
    - 2,0,7,3
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/belt/belt_green.rsi
    state: icon
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/belt/belt_green.rsi
  - type: RepositoryItem
    categoryName: Weapons # Zona14: Оружие
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Appearance
  - type: Explosive
    explosionType: Default
    maxIntensity: 10
    intensitySlope: 3
    totalIntensity: 200
    canCreateVacuum: false
  - type: SubdermalImplant
    permanent: true
    implantAction: ActionActivateMicroBomb
  - type: TriggerOnActivateImplant
  - type: ExplodeOnTrigger
  - type: GibOnTrigger
    deleteItems: true
