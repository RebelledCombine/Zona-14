        - 0,0,2,1
    - type: Explosive
      explosionType: Default
      maxIntensity: 25
      intensitySlope: 2
      totalIntensity: 50
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
      delay: 1.5
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Grenades/stielhandgranate.rsi
