# Zona14: translated Russian names/descriptions to English
- type: entity
  name: F1 grenade
  description: Also known as "Limonka", not an ultimate weapon, but extremely powerful with fragmentation as its primary damage factor.
  parent: GrenadeBase
  id: FragGrenade
  suffix: Stalker, Grenade # Zona14: Stalker, Граната
  components:
    - type: Explosive
      explosionType: Default
      maxIntensity: 10
      intensitySlope: 3
      totalIntensity: 80 # about a ~4 tile radius
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
    - type: ScatteringGrenade
      fillPrototype: PelletClusterLethal
      capacity: 80
    - type: ContainerContainer
      containers:
        cluster-payload: !type:Container
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo

- type: entity
  name: RGD-5 grenade
  description: Soviet offensive hand grenade, classified as an anti-personnel fragmentation hand grenade of the offensive type.
  parent: GrenadeBase
  id: RGD5Grenade
  suffix: Stalker, Grenade # Zona14: Stalker, Граната
  components:
    - type: Explosive
      explosionType: Default
      maxIntensity: 5
      intensitySlope: 2
      totalIntensity: 40 # about a ~4 tile radius
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
    - type: ScatteringGrenade
      fillPrototype: PelletClusterLethal
      capacity: 80
    - type: ContainerContainer
      containers:
        cluster-payload: !type:Container
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Grenades/rgdgrenade.rsi
      layers:
      - state: icon
        map: ["enum.TriggerVisualLayers.Base"]
    - type: GenericVisualizer
      visuals:
        enum.Trigger.TriggerVisuals.VisualState:
          enum.ConstructionVisuals.Layer:
            Primed: { state: primed }
            Unprimed: { state: icon }
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 60
        behaviors:
        - !type:TriggerBehavior
        - !type:DoActsBehavior
          acts: ["Destruction"]

- type: entity
  parent: GrenadeBase
  id: KhattabkaGrenade
  name: Khattabka Grenade
  description: Not the ultimate but extremely powerful weapon.
  suffix: Stalker, Grenade # Zona14: Stalker, Граната
  components:
    - type: Explosive
      explosionType: Default
      maxIntensity: 10
      intensitySlope: 3.99
      totalIntensity: 10
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
      delay: 2
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Grenades/khatabka.rsi
      layers:
        - state: icon
          map: ["enum.TriggerVisualLayers.Base"]
# To be repaired
- type: entity
  name: signal flare
  description: Calls mortar fire with smoke ammunition.
  parent: GrenadeBase
  id: SignalSmoke
  suffix: Stalker, Grenade # Zona14: Stalker, Граната
  components:
    - type: Sprite
      sprite: Objects/Weapons/Grenades/smoke.rsi
    - type: TimerTriggerVisuals
      primingSound:
        path: /Audio/Effects/Smoke-grenade.ogg
    - type: TriggerOnUse
    - type: TimerTrigger
      delay: 4
    - type: DeleteOnTrigger
      keysIn:
      - timer
    - type: SpawnOnTrigger
      proto: HowitzerTimedSpawnerfast


- type: entity
  parent: SmokeGrenade
  id: TearGasGrenadeStalker
  name: K-51 grenade
  description: Soviet tear gas grenade. It was intended not to disperse demonstrations, but for the battlefield. Inhaling smoke is highly undesirable.
  suffix: Stalker
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Grenades/tear_gas_stalker.rsi
  - type: SmokeOnTrigger
    duration: 30
    spreadAmount: 20
    solution:
      reagents:
      - ReagentId: TearGas
        Quantity: 100
  - type: STWeight
    self: 0.20
  - type: EmitSoundOnTrigger
    keysIn:
    - timer
    sound: /Audio/Effects/smoke.ogg
  - type: DeleteOnTrigger
    keysIn:
    - timer
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/Smoke-grenade.ogg

- type: entity
  parent: GrenadeBase
  id: MK3A2Grenade
  name: MK3A2 Grenade
  description: US High Explosive Hand Grenade. It is designed to damage unarmored or lightly armored vehicles, small structures and incapacitate enemy soldiers.
  suffix: Stalker, Grenade # Zona14: Stalker, Граната
  components:
    - type: Explosive
      explosionType: Default
      maxIntensity: 100
      intensitySlope: 5
      totalIntensity: 240
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
      delay: 1.5
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Grenades/fugasgrenade.rsi
      layers:
      - state: icon
        map: ["enum.TriggerVisualLayers.Base"]
    - type: GenericVisualizer
      visuals:
        enum.Trigger.TriggerVisuals.VisualState:
          enum.ConstructionVisuals.Layer:
            Primed: { state: primed }
            Unprimed: { state: icon }

- type: entity
  name: M84 grenade
  description: American flashbang grenade. A special non-lethal device that affects a person with flash-bang and fragmentation effects.
  parent: GrenadeBase
  id: GrenadeFlashBangStalker
  suffix: Stalker, Grenade # Zona14: Stalker, Граната
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Grenades/flashbang.rsi
  - type: FlashOnTrigger
    range: 7
    duration: 25
  - type: EmitSoundOnTrigger
    keysIn:
    - timer
    sound:
      path: "/Audio/Effects/flash_bang.ogg"
  - type: DeleteOnTrigger
    keysIn:
    - timer
  - type: SpawnOnTrigger
    proto: GrenadeFlashEffect
  - type: Appearance

- type: entity
  parent: GrenadeBase
