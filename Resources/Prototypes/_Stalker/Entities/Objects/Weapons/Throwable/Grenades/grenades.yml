- type: entity
  parent: GrenadeBase
  id: StielhandgranateM24Bundle
  name: Stielhandgranate M24 Bundle
  description: A modified variant of the German Stielhandgranate M24 hand grenade used during World War II. The main difference between the grenade bundle and the standard version is that several additional grenade heads without handles are tied to the main Stielhandgranate M24 grenade, which increases the destructive power of the device.
  suffix: Stalker, Grenade # Zona14: Stalker, Граната
  components:
    - type: STWeight
      self: 3.6
    - type: Item
      size: Large
    - type: Explosive
      explosionType: Default
      maxIntensity: 50
      intensitySlope: 4
      totalIntensity: 150
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
      delay: 1.5
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Grenades/stielhandgranate_m24_bundle.rsi
      layers:
      - state: icon
        map: ["enum.TriggerVisualLayers.Base"]
    - type: GenericVisualizer
      visuals:
        enum.Trigger.TriggerVisuals.VisualState:
          enum.ConstructionVisuals.Layer:
            Primed: { state: primed }
            Unprimed: { state: icon }

