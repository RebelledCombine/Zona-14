# Zona14: translated Russian names/descriptions to English
##############################
#          WEAPONS           #
##############################

- type: entity
  parent: SmokeGrenade
  id: ChlorineBalloonStalker
  name: chlorine cylinder
  description: Banned chemical weapons after April 29, 1997, but chlorine cylinders were found in laboratories in the Chernobyl Exclusion Zone. Ignoring the prohibition, they use in large-scale battles, a rather strong and dangerous weapon that can spread over a large area. In this case, it is better to stock up on an oxygen cylinder with a gas mask.
  suffix: Stalker, Events
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Chemical/chlorine_balloon_stalker.rsi
  - type: SmokeOnTrigger
    keysIn:
    - timer
    duration: 90
    spreadAmount: 8000
    solution:
      reagents:
      - ReagentId: ChlorineStalker
        Quantity: 100
  - type: STWeight
    self: 15.5
  - type: Item
    size: Ginormous
  - type: TriggerOnUse
  - type: TimerTrigger
    delay: 1
  - type: EmitSoundOnTrigger
    keysIn:
    - timer
    sound: /Audio/Effects/smoke.ogg
  - type: DeleteOnTrigger
    keysIn:
    - timer
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/Smoke-grenade.ogg

