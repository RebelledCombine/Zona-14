- type: entity
  parent: SmokeGrenade
  id: HydrocyanicGrenadeStalker
  name: Cyclone-B gas bomb
  description: Long-lasting and high-impact chemical weapons, longest duration of the gas. Hydrocyanic acid is highly toxic and can cause lung damage, most likely you will die from lack of oxygen and suffocation. It was used during the First World War. This weapon was found by some stalkers in the Chernobyl Exclusion Zone, their further fate is unknown. Criminal groups possess these weapons for torture or execution. Unfortunately, this weapon is not so popular for use, they claim that the kill zone is too small.
  suffix: Stalker, Events
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Chemical/hydrocyanicgrenade.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Chemical/hydrocyanicgrenade.rsi
