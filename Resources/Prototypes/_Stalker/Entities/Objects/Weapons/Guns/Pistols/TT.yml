- type: entity
  parent: STBaseWeaponPistol
  id: WeaponPistolStalkerTT
  name: Тульский Токарев
  suffix: ST
  description: Легендарный пистолет калибра 7.62х25, разработанный в СССР и прошедший множество войн.
  components:
  - type: STWeight
    self: 0.5
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/tt.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/tt.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/tt.ogg
    projectileSpeed: 55
    minAngle: 6 # Zona14: 5<6
    maxAngle: 22 # Zona14: 20<22
    fireRate: 6 # Zona14: 5<6
    angleIncrease: 2.0 # Zona14: 0.5<2.0
    angleDecay: 8 # Zona14: 5<8
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: TTMag
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 3
        whitelist:
          tags:
            - MagazineTT
      gun_auto_sear:
        name: Insides
        priority: 2
        whitelist:
          tags:
            - STModuleAutoSear
      gun_chamber:
        name: Chamber
        startingItem: STCartridge725PGL
        priority: 1
        whitelist:
          tags:
            - STCartridge918
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_auto_sear: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Craftable
  - type: STWeaponDamageFalloff
    falloffMultiplier: 1.4
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.4
