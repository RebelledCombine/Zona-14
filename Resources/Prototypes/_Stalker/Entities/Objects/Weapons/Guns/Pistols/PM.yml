# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STBaseWeaponPistol
  id: WeaponPistolStalkerPM
  name: PMm
  suffix: ST
  description: "This is a Soviet-made pistol common in the zone. Rookie stalkers won't find a more affordable option anywhere else. It uses 9x18mm ammo."
  components:
  - type: STWeight
    self: 0.5
  - type: Trash
    time: 300
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/Pm.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/Pm.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/pm-shoot.ogg
    projectileSpeed: 45
    minAngle: 5
    maxAngle: 20
    fireRate: 6
    angleIncrease: 1
    angleDecay: 4
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: BasePMMag
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 3
        whitelist:
          tags:
            - MagazinePM
      gun_auto_sear:
        name: Insides
        priority: 2
        whitelist:
          tags:
            - STModuleAutoSear
      gun_chamber:
        name: Chamber
        startingItem: STCartridge918PGJ
        priority: 1
        whitelist:
          tags:
            - STCartridge918
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_auto_sear: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Craftable
  - type: STWeaponDamageFalloff
    falloffMultiplier: 1.4
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.4

# REDO-MODULES
- type: entity
  parent: WeaponPistolStalkerPM
  id: WeaponPistolStalkerPMModifed
  name: 9x19 PMm
  suffix: ST
  description: A PMm modified to use a 9x19mm loaded Glock-17 magazine. The rate of fire has been slightly improved but the recoil suffers for it.
  components:
    - type: STWeight
      self: 0.5
    - type: Gun
      soundGunshot:
        path: /Audio/_Stalker/Effects/Guns/pm-shoot.ogg
      projectileSpeed: 45
      minAngle: 5
      maxAngle: 20
      fireRate: 6
      angleIncrease: 1.3
      angleDecay: 3
      selectedMode: SemiAuto
      availableModes:
        - SemiAuto
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem:
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 2
          whitelist:
            tags:
              - MagazineGlock
        gun_chamber:
          name: Chamber
          startingItem: STCartridge919PSOGJ
          priority: 1
          whitelist:
            tags:
              - STCartridge919
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot
        gun_chamber: !type:ContainerSlot
    - type: Craftable
    - type: STWeaponDamageFalloff
      falloffMultiplier: 1.4
    - type: STWeaponAccuracy
      accuracyMultiplier: 1.4
