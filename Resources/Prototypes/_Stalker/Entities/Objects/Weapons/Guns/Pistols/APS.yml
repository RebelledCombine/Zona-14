# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STBaseWeaponPistol
  id: WeaponPistolStalkerAPS
  name: APS
  suffix: ST
  description: Automatic Stechkin Pistol chambered for 9x18 caliber and its own 20-round magazine format.
  components:
    - type: STWeight
      self: 0.5
    - type: Sprite
      scale: 0.6, 0.6
      sprite: _Stalker/Objects/Weapons/Guns/Pistols/aps.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-0
          map: ["enum.GunVisualLayers.Mag"]
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Guns/Pistols/aps.rsi
    - type: Gun
      soundGunshot:
        path: /Audio/_Stalker/Effects/Guns/pm-shoot.ogg
      projectileSpeed: 45
      minAngle: 10
      maxAngle: 50
      fireRate: 8
      angleIncrease: 1.5
      angleDecay: 3
      selectedMode: FullAuto
      availableModes:
        - FullAuto
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem:
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 3
          whitelist:
            tags:
              - MagazineAPS
        gun_auto_sear:
          name: Insides
          priority: 2
          whitelist:
            tags:
              - STModuleAutoSear
        gun_chamber:
          name: Chamber
          startingItem:
          priority: 1
          whitelist:
            tags:
              - STCartridge918
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot
        gun_auto_sear: !type:ContainerSlot {}
        gun_chamber: !type:ContainerSlot
    - type: MagazineVisuals
      magState: mag
      steps: 1
      zeroVisible: true
    - type: Craftable
    - type: STWeaponDamageFalloff
      falloffMultiplier: 1.4
    - type: STWeaponAccuracy
      accuracyMultiplier: 1.4

- type: entity
  parent: WeaponPistolStalkerAPS
  id: WeaponPistolStalkerAPSHugo
  name: AFS Hugo
  description: A massive and reliable pistol with a sturdy metal frame - a faithful companion of an experienced stalker. It is a weapon of last chance, ready to come to the rescue when a peaceful solution to a conflict becomes impossible. It uses 9x18mm ammo.
  suffix: ST, Skin # Zona14: ST, Skin
  components:
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/_Skins/apshugo.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/_Skins/apshugo.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/_Skins/apshugo.rsi
