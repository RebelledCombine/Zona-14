- type: entity
  name: ГШ-18
  parent: STBaseWeaponPistol
  id: WeaponPistolGSH18
  suffix: ST
  description: Пистолет ГШ-18 был разработан в конце 1990-х годов в тульском Конструкторском бюро приборостроения (КБП). Название он получил по первым буквам фамилий конструкторов, под руководством которых проектировался – Василия Грязева и Аркадия Шипунова, и числа «18», означало емкость магазина. Но сейчас поставляется с разными магазинами.
  components:
    - type: STWeight
      self: 1
    - type: Sprite
      scale: 0.8, 0.8
      sprite: _Stalker/Objects/Weapons/Guns/Pistols/gsh-18.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-0
          map: ["enum.GunVisualLayers.Mag"]
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Guns/Pistols/gsh-18.rsi
    - type: Gun
      projectileSpeed: 45
      minAngle: 8
      maxAngle: 25 # Zona14: 20<25
      angleIncrease: 2.0 # Zona14: 1.2<2.0
      angleDecay: 8 # Zona14: 3<8
      fireRate: 7 # Zona14: 6<7
      availableModes:
        - SemiAuto
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: BaseGSH-18Mag10
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 3
          whitelist:
            tags:
              - MagazineGSH-18
        gun_auto_sear:
          name: Insides
          priority: 2
          whitelist:
            tags:
              - STModuleAutoSear
        gun_chamber:
          name: Chamber
          startingItem: STCartridge919PSOGJ
          priority: 1
          whitelist:
            tags:
              - STCartridge919
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot {}
        gun_auto_sear: !type:ContainerSlot {}
        gun_chamber: !type:ContainerSlot {}
    - type: Craftable
    - type: STWeaponDamageFalloff
      falloffMultiplier: 1.4
    - type: STWeaponAccuracy
      accuracyMultiplier: 1.4
