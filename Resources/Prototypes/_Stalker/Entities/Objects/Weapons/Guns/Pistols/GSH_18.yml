# Zona14: translated Russian names/descriptions to English
- type: entity
  name: GSh-18
  parent: STBaseWeaponPistol
  id: WeaponPistolGSH18
  suffix: ST
  description: The GSh-18 pistol was developed in the late 1990s at the Tula Instrument Design Bureau (KBP). It received its name from the first letters of the names of the designers under whose leadership it was designed - Vasily Gryazev and Arkady Shipunov, and the number "18", which means the capacity of the magazine. It uses 9x19mm ammo.
  components:
    - type: STWeight
      self: 1
    - type: Sprite
      scale: 0.8, 0.8
      sprite: _Stalker/Objects/Weapons/Guns/Pistols/gsh-18.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-0
          map: ["enum.GunVisualLayers.Mag"]
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Guns/Pistols/gsh-18.rsi
    - type: Gun
      projectileSpeed: 45
      minAngle: 8
      maxAngle: 20
      angleIncrease: 1.2
      angleDecay: 3
      fireRate: 6
      availableModes:
        - SemiAuto
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: BaseGSH-18Mag10
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 3
          whitelist:
            tags:
              - MagazineGSH-18
        gun_auto_sear:
          name: Insides
          priority: 2
          whitelist:
            tags:
              - STModuleAutoSear
        gun_chamber:
          name: Chamber
          startingItem: STCartridge919PSOGJ
          priority: 1
          whitelist:
            tags:
              - STCartridge919
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot {}
        gun_auto_sear: !type:ContainerSlot {}
        gun_chamber: !type:ContainerSlot {}
    - type: Craftable
    - type: STWeaponDamageFalloff
      falloffMultiplier: 1.4
    - type: STWeaponAccuracy
      accuracyMultiplier: 1.4
