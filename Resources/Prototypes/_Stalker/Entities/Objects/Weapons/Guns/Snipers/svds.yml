- type: entity
  parent: STBaseWeaponRifleSVDS
  id: STWeaponSniperSVUTop
  name: SVU "Top"
  suffix: ST, Custom # Zona14: ST, Custom
  description: The shortened sniper rifle - a self-loading sniper rifle of bullpup layout, developed by TsKIB SOO on the basis of the SVD. Development of a shortened SVD-based sniper rifle for the USSR airborne troops began at TsKIB SOO in 1977. In 1979 demonstration samples of designer L. V. Bondarev's SVU rifle were offered to the airborne forces, but it did not reach production at that time. Serial production of the SVU began in 1991, and the first production rifles entered service with the 106th Guards Airborne Division, where they underwent field trials. The barrel is fitted with a massive masking muzzle device designed by L. V. Bondarev. The suppressor reduces the sound level of the shot by 10-12% compared to the SVD, almost completely eliminates muzzle flash, and disperses the sound of the shot in such a way that determining the shooter's exact position becomes impossible. The furniture is made of polyamide. On this example, the bulk of the body, including the stock, is wrapped in camouflage tape, with additional wrapping on the scope and muzzle device that breaks up the silhouette of the weapon against vegetation.
  components:
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi

