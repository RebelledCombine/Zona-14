- type: entity
  parent: BaseItem
  id: BaseMagazineBoxRemingtonMagnum
  suffix: Stalker # Zona14: added
  abstract: true
  components:
  - type: RepositoryItem
    categoryName: Патроны
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - CartridgeRemingtonMagnum
    proto: CartridgeRemingtonMagnum
    capacity: 30
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Boxes/magnum.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

# Boxes
- type: entity
  parent: BaseMagazineBoxRemingtonMagnum # Zona14: added
  id: MagazineBoxRemingtonMagnum
  name: ammunition box (.44 remington magnum)
  suffix: Stalker
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeRemingtonMagnum
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"] # Zona14: added
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"] # Zona14: added

- type: entity
  parent: BaseMagazineBoxRemingtonMagnum
  id: MagazineBoxRemingtonMagnumAP
  name: ammunition box (.44 remington magnum armor-piercing)
  suffix: Stalker
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeRemingtonMagnumAP
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: piercing

- type: entity
  parent: BaseMagazineBoxRemingtonMagnum
  id: MagazineBoxRemingtonMagnumHP # Zona14: added
  name: ammunition box (.44 remington magnum hollow-point) # Zona14: added
  suffix: Stalker
