# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseAmmoBoxStalker
  id: 754FMJBox
  name: Ammo Box (7.62x54) FMJ
  description: For Mosin rifle, 10 pieces in the box. Provides penetration of armor class 3.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 76254ammo
  - type: BallisticAmmoProvider
    capacity: 10
    proto: STCartridge754FMJ
    whitelist:
      tags:
        - STCartridge754
  - type: Sprite
    layers:
    - state: 76254
      map: ["enum.GunVisualLayers.Base"]
    - state: 76254ammo-1
      map: ["enum.GunVisualLayers.Mag"]

