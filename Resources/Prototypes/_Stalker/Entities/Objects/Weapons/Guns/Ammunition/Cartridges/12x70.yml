# Zona14: translated Russian names/descriptions to English
# 12x70

- type: entity
  id: BaseShotgunBullet
  name: shell (.50)
  parent: BaseCartridge
  abstract: true
  components:
  - type: STWeight
    self: 0.05
  - type: Tag
    tags:
    - Cartridge
    - ShellShotgun
  - type: CartridgeAmmo
    deleteOnSpawn: true
    soundEject:
      collection: ShellEject
  - type: Sprite
    drawdepth: Items
  - type: Appearance

- type: entity
  id: Cartridge7mmBuckshot
  name: 12x70 Buckshot 7mm
  parent: BaseShotgunBullet
  components:
  - type: CartridgeAmmo
    proto: Bullet7mmBuckshot
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Casings/shotgun_shell.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: SpentAmmoVisuals
    state: "base"

