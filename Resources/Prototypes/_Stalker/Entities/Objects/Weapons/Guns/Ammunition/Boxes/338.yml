# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseAmmoBoxStalker
  id: 338FMJBox
  name: ammo box (.338 Lapua Magnum) FMJ
  description: For sniper rifles, 10 rounds per box. Provides class 4 armor penetration.
  suffix: Stalker
  components:
    - type: MagazineVisuals
      magState: 76239ammo
    - type: BallisticAmmoProvider
      capacity: 10
      proto: STCartridge338FMJ
      whitelist:
        tags:
          - STCartridge338
    - type: Sprite
      layers:
        - state: 338
          map: ["enum.GunVisualLayers.Base"]
        - state: 76239ammo-1
          map: ["enum.GunVisualLayers.Mag"]

