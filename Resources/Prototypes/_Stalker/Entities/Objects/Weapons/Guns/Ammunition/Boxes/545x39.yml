# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseAmmoBoxStalker
  id: 545FMJBox
  name: Ammo Box (5.45x39) FMJ
  description: For Kalashnikov assault rifles of different models, 30 pieces in the box. Penetrates Armor Class 2.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 545ammo
  - type: BallisticAmmoProvider
    capacity: 30
    proto: STCartridge545FMJ
    whitelist:
      tags:
        - STCartridge545
  - type: Sprite
    layers:
    - state: 545
      map: ["enum.GunVisualLayers.Base"]
    - state: 545ammo-1
      map: ["enum.GunVisualLayers.Mag"]

