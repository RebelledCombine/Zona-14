# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseAmmoBoxStalker
  id: Ammobox1255PS12A
  name: 12.7x55 PS12A Ammo Box
  description: For RSh and ASh-12, 1st penetration class, 20 pieces
  components:
  - type: MagazineVisuals
    magState: 1270red
  - type: BallisticAmmoProvider
    capacity: 20
    proto: STCartridge1255PS12A
    whitelist:
      tags:
      - STCartridge1255
  - type: Sprite
    layers:
    - state: 1270
      map: ["enum.GunVisualLayers.Base"]
    - state: 1270red-1
      map: ["enum.GunVisualLayers.Mag"]

