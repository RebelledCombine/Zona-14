# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseAmmoBoxStalker
  id: 7mmBuckshotBox
  name: 7mm buckshot box
  description: For shotguns, 10 pieces in a box. Useless against armor.
  components:
  - type: MagazineVisuals
    magState: 1270red
  - type: BallisticAmmoProvider
    capacity: 10
    proto: Cartridge7mmBuckshot
    whitelist:
      tags:
        - ShellShotgun
  - type: Sprite
    layers:
    - state: 1270
      map: ["enum.GunVisualLayers.Base"]
    - state: 1270red-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  parent: 7mmBuckshotBox
  id: 6mmBuckshotBox
  name: 6.5mm "Express" Buckshot Box
  description: For shotguns, 10 pieces in a box. Provides penetration of only 1 armor class.
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge6mmBuckshot
  - type: Sprite
    layers:
    - state: 1270
      map: ["enum.GunVisualLayers.Base"]
    - state: 1270red-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: t2

