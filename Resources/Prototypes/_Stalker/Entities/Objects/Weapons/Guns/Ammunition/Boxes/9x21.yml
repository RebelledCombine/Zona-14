- type: entity
  parent: BaseAmmoBoxStalker
  id: 921PGJBox
  name: ammo pack (9x21) P (steel case)
  description: For SR-1 and SR-2M, 30 rounds per pack. Penetrates class 2 armor.
  suffix: Stalker
  components:
  - type: Item
    size: Small
    shape:
      - 0,0,1,0
  - type: MagazineVisuals
    magState: 919ammo
  - type: BallisticAmmoProvider
    proto: STCartridge921PGJ
    capacity: 30
    whitelist:
      tags:
        - STCartridge921
  - type: Sprite
    layers:
    - state: 921
      map: ["enum.GunVisualLayers.Base"]
    - state: 919ammo2-1
      map: ["enum.GunVisualLayers.Mag"]

