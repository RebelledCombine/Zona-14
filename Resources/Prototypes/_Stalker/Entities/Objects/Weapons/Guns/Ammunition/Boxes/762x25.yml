# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseAmmoBoxStalker
  id: 725PBox
  name: Ammo Box (7.62x25) P ch
  description: For TT and PPSh, there are 30 pieces in a box. Provides penetration of only 1 armor class.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 76225ammo
  - type: BallisticAmmoProvider
    capacity: 30
    proto: STCartridge725PGL
    whitelist:
      tags:
        - STCartridge725
  - type: Sprite
    layers:
    - state: 76225
      map: ["enum.GunVisualLayers.Base"]
    - state: 76225ammo-1
      map: ["enum.GunVisualLayers.Mag"]

