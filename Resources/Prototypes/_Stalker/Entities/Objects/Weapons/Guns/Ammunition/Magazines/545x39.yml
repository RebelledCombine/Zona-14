# Zona14: translated Russian names/descriptions to English
- type: entity
  id: Base545Mag10
  name: 5.45x39 magazine (10)
  description: 5.45x39 magazine for AK. Bullet capacity 10. They sell empty.
  parent: BaseItem
  suffix: Stalker
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 10
  - type: STWeight
    self: 0.5
  - type: Tag
    tags:
      - Magazine545
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - STCartridge545
    capacity: 10
  - type: Item
    size: Small
    shape:
      - 0,0,0,0
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      storagebase: !type:Container
        ents: [ ]
      item_slot: !type:ContainerSlot { }
  - type: RepositoryItem
    categoryName: Magazines # Zona14: Магазины
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/545/10.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: ItemSlots
    slots:
      item_slot:
        name: mop-bucket-slot-component-slot-name-item123
        ejectVerbText: mop-bucket-slot-component-eject-verb123
        whitelist:
          tags:
            - STElasticRubberRed
            - STElasticRubberGreen
            - STElasticRubberBlue
  - type: ItemMapper
    mapLayers:
      red_10:
        whitelist:
          tags:
            - STElasticRubberRed
      green_10:
        whitelist:
          tags:
            - STElasticRubberGreen
      blue_10:
        whitelist:
          tags:
            - STElasticRubberBlue
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/545/elastic_rubber.rsi

