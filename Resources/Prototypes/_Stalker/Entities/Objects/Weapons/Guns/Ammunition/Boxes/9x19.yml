# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseAmmoBoxStalker
  id: 919PSOGJBox
  name: Ammo Box (9x19) PSO gzh
  description: For MP-5 Viper, in a box of 30 pieces. Provides penetration of only 1 armor class.
  suffix: Stalker
  components:
  - type: Item
    size: Small
    shape:
      - 0,0,1,0
  - type: MagazineVisuals
    magState: 919ammo
  - type: BallisticAmmoProvider
    proto: STCartridge919PSOGJ
    capacity: 30
    whitelist:
      tags:
        - STCartridge919
  - type: Sprite
    layers:
    - state: 919
      map: ["enum.GunVisualLayers.Base"]
    - state: 919ammo-1
      map: ["enum.GunVisualLayers.Mag"]

