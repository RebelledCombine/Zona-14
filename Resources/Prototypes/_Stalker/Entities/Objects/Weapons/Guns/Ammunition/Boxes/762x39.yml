# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseAmmoBoxStalker
  id: 739FMJBox
  name: Ammo Box (7.62x39) FMJ
  description: For some models of Kalashnikov assault rifle, there are 30 pieces in the box. Provides penetration of armor class 3.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 76239ammo
  - type: BallisticAmmoProvider
    capacity: 30
    proto: STCartridge739FMJ
    whitelist:
      tags:
        - STCartridge739
  - type: Sprite
    layers:
    - state: 76239
      map: ["enum.GunVisualLayers.Base"]
    - state: 76239ammo-1
      map: ["enum.GunVisualLayers.Mag"]

