# Zona14: translated Russian names/descriptions to English
- type: entity
  id: BaseMP5Mag
  name: 9x19 MP-5 magazine (35)
  description: 9x19 mm magazine for MP-5 Viper. Bullet capacity 35. They sell empty.
  parent: BaseItem
  suffix: Stalker
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 10
  - type: STWeight
    self: 0.2
  - type: Tag
    tags:
      - MagazineMP5
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - STCartridge919
    capacity: 35
  - type: Item
    size: Small
    shape:
      - 0,0,0,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      storagebase: !type:Container
        ents: [ ]
      item_slot: !type:ContainerSlot { }
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/919/35mp5.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: RepositoryItem
    categoryName: Magazines # Zona14: Magazines
  - type: ItemSlots
    slots:
      item_slot:
        name: mop-bucket-slot-component-slot-name-item123
        ejectVerbText: mop-bucket-slot-component-eject-verb123
        whitelist:
          tags:
            - STElasticRubberRed
            - STElasticRubberGreen
            - STElasticRubberBlue
  - type: ItemMapper
    mapLayers:
      red_35mp5:
        whitelist:
          tags:
            - STElasticRubberRed
      green_35mp5:
        whitelist:
          tags:
            - STElasticRubberGreen
      blue_35mp5:
        whitelist:
          tags:
            - STElasticRubberBlue
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/919/elastic_rubber.rsi

