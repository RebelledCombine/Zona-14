    proto: STCartridge918PGJ
    capacity: 30
    whitelist:
      tags:
        - STCartridge918
  - type: Sprite
    layers:
    - state: 918
      map: ["enum.GunVisualLayers.Base"]
    - state: 919ammo2-1
      map: ["enum.GunVisualLayers.Mag"]

