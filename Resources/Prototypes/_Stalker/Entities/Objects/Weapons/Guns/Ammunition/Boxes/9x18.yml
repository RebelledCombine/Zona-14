  id: 918PGJBox
  name: Ammo Box (9x18) P gzh
  description: For PMm, there are 30 pieces in a box. Provides penetration of only 1 armor class.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 919ammo2
