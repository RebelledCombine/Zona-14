# Zona14: translated Russian names/descriptions to English
- type: entity
  id: TTMag
  name: TT magazine 7.62x25 (8)
  description: 7.62x25 magazine for TT. Bullet capacity 8. They sell empty.
  parent: BasePPSHMag
  suffix: Stalker
  components:
  - type: STWeight
    self: 0.1
  - type: MagazineVisuals
    steps: 7
  - type: Tag
    tags:
      - MagazineTT
  - type: Item
    size: Small
    shape:
      - 0,0,0,0
  - type: Sprite
    scale: 0.6, 0.6
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/725/tt_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - STCartridge725
    capacity: 8
  - type: ItemSlots
    slots:
      item_slot:
        name: mop-bucket-slot-component-slot-name-item123
        ejectVerbText: mop-bucket-slot-component-eject-verb123
        whitelist:
          tags:
            - STElasticRubberRed
            - STElasticRubberGreen
            - STElasticRubberBlue
  - type: ItemMapper
    mapLayers:
      red_mag:
        whitelist:
          tags:
            - STElasticRubberRed
      green_mag:
        whitelist:
          tags:
            - STElasticRubberGreen
      blue_mag:
        whitelist:
          tags:
            - STElasticRubberBlue
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/725/elastic_rubber.rsi

- type: entity
  id: BasePPSHMag
  name: PPSh magazine (35)
  description: PPSh-41 7.62x25 magazine. Bullet capacity 35. They sell empty.
  parent: BaseItem
  suffix: Stalker
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 10
  - type: STWeight
    self: 0.3
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/725/ppsh_magazine.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
      - MagazinePPSh
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - STCartridge725
    capacity: 35
  - type: Item
    size: Small
    shape:
      - 0,0,0,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      storagebase: !type:Container
        ents: [ ]
      item_slot: !type:ContainerSlot { }
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: ItemSlots
    slots:
      item_slot:
        name: mop-bucket-slot-component-slot-name-item123
        ejectVerbText: mop-bucket-slot-component-eject-verb123
        whitelist:
          tags:
            - STElasticRubberRed
            - STElasticRubberGreen
            - STElasticRubberBlue
  - type: ItemMapper
    mapLayers:
      red_magazine:
        whitelist:
          tags:
            - STElasticRubberRed
      green_magazine:
        whitelist:
          tags:
            - STElasticRubberGreen
      blue_magazine:
        whitelist:
          tags:
            - STElasticRubberBlue
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/725/elastic_rubber.rsi

