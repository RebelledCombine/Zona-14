# Zona14: translated Russian names/descriptions to English

##################### .45 ACP #############################

- type: entity
  id: BaseSTSpeedLoader45ACP
  name: Speedloader (.45 ACP)
  suffix: Stalker
  parent: BaseItem
  abstract: true
  components:
    - type: STBulkBuyable # stalker-14-en
      maxQuantity: 10
    - type: Tag
      tags:
        - STSpeedLoader45ACP
    - type: SpeedLoader
    - type: BallisticAmmoProvider
      whitelist:
        tags:
          - Cartridge45ACP
      capacity: 6
    - type: Sprite
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
          ents: []
        item_slot: !type:ContainerSlot { }

- type: entity
  parent: BaseSTSpeedLoader45ACP
  id: STSpeedLoader45ACP
  categories: [ HideSpawnMenu ] # Zona14: For future use and testing
  name: Speedloader (.45 ACP)
  suffix: Stalker
  components:
    - type: BallisticAmmoProvider
      proto: Cartridge45ACPLFMJ
    - type: Sprite
      sprite: Objects/Weapons/Guns/Ammunition/SpeedLoaders/Magnum/magnum_speed_loader.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: base-6
          map: ["enum.GunVisualLayers.Mag"]
    - type: MagazineVisuals
      magState: base
      steps: 7
      zeroVisible: false
    - type: Appearance

- type: entity
  parent: STSpeedLoader45ACP
  id: STSpeedLoader45ACPEmpty
  suffix: Stalker, Empty # Zona14: Stalker, Empty
  components:
    - type: BallisticAmmoProvider
      proto: null


- type: entity
  id: BaseTommyGunMag
  name: "Thompson's SMG Magazine (40)"
  description: Magazine for "Tommy Gun" using .45ACP. Bullet capacity 40. They sell empty.
  parent: BaseItem
  suffix: Stalker
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 10
  - type: STWeight
    self: 0.6
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/919/vityaz.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
      - MagazineTommyGun
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge45ACP
    capacity: 40
  - type: Item
    size: Small
    shape:
      - 0,0,0,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      item_slot: !type:ContainerSlot { }
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

