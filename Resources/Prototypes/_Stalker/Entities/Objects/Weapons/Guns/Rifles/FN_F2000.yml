- type: entity
  abstract: true
  parent: STBaseWeaponRifle
  id: STBaseWeaponRifleF2000
  components:
  - type: STWeight
    self: 4
  - type: PullDoAfter
    pullTime: 3.5
  - type: GunWieldBonus
    minAngle: -50 # Zona14: -47<-50
    maxAngle: -62 # Zona14: -50<-62
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/fn-f2000.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/fn-f2000.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/fn-f2000.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/n_fn2000_shot.ogg
      params:
        volume: -2
    minAngle: 48 # Zona14: 45<48
    maxAngle: 95
    fireRate: 8.5 # Zona14: 8.5<14<8.5
    angleIncrease: 2.0 # Zona14: 1<2.0
    angleDecay: 8 # Zona14: 7.5<8
    projectileSpeed: 60
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base556Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 4
        whitelist:
          tags:
          - Magazine556
      gun_chamber:
        name: Chamber
        startingItem:
        priority: 1
        whitelist:
          tags:
          - STCartridge556
  - type: Scope
    zoom: 1.1
    offset: 15
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.57

- type: entity
  parent: STBaseWeaponRifleF2000
  id: STWeaponRifleF2000
  name:  FN-F2000
  description: This futuristic-looking weapon is a serially produced automatic grenade launcher system of modular design. It is equipped with a 40-mm grenade launcher and a computerized sight-fire control module. Despite its external bulkiness, it is highly ergonomic, easy to fire in all modes and highly reliable.
