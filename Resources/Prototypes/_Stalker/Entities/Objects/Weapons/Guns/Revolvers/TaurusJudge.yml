# Zona14: translated Russian names/descriptions to English

- type: entity
  parent: STBaseWeaponGameRevolver
  id: STWeaponRevolverTaurusJudge
  name: Taurus Judge .45 ACP
  description: Five-shot revolver, the cheapest and worst revolver with poor calibration for .45 ACP caliber.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Guns/Revolvers/taurus_judge.rsi
      scale: 0.9, 0.9
      layers:
      - state: icon
        map: ["enum.GunVisualLayers.Base"]
    - type: Gun
      minAngle: 5
      maxAngle: 80
      fireRate: 3
      angleIncrease: 20
      angleDecay: 20
      projectileSpeed: 50
      selectedMode: SemiAuto
      soundGunshot:
        path: /Audio/_Stalker/Effects/Guns/revolver3.ogg
        params:
          volume: -4
    - type: RevolverAmmoProvider
      whitelist:
        tags:
          - Cartridge45ACP
          - STSpeedLoader45ACP
      proto: null
      capacity: 5
      chambers: [ null, null, null, null, null ]
      ammoSlots: [ null, null, null, null, null ]
      soundEject:
        path: /Audio/Weapons/Guns/MagOut/revolver_magout.ogg
      soundInsert:
        path: /Audio/Weapons/Guns/MagIn/revolver_magin.ogg
    - type: STWeight
      self: 1.58
    - type: StaticPrice
      price: 30
    - type: UseDelay
      delay: 1
    - type: RepositoryItem
      categoryName: Weapons # Zona14: Weapons
    - type: STWeaponDamageFalloff
      falloffMultiplier: 0.8
    - type: STWeaponAccuracy
      accuracyMultiplier: 1.43
