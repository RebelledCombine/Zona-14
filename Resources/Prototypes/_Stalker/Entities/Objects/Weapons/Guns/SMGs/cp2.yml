# Zona14: translated Russian names/descriptions to English
# Zona14: Seraphim custom, may become publicly available in the future
- type: entity
  name: SR-2 "Veresk"
  suffix: ST, Skin # Zona14: ST, Skin
  parent: STBaseWeaponSMG
  id: STWeaponSMGStalkerCP2Veresk
  description: A compact submachine gun developed for the powerful armor-piercing 9x21mm cartridge at the request of the FSB and FSO of Russia. This particular SMG is a homemade modification allowing it to fire 9x19mm Parabellum rounds.
  components:
    - type: STWeight
      self: 2.6
    - type: PullDoAfter
      pullTime: 1.5
    - type: GunWieldBonus
      minAngle: -40
      maxAngle: -40
    - type: Item
      sprite: _Stalker/Objects/Weapons/Guns/SMGs/cp2.rsi
      size: Large
      shape:
        - 0,0,5,1
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Guns/SMGs/cp2.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Guns/SMGs/cp2.rsi
    - type: Gun
      minAngle: 40
      maxAngle: 90
      fireRate: 10
      angleIncrease: 1.2
      angleDecay: 4
      projectileSpeed: 55
      soundGunshot:
        path: /Audio/_Stalker/Effects/Guns/919.ogg
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: VityazMag
          insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
          ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
          priority: 4
          whitelist:
            tags:
              - MagazineVityaz
        gun_chamber:
          name: Chamber
          startingItem: STCartridge919PSOGJ
          priority: 1
          whitelist:
            tags:
              - STCartridge919
    - type: STWeaponDamageFalloff
      falloffMultiplier: 0.8
    - type: STWeaponAccuracy
      accuracyMultiplier: 1.42

