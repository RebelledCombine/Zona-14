# Zona14: translated Russian names/descriptions to English
- type: entity
  name: PFM-1 "Petal" mine
  parent: BaseLandMine
  suffix: Stalker
  description: One foot here, another there.
  id: LandMineExplosiveStalker
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 6.7
    intensitySlope: 4
    totalIntensity: 60 # about a ~4 tile radius
    canCreateVacuum: false
  - type: DeleteOnTrigger
  - type: Sprite
    sprite: _Stalker/Objects/Misc/lepestok.rsi
    layers:
    - state: armed

- type: entity
  parent: BaseItem
  id: LandMineExplosiveStalkerCompact
  name: unidentified PFM-1 "Petal" mine
  description: One foot here, the other there. For installation, put on the ground and lightly dig with a sapper shovel.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Misc/lepestok.rsi
    state: unarmed
  - type: Flatpack
    entity: LandMineExplosiveStalker
  - type: Appearance

- type: entity
  id: RandomLandMineExplosiveStalker
  name: PFM-1 Petal Mine Spawner (Crate, 5% Chance, Resources)
  suffix: Stalker
  parent: FlexibleMarker
  components:
    - type: Sprite
      layers:
      - state: red
    - type: RandomSpawner
      prototypes:
        - LandMineExplosiveStalker
      chance: 0.05
      offset: 0.5
