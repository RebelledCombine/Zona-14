# Zona14: translated Russian names/descriptions to English

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesPortyanki
  name: footcloths
  description: Pieces of cloth to wrap your feet around before putting them into shoes or boots. Designed to protect the feet from rubbing with the inner parts of the shoe.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/shoes/portyanki.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/shoes/portyanki.rsi

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesNovice
  name: "Beginner's Boots"
  description: Regular leather boots made from scraps of leather.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/shoes/boots_novice.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/shoes/boots_novice.rsi

- type: entity
  parent: ClothingShoesMilitaryBase
  id: STClothingShoesBootsCombat
  name: Combat Boots
  suffix: ST
  description: Reliable military boots, fit for combat missions or active operations. The struggle is all — the struggle is eternal.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/shoes/boots_army.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/shoes/boots_army.rsi

- type: entity
  parent: STClothingShoesBootsCombat
  id: STClothingShoesBootsCombatFilled
  suffix: ST, Filled
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/shoes/boots_army.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/shoes/boots_army.rsi
  - type: ContainerFill
    containers:
      item:
      - CombatKnife

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesPVH
  name: PVC Boots
  description: Reliable protection against moisture, dirt, toxic waste and in the most unpleasant weather conditions. Made of durable and flexible polyvinyl chloride that prevents reagents from penetrating inside your feet.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/shoes/pvh.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/shoes/pvh.rsi
  - type: Armor
    armorClass: 0
    modifiers:
      flatReductions:
        Caustic: 1
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95

- type: entity
  parent: STClothingShoesBootsCombat
  id: ClothingShoesPVHCastom
  name: boots with frogs
  description: Reliable protection from moisture, dirt, toxic waste and the most unpleasant weather conditions. Made of durable and flexible polyvinyl chloride that prevents reagents from penetrating inside your feet.
  components:
