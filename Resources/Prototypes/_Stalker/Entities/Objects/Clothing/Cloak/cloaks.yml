- type: entity
  parent: STClothingCapeBase
  id: STClothingNeckExoskeletonSci
  suffix: Stalker
  name: Cargo-Type Exoskeleton
  description: Developed by research institute scientists, this exoskeleton was designed for efficiently transporting large cargo loads without vehicles. Offers no protection against anomalies, mutants, or bullets.
  components:
  - type: STWeight
    self: 10
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/exoskelet_science.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/exoskelet_science.rsi
  - type: STPoweredExoskeleton
    overloadChange: 150
    maximumChange: 200
    toggleAction: ActionToggleExoskeleton
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: PowerCellDraw
    drawRate: 0.4
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: Tag
    tags: []

- type: entity
  parent: STClothingCapeBase
  id: ClothingOuterCoatAugust
  name: August Raincoat
  description: An unusual cloak crafted by skilled technicians. It's painted in a camouflage pattern, helping conceal oneself in the Zone. It's lightweight due to the lack of a hood and has a layer of insulating material that provides some protection from chemical agents.
  suffix: ST, T3
  components:
  - type: STWeight
    self: 5
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/august.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/august.rsi
  - type: Armor
    armorClass: 2
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
        Caustic: 0.9
        Radiation: 0.9
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,2,0,3
      - 0,-2,0,0
      - 2,2,2,3
      - 2,-1,3,-0
      - 4,2,4,3
      - 5,-1,6,-0
      - 6,2,6,3
      - 8,2,8,3
      - 8,-2,8,0
  - type: ExplosionResistance
    damageCoefficient: 0.85
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container { } # Zona14: pre-declare so SpawnAndDelete test doesn't trip ContainerContainer mutation
  - type: Craftable

- type: entity
  parent: STClothingCapeBase
  id: ClothingOuterCoatAugustM
  name: August-M Raincoat
  description: An unusual cloak crafted by skilled technicians. It features a camouflage pattern that helps conceal oneself in the Zone. It is an improved version of the August cloak of the same name. It features a layer of insulating material that provides some protection from chemical agents. It is equipped with a durable hood and a gas mask for additional protection from external influences.
  suffix: ST, T3
  components:
  - type: STWeight
    self: 6
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/august-m.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/august-m.rsi
  - type: Armor
    armorClass: 2
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
        Caustic: 0.9
        Radiation: 0.9
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,2,0,3
      - 0,-2,0,0
      - 2,2,2,3
      - 2,-1,3,-0
      - 4,2,4,3
      - 5,-1,6,-0
      - 6,2,6,3
      - 8,2,8,3
      - 8,-2,8,0
  - type: ExplosionResistance
    damageCoefficient: 0.85
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetAugustM
    requiredSlot:
    - cloak
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container { }
  - type: Craftable

- type: entity
  parent: STClothingHeadHatBase
