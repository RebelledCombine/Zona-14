# Poisk
- type: entity
  parent: STClothingCapeT1Base
  id: ClothingOuterCoatPoisk
  name: "explorer's cloak"
  description: This cape is not just a piece of jewelry, it symbolizes the desire for adventure and the thirst for discovery.
  components:
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/poisk_plash.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/poisk_plash.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodCoatStalker
    slot: head
  - type: Armor
    armorLevels:
      environment: 1

- type: entity
  parent: STClothingHeadHatBase
