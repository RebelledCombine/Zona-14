# Zona14: translated Russian names/descriptions to English
# Base
- type: entity
  abstract: true
  parent: STClothingCapeBase
  id: STClothingCapeT1Base
  name: T1 raincoat base
  suffix: ST, T1
  components:
  - type: STWeight
    self: 2
  - type: Craftable
  - type: Armor
    armorClass: 1
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95

# Zona14: Дождевик
- type: entity
  parent: STClothingCapeT1Base
  id: ClothingOuterCoatDoshdevik
  name: raincoat
  suffix: ST, T1
  description: a thick raincoat that protects you from rain and certain chemicals.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/doshdevik.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/doshdevik.rsi
  - type: Storage
    maxItemSize: Large
    grid:
      - 0,0,1,1
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Caustic: 1.5
  - type: ToggleableClothing
    slot: head
    requiredSlot: CLOAK
    clothingPrototype: ClothingHeadHelmetDoshdevikCoat

- type: entity
  parent: STClothingHeadHatBase
  id: ClothingHeadHelmetDoshdevikCoat
  name: raincoat hood
  description: Covers your head
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/doshdevik.rsi
    state: icon-HELM
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/doshdevik.rsi

# KKK
- type: entity
  parent: STClothingCapeT1Base
  id: ClothingOuterCoatKKK
  name: ku-klux-klan hoodie
  suffix: ST, T1
  description: The Ku Klux Klan's white robes are long white hooded garments that symbolize the anonymity and unity of the organization's members. These robes are often associated with the racist actions of the KKK, emphasizing their ideology of white supremacy.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/kkk.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/kkk.rsi
  - type: ToggleableClothing
    slot: head
    requiredSlot: CLOAK
    clothingPrototype: ClothingHeadHelmetKKKCoat
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Heat: 0.5

- type: entity
  parent: STClothingHeadHatBase
  id: ClothingHeadHelmetKKKCoat
  name: capirot
  categories: [ HideSpawnMenu ]
  description: A medieval Spanish headdress, a pointed conical cap. Originally made of cardboard, capirotes were used by Spanish flagellants. During the Inquisition, cloth-covered capirotes were used, along with yellow capes, to dress those condemned to death.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/kkk_hood.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/kkk_hood.rsi

