# Zona14: translated Russian names/descriptions to English

# Zona14: Seva's cloak
- type: entity
  parent: STClothingCapeBase
  id: STClothingCapeArmorChainmailSeva
  name: "Seva's Chainmail Cloak"
  suffix: ST, T4
  description: "A closed-loop suit developed by the Kiev Research Institute, designed specifically for work in the Zone, complete with a chainmail cloak for additional protection."
  components:
  - type: Craftable
  - type: STWeight
    self: 5.5
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/seva_cloaks.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/seva_cloaks.rsi
  - type: Armor
    armorClass: 2
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.9
        Heat: 0.8
        Caustic: 0.7
        Shock: 0.8

- type: entity
  parent: STClothingCapeArmorChainmailSeva
  id: STClothingCapeFreedomChain
  name: "Freedom's Chainmail Cloak"
  description: Chain mail combined with a camouflage net in the camouflage of Freedom.
  suffix: ST, T4
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/freechain.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/freechain.rsi
  - type: STWeight
    self: 5.5
  - type: ToggleableClothing
    clothingPrototype: ClothingHatChainFreedom
    requiredSlot:
    - cloak
    slot: head

- type: entity
  parent: STClothingHeadHatBase
  id: ClothingHatChainFreedom
  name: hood
  description: Freedom Chainmail hood
  suffix: ST
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/coat_hat_freechain.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/coat_hat_freechain.rsi
  - type: HideLayerClothing
    slots:
    - Hair
