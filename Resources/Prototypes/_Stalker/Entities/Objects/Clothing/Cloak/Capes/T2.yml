# Zona14: translated Russian names/descriptions to English
# Base
- type: entity
  abstract: true
  parent: STClothingCapeBase
  id: STClothingCapeT2Base
  name: T2 raincoat base
  suffix: ST, T2
  components:
  - type: STWeight
    self: 3
  - type: Armor
    armorClass: 1
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
  - type: ExplosionResistance
    damageCoefficient: 0.85
  - type: ToggleableClothing
    slot: head
    requiredSlot: CLOAK
  - type: Craftable

# Zona14: Болотный
- type: entity
  parent: STClothingCapeT2Base
  id: ClothingOuterCoatBolotniy
  name: '"swamp" raincoat'
  suffix: ST, T2
  description: a thick cloak with a camouflage of leaves, grass, and sticks applied to the top.
  components:
  - type: STWeight
    self: 20
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/bolotniy.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/bolotniy.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetBolotniyCoat
  - type: Armor
    armorLevels:
      environment: 2

- type: entity
  parent: STClothingHeadHatBase
  id: ClothingHeadHelmetBolotniyCoat
  name: hood of the "swamp man" cloak
  categories: [ HideSpawnMenu ]
  description: Covers your head
  components:
  - type: STWeight
    self: 4
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/bolotniy_hat.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/bolotniy_hat.rsi
  - type: HideLayerClothing
    slots:
    - Hair

