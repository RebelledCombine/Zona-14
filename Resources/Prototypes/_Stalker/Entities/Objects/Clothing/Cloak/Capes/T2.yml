# Zona14: кожанный плащ
- type: entity
  parent: STClothingCapeT2Base
  id: ClothingOuterCoatStalker
  name: leather raincoat
  description: Normal black leather cloak. It does not provide noticeable protection to the carrier. Except that it will not let you freeze at night and soften the bite of a blind dog. Quite inconvenient in the conditions of the Zone, but, nevertheless, it is often used by bandits - perhaps solely because of its appearance.
  components:
  - type: STWeight
    self: 1.5
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/coat_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/coat_stalker.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodCoatStalker
  - type: Craftable

- type: entity
