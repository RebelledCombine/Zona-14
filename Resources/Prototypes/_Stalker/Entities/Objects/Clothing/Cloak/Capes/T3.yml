# Zona14: translated Russian names/descriptions to English
# Zona14: Укреплённый плащ
- type: entity
  parent: STClothingCapeBase
  id: STClothingCapeCoatReinforced
  name: reinforced cloak
  description: Cloak with sewn-in chain mail and reinforced with armide cloth, which gives a total of about Class 3 protection. By itself, it is heavy and will not fit an armor.
  suffix: ST, T3
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/coat_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/coat_stalker.rsi
  - type: STWeight
    self: 7.5
  - type: Craftable
  - type: Armor
    armorClass: 2
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.90
        Heat: 0.85


# Zona14: Охотничий Плащ
- type: entity
  parent: STClothingCapeBase
  id: ClothingOuterCoatLoyalistLight
  name: Hunting Cloak
  description: a cloak that is made specifically for hunting in extreme conditions, for example, in the conditions of the Chernobyl Exclusion Zone, painted in green camouflage.
  suffix: ST, T3
  components:
  - type: STWeight
    self: 4
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/hunterskiy.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/hunterskiy.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,4,0,5
      - 0,0,0,2
      - 2,4,2,5
      - 2,1,3,2
      - 4,4,4,5
      - 5,1,6,2
      - 6,4,6,5
      - 8,4,8,5
      - 8,0,8,2
  - type: ExplosionResistance
    damageCoefficient: 0.85
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetLoyalistCoatlight
    requiredSlot:
    - cloak
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []
  - type: Craftable

- type: entity
  parent: STClothingHeadHatBase
  id: ClothingHeadHelmetLoyalistCoatlight
  name: Hunting Hood
  description: will protect the head... from the rain... I guess?
  suffix: ST
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/coat_hat_hunter.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/coat_hat_hunter.rsi
  - type: HideLayerClothing
    slots:
    - Hair

# Zona14: Кевларовый Плащ

