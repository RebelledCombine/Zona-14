# Zona14: translated Russian names/descriptions to English

- type: entity
  parent: STClothingMaskGas
  id: ClothingMaskGP5
  suffix: ST, T2, Caustic
  name: GP-5 gas mask
  description: Soviet gas mask designed specifically for civilian use. GP-5 is the most common gas mask in the post-Soviet space, which is not surprising, because GP-5 was produced three times more than the inhabitants of the Soviet Union. Protects against radiation.
  components:
  - type: Tag
    tags:
      - BlockMask
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/mask/gp5.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/mask/gp5.rsi
  - type: Armor
    modifiers:
      flatReductions:
        Radiation: 0.5
        Caustic: 0.5
      coefficients:
        Caustic: 0.85
        Radiation: 0.9

