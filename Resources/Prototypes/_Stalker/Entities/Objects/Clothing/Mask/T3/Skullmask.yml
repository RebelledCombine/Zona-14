  id: STClothingHeadHelmetSerafimSkull
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/Head/Sera_/coat_hat_skull.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/Head/Sera_/coat_hat_skull.rsi
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
      - BlockMask
  - type: Armor
    armorClass: 3
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Piercing: 0.80
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: Reflect
    reflectProb: 0.10
