# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingMaskGas
  id: STClothingMaskSeraphimSkull
  name: steel skull mask
  description: A mask has always been something to hide your face behind, or to protect against toxic gases or bullets. But this mask’s purpose is intimidation. Behind it hides only anger and hatred toward anyone who dares to look at it.
  suffix: ST, T3, Custom
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/mask/skullmasksera.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/mask/skullmasksera.rsi
  - type: Tag
    tags:
      - BlockMask
  - type: STWeight
    self: 4
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
  - type: ToggleableClothing
    slot: head
    requiredSlot: mask
    clothingPrototype: STClothingHeadHelmetSerafimSkull

- type: entity
