# Zona14: translated Russian names/descriptions to English

- type: entity
  parent: STClothingMaskGas
  id: ClothingMaskGP7
  suffix: ST, T3, Caustic
  name: GP-7 gas mask
  description: Filtering personal protective equipment for human respiratory, eye, and facial skin. The prototype of the MGP mask from the GP-7 set was manufactured in 1979 at the Enpo Neorganika, and the prototype of the filter - GP-7K - MKG is dated the 2nd quarter of 1980.  Protects against radiation.
  components:
  - type: Tag
    tags:
      - BlockMask
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/mask/gp7.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/mask/gp7.rsi
  - type: Armor
    modifiers:
      flatReductions:
        Radiation: 1
        Caustic: 1
      coefficients:
        Radiation: 0.85
        Caustic: 0.8
  - type: Craftable

