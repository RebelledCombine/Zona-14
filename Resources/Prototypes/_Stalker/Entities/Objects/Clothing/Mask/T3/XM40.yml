- type: entity
  parent: STClothingMaskGas
  id: ClothingMaskGasXM40
  suffix: ST, T3, Rad
  name: Gas Mask XM40
  description: Gas mask of the 'Beryl-5M' kit.
  components:
  - type: Tag
    tags:
      - BlockMask
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/mask/xm40military.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/mask/xm40military.rsi
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Armor
    modifiers:
      flatReductions:
       Radiation: 1.5
       Caustic: 1.5
      coefficients:
        Radiation: 0.85
        Caustic: 0.9
  - type: Craftable

