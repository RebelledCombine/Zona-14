# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: STClothingMaskGas
  id: STClothingMaskGasStandardT1Base
  name: T1 Standard Radiation Mask Base
  suffix: ST, T1, Rad
  components:
  - type: Tag
    tags:
      - BlockMask
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/mask/gasmask_exoskelet.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/mask/gasmask_exoskelet.rsi
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Craftable
  - type: Armor
    modifiers:
      flatReductions:
        Radiation: 0.5
        Caustic: 0.5
      coefficients:
        Radiation: 0.85
  - type: HideLayerClothing
    hideOnToggle: true

