# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: [ClothingMaskBaseButcherable, BaseFoldable]
  id: ClothingMaskBalaklavaBase
  abstract: true
  components:
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
  - type: FoldableClothing
    foldedSlots:
    - HEAD
    unfoldedSlots:
    - MASK
    foldedHideLayers: []
    unfoldedHideLayers:
    - Snout
    - Hair
    - FacialHair
  - type: IdentityBlocker
    enabled: true # _Zona14: matches post-init state set by FoldableClothing; otherwise UninitializedSaveTest flags a modify-on-spawn diff.
    coverage: MOUTH
  - type: Sprite
    layers:
    - state: icon_head
      map: ["foldedLayer"]
      visible: true
    - state: icon
      map: [ "unfoldedLayer" ]
      visible: false
  - type: HideLayerClothing
    slots:
    - Snout
    - Hair
    - FacialHair
    hideOnToggle: true


# Zona14: Three-hole balaclava

- type: entity
  parent: ClothingMaskBalaklavaBase
  id: ClothingMaskNeckBalaklava1
  name: three-hole balaclava
  description: It is a knitted balaclava with three holes for the eyes and mouth.
  components:
