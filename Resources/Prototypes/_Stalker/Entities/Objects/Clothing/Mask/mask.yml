- type: entity
  parent: ClothingMaskBase
  id: ClothingMaskRenegate
  name: "'Buffalo' welding helmet"
  description: Welding helmet turned into a weapon. Metal, horns, orange stripes - everything screams aggression. To look into the face of such an opponent is already half a loss.
  components:
  - type: STWeight
    self: 3
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/mask/tegilla_rene.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/mask/tegilla_rene.rsi
  - type: Tag
    tags:
      - BlockMask
  - type: HideLayerClothing
    slots:
    - Snout
  - type: Armor
    armorClass: 3
    modifiers:
      coefficients:
        Piercing: 0.80
        Blunt: 0.80
        Slash: 0.80
          

