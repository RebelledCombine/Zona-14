# Zona14: translated Russian names/descriptions to English
# Base

- type: entity
  abstract: true
  parent: BaseItem
  id: STOxygenTanksBase
  suffix: ST, Filled
  components:
  - type: Item
    size: Huge
    shape:
    - 0,0,8,6
  - type: STWeight
    self: 1
  - type: Sprite
    sprite: Objects/Tanks/generic.rsi
    state: icon
  - type: Tag
    tags:
    - BlockBack
  - type: Clothing
    quickEquip: false
    sprite: Objects/Tanks/generic.rsi
    slots:
    - Back
  - type: ActivatableUI
    key: enum.SharedGasTankUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SharedGasTankUiKey.Key:
        type: GasTankBoundUserInterface
  - type: Explosive
    explosionType: Default
    maxIntensity: 20
  - type: PhysicalComposition
    materialComposition:
      Steel: 185
  - type: StaticPrice
    price: 30
  - type: Tool
    qualities:
    - Rolling
    speedModifier: 0.6
  - type: GasTank
    outputPressure: 21.3
    air:
      # 31 minutes
      volume: 5
      moles:
        - 2.051379050 # oxygen
      temperature: 293.15

# Zarya

- type: entity
  parent: STOxygenTanksBase
  id: STOxygenTanksZarya
  name: Sunrise Set Oxygen Tanks
  description: Oxygen tanks from the "Sunrise" set — containers holding various gases or liquids under pressure. Used with the "Sunrise" armored suit.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/backpacks/Tanks/zarya.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/backpacks/Tanks/zarya.rsi

