# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: Clothing
  id: STClothingPsyHelm
  suffix: ST
  components:
  - type: Sprite
    state: icon
  - type: Item
    size: Small
  - type: Clothing
    slots:
    - ears
    sprite: Clothing/Ears/Headsets/base.rsi

- type: entity
  parent: STClothingPsyHelm
  id: STPsyHelm1
  name: Psi-Helmet
  description: A makeshift prototype device for psi-radiation protection. Looks like oversized headphones.
  suffix: ST
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/Ears/psy-helm-1.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/Ears/psy-helm-1.rsi
  - type: Armor
    armorClass: 0
    modifiers:
      flatReductions:
        Psy: 2

- type: entity
