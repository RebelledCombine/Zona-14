# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: ClothingBeltStorageStalkerBase
  id: ClothingBeltTarzanBlack
  name: RPS "Tarzan"
  description: A very useful black RPS for carrying everything from walkie-talkies to magazines. It is especially popular among the stalker community.
  suffix: ST
  components:
  - type: STWeight
    self: 1
  - type: STWeightInsideReduction
    reductionFraction: 0.50 # Zona14 change
  - type: Storage
    maxItemSize: Normal
    quickInsert: true
    areaInsert: true
    areaInsertRadius: 2
    grid:
      - 0,2,0,3
      - 1,0,1,0
      - 2,2,2,3
      - 3,0,3,0
      - 4,2,4,3
      - 5,0,5,0
      - 6,2,6,3
      - 7,0,7,0
      - 8,2,8,3
      - 9,0,9,0
      - 10,2,10,3
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/belt/tarzan_black.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/belt/tarzan_black.rsi

