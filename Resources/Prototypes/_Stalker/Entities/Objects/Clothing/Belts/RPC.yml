- type: entity
  parent: ClothingBeltStorageStalkerBase
  id: ClothingBeltBandolierStalker
  name: bandolier
  description: Bandolier for cartridges of any caliber.
  components:
    - type: STWeight
      self: 0.5
    - type: STWeightInsideReduction
      reductionFraction: 0.50 # Zona14 change
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/belt/belt_novice.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/belt/belt_novice.rsi
    - type: Item
      size: Huge
    - type: Storage
      maxItemSize: Normal
      grid:
        - 0,0,7,7
      whitelist:
        tags:
          - Cartridge
        components:
          - CartridgeAmmo

- type: entity
  parent: ClothingBeltStorageStalkerBase
  id: STClothingBeltThrowingKnifes
  name: harness
  description: Allows knives to be conveniently stored and quickly retrieved
  components:
    - type: STWeightInsideReduction
      reductionFraction: 0.50 # Zona14 change
    - type: STWeight
      self: 0.5
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/Belts/knife_belt.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/Belts/knife_belt.rsi
    - type: Item
      size: Huge
    - type: Storage
      maxItemSize: Normal
      grid:
        - 0,0,7,7
      quickInsert: true
      areaInsert: true
      whitelist:
        tags:
          - Knife
    - type: ItemMapper
      mapLayers:
        knife:
          whitelist:
            tags:
              - Knife
      sprite: _Stalker/Objects/Clothing/Belts/knife_belt_overlay.rsi
    - type: Appearance

