# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: STClothingHeadBase
  id: STClothingHeadHelmetTacticalT1Base
  name: T1 Tactical Helmet Base
  suffix: ST, T1, Tactical
  components:
  - type: STWeight
    self: 2
  - type: Armor
    armorClass: 1
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.90
  - type: Craftable
  - type: Reflect
    reflectProb: 0.03
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg


