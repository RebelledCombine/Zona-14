- type: entity
  parent: [ClothingHeadBase, BaseFoldable]
  id: STClothingHeadHatFoma
  name: Old Ushanka
  description: Gray Soviet ushanka is a practical winter headdress made of thick cloth with fur lapels. It reliably protects against frost, is versatile and concise. Classics of the Soviet era.
  components:
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/foma.rsi
  - type: Appearance
  - type: AddAccentClothing
    accent: RussianAccent
  - type: Foldable
    canFoldInsideContainer: true
  - type: FoldableClothing
    foldedEquippedPrefix: up
    foldedHeldPrefix: up
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/foma.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon-up
      map: ["foldedLayer"]
      visible: false

