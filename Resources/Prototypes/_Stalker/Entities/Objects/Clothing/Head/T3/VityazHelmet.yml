# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: STClothingHeadBase
  id: STClothingHeadHelmetTacticalT3Base
  name: T3 Tactical Helmet Base
  suffix: ST, T3, Tactical
  components:
  - type: Craftable
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
      - BlockMask
  - type: STWeight
    self: 4
  - type: Armor
    armorClass: 3
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Piercing: 0.80
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: Reflect
    reflectProb: 0.10
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HelmetVisor
    toggleAction: ActionToggleHelmetVisor
    equippedPrefixUp: visor-up
    iconStateUp: icon-visor-up
    visorUpReflectProb: 0.09
    visorUpModifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.85
    isToggleable: true
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
  - type: SlotBlockOverride
    tag: BlockMask

- type: entity
  parent: STClothingHeadHelmetTacticalT3Base
  id: ClothingHeadHelmetVityaz1C
  name: Vityaz 1C helmet
  description: The Vityaz-S shockproof helmet was manufactured at the Steel Research Institute. Development of the helmet began in the late 1980s. The helmet received a visor, although it turned out to be massive.
