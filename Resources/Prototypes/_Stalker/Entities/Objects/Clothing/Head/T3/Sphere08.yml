    sprite: _Stalker/Objects/Clothing/hats/berill5m_helm_project.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/berill5m_helm_project.rsi
  - type: Armor
    armorClass: 3
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.85
  - type: Reflect
    reflectProb: 0.12
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg

- type: entity
  parent: ClothingHeadHelmetBerill5MMilitary
  id: ClothingHeadHelmetBereza
  name: Sfera-8 "Listok"
  suffix: ST, Custom # Zona14: ST, Custom
  description: A "Sfera-8" protective helmet, modified and reskinned in "Bereza" camouflage. Provides reliable protection of the head from bullets and shrapnel while maintaining its integrity. Equipped with a side flashlight for working in low-light conditions. Worn by use, but has not lost its level of protection.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/sphere_bereza.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/sphere_bereza.rsi