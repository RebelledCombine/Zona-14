# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: STClothingHeadBase
  id: STClothingHeadHelmetEnvironmentT3Base
  name: T3 Environment Protection Helmet Base
  suffix: ST, T3, Env
  components:
  - type: Craftable
  - type: STWeight
    self: 2.1
  - type: Armor
    armorClass: 3
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.95
        Psy:   0.90
  - type: Reflect
    reflectProb: 0.08
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair

- type: entity
  parent: STClothingHeadHelmetEnvironmentT3Base
  id: ClothingHeadHelmetBerill5MMilitary
  name: Sphere-08 helmet
  description: Sphere-08 helmet used by the Ukrainian Military. Lighter than other Class 3 helmets, it trades some ballistic protection for limited psi-shielding. Modified with a small headlamp.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/berill5m_helm_military.rsi
    layers:
    - state: icon
    - state: light-icon
      shader: unshaded
      visible: false
      map: [ "light" ]
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/berill5m_helm_military.rsi
    equippedPrefix: off
  - type: Item
    heldPrefix: off
  - type: ItemTogglePointLight
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 8
    netsync: false
  - type: Appearance
  - type: HandheldLight
    addPrefix: false
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: radiating
        interpolate: Linear
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        startValue: 0.1
        endValue: 2.0
        isLooped: true
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: on-equipped-HELMET
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot

- type: entity
  parent: STClothingHeadHelmetCombatT2Base
  id: ClothingHeadHelmetBerill5MMonolith
  name: Sphere-08 helmet
  description: Sphere-08 helmet used by Monolith cultists. Lighter than other Class 3 helmets, it trades some ballistic protection for limited psi-shielding, which is unfortunately lost on its fanatical users.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/berill5m_helm_monolith.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/berill5m_helm_monolith.rsi
  - type: PersonalDamage
    damage:
      types:
        Radiation: 18.01

