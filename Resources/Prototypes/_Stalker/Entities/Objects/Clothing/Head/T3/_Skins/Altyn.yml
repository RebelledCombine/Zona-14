  description: This is an improved modification of the classic Monolith "Sphere-12" helmet, developed and refined by the Seraphim masters for protection in Zone conditions. Its design combines the durability of the original with new elements reflecting Seraphim ideology. The helmet is covered with a special camouflage typical of the group, and its surface is adorned with prayer symbols and protective markings that, according to Seraphim beliefs, enhance its capabilities. The internal systems are upgraded with filters and dual coating to increase protection from radiation and prevent Psi exposure to the wearer. Now painted gray.
