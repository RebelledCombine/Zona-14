  id: STClothingHeadHelmetSeraphimAltin
  name: Armored helmet "Guardian"
  description: This is an advanced modification of the Monolith's classic Sphere-12 helmet, designed and refined by Seraph masters for protection in the Zone. Its design combines the strength of the original and new elements that reflect the ideology of the Seraphim. The helmet is covered in special camouflage characteristic of the group, and its surface is decorated with prayer symbols and protective signs, which, according to the beliefs of the Seraphim, enhance his abilities. The internal systems are upgraded with filters and a double coating to increase protection against Radiation and prevent Psi-Effects on the host's body.
  suffix: ST, T3, Custom
