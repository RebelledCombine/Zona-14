# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: STClothingHeadBase
  id: STClothingHeadHelmetCombatT3Base
  name: T3 Combat Helmet Base
  suffix: ST, T3, Combat
  components:
  - type: Craftable
  - type: STWeight
    self: 2.1
  - type: Armor
    armorClass: 3
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.85
        Piercing: 0.8
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: Reflect
    reflectProb: 0.12
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair

- type: entity
  parent: STClothingHeadHelmetCombatT3Base
