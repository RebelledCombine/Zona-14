- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadArmorSkyWalkerHelm
  name: '"SFERA S-10" exo-helmet'
  description: A helmet that offers decent combat performance, and thanks to a built-in gas mask it boasts fairly good radiation protection. Other characteristics, particularly anomaly resistance, are quite poor.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/skywalker_helmet.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/skywalker_helmet.rsi
  - type: PointLight
    color: red
    enabled: false
    radius: 6
    energy: 2
  - type: Craftable
  - type: STWeight
    self: 2.1
  - type: Armor
    armorClass: 3
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.85
        Piercing: 0.70
  - type: ExplosionResistance
    damageCoefficient: 0.95
  - type: Reflect
    reflectProb: 0.15
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
  - type: BreathMask
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
        - BlockMask

