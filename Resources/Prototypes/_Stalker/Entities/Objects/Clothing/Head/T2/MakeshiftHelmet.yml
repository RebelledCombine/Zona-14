# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingHeadBase
  id: STClothingHeadHelmetMakeshiftTacticalT3
  name: Cyclops Helmet
  description: a helmet made by hand from quality materials may not be the most attractive in appearance, but it protects well.
  suffix: ST, T2, Tactical
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/Head/makeshift_helmet.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/Head/makeshift_helmet.rsi
  - type: Craftable
  - type: Tag
    tags:
      - BlockMask
  - type: STWeight
    self: 3.1
  - type: Armor
    armorClass: 2
    modifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.90
  - type: ExplosionResistance
    damageCoefficient: 0.95
  - type: Reflect
    reflectProb: 0.08
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair

