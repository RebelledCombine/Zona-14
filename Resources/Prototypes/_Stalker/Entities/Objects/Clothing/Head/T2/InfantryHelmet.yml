# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: STClothingHeadBase
  id: STClothingHeadHelmetCombatT2Base
  name: T2 Combat Helmet Base
  suffix: ST, T2, Combat
  components:
  - type: STWeight
    self: 2.1
  - type: Craftable
  - type: Armor
    armorClass: 2
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.80
  - type: Reflect
    reflectProb: 0.08
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair

- type: entity
  parent: STClothingHeadHelmetCombatT2Base
