# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: STClothingHeadBase
  id: STClothingHeadHelmetEnvironmentT4Base
  name: T4 Environment Protection Helmet Base
  suffix: ST, T4, Env
  components:
  - type: BreathMask
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
      - BlockMask
  - type: STWeight
    self: 4
  - type: Armor
    armorClass: 4
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.60
        Piercing: 0.85
        Psy:   0.60
        Radiation: 0.70
  - type: Reflect
    reflectProb: 0.10
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout


