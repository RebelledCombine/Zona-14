# Zona14: translated Russian names/descriptions to English
- type: entity
  abstract: true
  parent: STClothingHeadBase
  id: STClothingHeadHelmetTacticalT4Base
  name: T4 Tactical Helmet Base
  suffix: ST, T4, Tactical
  components:
  - type: STWeight
    self: 3
  - type: Armor
    armorClass: 4
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.75
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: Reflect
    reflectProb: 0.12
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair

- type: entity
  parent: STClothingHeadHelmetTacticalT4Base
  id: ClothingHeadHelmetUlach
  name: ulach
  description: This is a helmet specifically designed to protect against stabbing attacks.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/ulach.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/ulach.rsi

