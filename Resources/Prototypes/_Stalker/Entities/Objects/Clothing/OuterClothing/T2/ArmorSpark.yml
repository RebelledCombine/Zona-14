# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: ClothingOuterArmorSpark
  name: Spark Costume
  suffix: ST, T2, Env
  description: A homemade suit made by NII craftsmen from improvised objects. Passively removes radiation at a rate of 0.1 per second
  components:
    - type: STWeight
      self: 4.5
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/spark.rsi
      state: icon-suit
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/spark.rsi
    - type: ToggleableClothing
      clothingPrototype: ClothingHeadHelmetSpark
    - type: Armor
      armorClass: 2
      modifiers:
        flatReductions:
            Blunt: 5
            Slash: 3
            Piercing: 2
            Radiation: 2
            Caustic: 1
            Shock: 1
            Cold: 1
        coefficients:
            Blunt: 0.85
            Slash: 0.8
            Heat: 0.8
            Piercing: 0.95
            Caustic: 0.8
            Shock: 0.65
            Radiation: 0.9
    - type: GrantsArtifactSlots
      slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
    - type: ExplosionResistance
      damageCoefficient: 0.90
    - type: ClothingSpeedModifier
      walkModifier: 1
      sprintModifier: 1
    - type: Storage
      maxItemSize: Tiny
      grid:
      - 0,0,1,1
      quickInsert: false
      areaInsert: false
    - type: PersonalDamage
      interval: 1
      damage:
        types:
          Radiation: -0.1
    - type: ContainerContainer
      containers:
        toggleable-clothing: !type:ContainerSlot {}
        storagebase: !type:Container
          ents: []

- type: entity
  parent: STClothingHeadHatBase
  id: ClothingHeadHelmetSpark
  name: Spark Hood
  description: A dense piece of rubber on your head.
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/spark.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/spark.rsi
    - type: Armor
      armorClass: 1
      modifiers:
        flatReductions:
          Radiation: 1
          Caustic: 1

- type: entity
  parent: ClothingOuterArmorSpark
  id: ClothingOuterArmorMilitarySpark
  name: "'ITF' 'Military' Outfit"
  suffix: ST, T2, Env
  description: ISSG overalls, more unknown. Passively removes radiation at a rate of 0.25 per second
  components:
    - type: STWeight
      self: 2.5
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/military-spark.rsi
      state: icon-suit
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/military-spark.rsi
    - type: ToggleableClothing
      clothingPrototype: ClothingHeadHelmetMilitarySpark
    - type: PersonalDamage
      interval: 1
      damage:
        types:
          Radiation: -0.25
    - type: Armor
      armorClass: 2
      modifiers:
        flatReductions:
            Blunt: 5
            Slash: 5
            Piercing: 3
            Heat: 1
            Radiation: 1
        coefficients:
            Blunt: 0.7
            Slash: 0.8
            Heat: 0.85
            Piercing: 0.9
            Compression: 0.8
            Radiation: 0.95
    - type: GrantsArtifactSlots
      slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
    - type: Storage
      maxItemSize: Large
      grid:
        - 0,4,0,5
        - 0,0,0,2
        - 2,4,2,5
        - 2,1,3,2
        - 4,4,4,5
        - 5,1,6,2
        - 6,4,6,5
        - 8,4,8,5
        - 8,0,8,2

- type: entity
  parent: ClothingHeadHelmetSpark
  id: ClothingHeadHelmetMilitarySpark
  name: "'ITF' 'Military' hood"
  description: A dense piece of rubber on your head.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/military-spark.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/military-spark.rsi
    - type: Armor
      armorClass: 1
      modifiers:
        flatReductions:
          Radiation: 2.5
          Caustic: 1
        coefficients:
            Blunt: 0.85
            Slash: 0.9
            Heat: 0.9

