# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorLightPlateVestBase
  name: basic light body armor
  suffix: ST, T2, PvP
  abstract: true
  description: Standard Type II body armor, providing decent protection against most types of damage
  components:
  - type: STWeight
    self: 5
  - type: Trash
    time: 900
  - type: Storage
    maxItemSize: Normal
    grid:
     - 0,2,0,3
     - 1,0,1,0
     - 2,2,2,3
     - 3,0,3,0
     - 4,2,4,3
     - 5,0,5,0
     - 6,2,6,3
     - 7,0,7,0
     - 8,2,8,3
     - 9,0,9,0
     - 10,2,10,3
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/plate_dolg.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/plate_dolg.rsi
  - type: Armor
    armorClass: 2
    modifiers:
      flatReductions:
        Blunt: 3
        Slash: 3
        Piercing: 5
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: Craftable
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []

