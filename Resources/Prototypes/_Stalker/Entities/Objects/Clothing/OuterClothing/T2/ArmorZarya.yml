# Zona14: translated Russian names/descriptions to English

- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorZaryaBase
  abstract: true
  suffix: ST, T2, PvE
  components:
  - type: STWeight
    self: 5
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/zarya_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/zarya_stalker.rsi
  - type: Armor
    armorClass: 2
    modifiers:
      flatReductions:
        Blunt: 5
        Slash: 5
        Piercing: 3
        Radiation: 1
      coefficients:
        Blunt: 0.7
        Slash: 0.8
        Radiation: 0.95
        Compression: 0.9
        Piercing: 0.9
        Heat: 0.85
        Caustic: 0.85
        Shock: 0.9
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: Craftable
  - type: Tag
    tags:
    - BlockGloves
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []

# Stalker №1 - 1

- type: entity
  parent: STClothingOuterArmorZaryaBase
  id: ClothingOuterArmorZaryaStalker
  name: Sunrise suit
  description: Produced by "craftsmen", the stalker suit is an effective combination of a light army body armor and a jumpsuit made of rubberized fabric. Reinforced with built-in Kevlar plates. Good protection against weak small arms. In general, it is extremely insufficient for deep raids and serious operations in the nodes of the Zone.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/zarya_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/zarya_stalker.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetZaryaStalker
    slot: head

- type: entity
  parent: STClothingHeadHatBase
  id: ClothingHeadHelmetZaryaStalker
  name: hood "Sunrise"
  categories: [ HideSpawnMenu ]
  description: Free as air in clouds.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/hats/zarya_helm_stalker.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/hats/zarya_helm_stalker.rsi
    - type: HideLayerClothing
      slots:
      - Hair
      hideOnToggle: true

