# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterBaseLarge
  id: STClothingOuterArmorRCBZ
  name: Seeker CBRN Suit
  suffix: ST, T2, Env
  description: Designed to operate in radiation, chemical, and biological shielding (CBRN) environments. It is used in expeditions to hazardous chemical areas to ensure the safety of the carrier. It is not designed for combat operations, but is specialized to provide protection and safety in the face of the threat from radiation, chemical and biological substances.
  components:
  - type: STWeight
    self: 4
  - type: Craftable
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/rhbz_iskatel.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/rhbz_iskatel.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHelmRCBZ
    slot: head
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Radiation: 2
        Caustic: 2
        Shock: 1
      coefficients:
        Heat: 0.7
        Radiation: 0.6
        Caustic: 0.6
        Shock: 0.7
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHelmRCBZ
  suffix: ST, T2, Env
  name: CBRN Mask
  categories: [ HideSpawnMenu ]
  description: Effective personal protective equipment against various types of chemical, biological and radioactive threats. They provide reliable air filtration, trapping harmful substances and particles, which protects the respiratory tract and skin from exposure to hazardous substances.
  components:
  - type: Tag
    tags:
    - BlockMask
  - type: BreathMask
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Craftable
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/mask/gasmask_rhbz.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/mask/gasmask_rhbz.rsi
  - type: Armor
    modifiers:
      flatReductions:
        Radiation: 2
        Caustic: 2
      coefficients:
        Radiation: 0.9
        Caustic: 0.8
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
  - type: PointLight
    color: orange
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
