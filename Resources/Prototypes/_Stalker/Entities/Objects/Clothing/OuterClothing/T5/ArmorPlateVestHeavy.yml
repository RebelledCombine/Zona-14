# Zona14: translated Russian names/descriptions to English
# Base

- type: entity
  parent: STClothingOuterArmorLightPlateVestBase
  id: STClothingOuterArmorHeavyPlateVestBase
  name: Heavy Body Armor
  abstract: true
  suffix: ST, T5, PvP
  components:
  - type: STWeight
    self: 19
  - type: Armor
    armorClass: 5
    modifiers:
      flatReductions:
        Blunt: 5
        Slash: 5
        Piercing: 7
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.6
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/plate_heavy_military.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/plate_heavy_military.rsi
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
