# Project

- type: entity
  parent: ClothingOuterArmorExoskelet
  id: ClothingOuterArmorExoSevaProject
  name: "Seva OM-360 exosuit"
  suffix: ST, T5, UNIVERSAL, Project
  description: "\"Experiment \"OM-360\" was carried out, due to improved technology, \"Project\" got a massive exo-suit capable of practically protecting the Valdelsk from various radiation of the \"Matrix\", thanks to the best materials and high-tech materials, the \"Project\" created the exoskeleton suit \"Seva\" version of the OM-360"
  components:
  - type: STWeight
    self: 22
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/exoseva_project.rsi
    state: icon
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/exoseva_project.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetExoSevaProject

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetExoSevaProject
  categories: [ HideSpawnMenu ]
  name: "Exo-Seva Helmet \"OM-360\""
  description: Unlike the Exach itself, we can say that it is quite an ordinary helmet.
  components:
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/exoseva_helm_project.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/exoseva_helm_project.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: PointLight
    color: white
