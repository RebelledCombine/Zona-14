# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: ClothingOuterArmorStorageToggleableBasic
  id: ClothingOuterArmorExoskelet
  name: exoskeleton
  description: Experimental servo armor that allows you to carry a lot of stuff on your spine, but slows down your movement significantly.
  suffix: ST, T5, UNIVERSAL
  components:
  - type: STWeight
    self: -50
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/exoskelet_stalker.rsi
    state: icon
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/exoskelet_stalker.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetExoskelet
  - type: ClothingSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.5
  - type: Armor
    armorClass: 5
    modifiers:
      coefficients:
        Blunt: 0.60
        Slash: 0.60
        Piercing: 0.4
        Heat: 0.35
        Radiation: 0.65
  - type: ExplosionResistance
    damageCoefficient: 0.25
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
    
- type: entity
  parent: STClothingHeadBase
  id: ClothingHeadHelmetExoskelet
  categories: [ HideSpawnMenu ]
  suffix: ST, T5
  name: exoskeleton helmet
  description: Unlike the Exac itself, we can say quite an ordinary helmet, 5th class.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/exoskelet_helm_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/exoskelet_helm_stalker.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: Armor
    armorClass: 5
    modifiers:
      coefficients:
        Piercing: 0.7
        Blunt: 0.6
        Slash: 0.6
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: Reflect
    reflectProb: 0.15
    spread: 360
    reflects:
    - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair

- type: entity
  parent: ClothingOuterArmorExoskelet
  id: ClothingOuterArmorExoskeletMonolith
  name: Monolith exoskeleton
  description: "Experimental servo armor that allows you to carry a lot of stuff on your spine, but slows down movement significantly - usually, but this armor represents the superiority of the Monolith's weaponry."
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/exoskelet_monolith.rsi
    state: icon
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/exoskelet_monolith.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetExoskeletMonolith

- type: entity
  parent: ClothingOuterArmorExoskelet
  id: ClothingHeadHelmetExoskeletMonolith
  categories: [ HideSpawnMenu ]
  name: Monolith Exoskeleton Helmet
  description: Unlike the Exach itself, we can say that it is quite an ordinary helmet.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/exoskelet_helm_monolith.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/exoskelet_helm_monolith.rsi
  - type: PointLight
    color: orange
  - type: IngestionBlocker
  - type: IdentityBlocker

