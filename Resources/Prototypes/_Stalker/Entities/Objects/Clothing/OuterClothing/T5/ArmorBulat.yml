# Zona14: translated Russian names/descriptions to English
# Base
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorBulatBase
  abstract: true
  name: damask
  suffix: ST, T5, PvE
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/bulat_military.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/bulat_military.rsi
  - type: Armor
    armorClass: 5
    modifiers:
      flatReductions:
        Blunt: 7
        Slash: 7
        Piercing: 8
        Radiation: 4
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.6
        Radiation: 0.7
        Caustic: 0.6
        Heat: 0.7
        Compression: 0.7
        Shock: 0.75
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
    
