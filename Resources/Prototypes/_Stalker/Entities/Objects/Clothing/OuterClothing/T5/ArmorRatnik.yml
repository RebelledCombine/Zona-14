# Zona14: translated Russian names/descriptions to English
# Base
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorRatnikBase
  abstract: true
  name: Warrior Bundle
  suffix: ST, T5, PvP
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/ratnik_military.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/ratnik_military.rsi
  - type: Armor
    armorClass: 5
    modifiers:
      flatReductions:
        Piercing: 8
        Blunt: 5
        Slash: 6
      coefficients:
        Piercing: 0.6
        Blunt: 0.6
        Slash: 0.75
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
    
# Stalker
- type: entity
  parent: STClothingOuterArmorRatnikBase
  id: STClothingOuterArmorRatnik
  name: Warrior Bundle
  description: A set of multifunctional clothing, equipment and shoes "Ratnik-SN" was developed for the needs of military personnel of special units of the Russian Armed Forces. When creating this combat equipment, the latest innovative materials and technologies were used to the maximum extent.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/ratnik_military.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/ratnik_military.rsi

# Neutral

