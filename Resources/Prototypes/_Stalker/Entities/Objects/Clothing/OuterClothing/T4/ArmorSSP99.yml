# Zona14: translated Russian names/descriptions to English
# Base
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorSSP99Base
  name: SSP-99
  abstract: true
  suffix: ST, T4, Env
  components:
  - type: STWeight
    self: 7
  - type: PullDoAfter
    pullTime: 6
  - type: Craftable
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/ssp99.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/ssp99.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetSSP99
  - type: Storage
    maxItemSize: Huge
    grid:
      - 0,0,5,3
      - 7,0,12,3
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Heat: 4
        Caustic: 4
        Radiation: 4
        Shock: 3
        Cold: 2
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.50
        Caustic: 0.40
        Shock: 0.70
        Radiation: 0.60
        Compression: 0.60
  - type: GrantsArtifactSlots
    slots: 4
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []
  - type: Tag
    tags:
    - BlockBack

- type: entity
  parent: ClothingHeadHardsuitBase
  id: STClothingHeadHelmetSSP99Base
  name: "Green Ecologist's helmet"
  description: Protects against anomalies and radiation, but definitely not against bullets.
  categories: [ HideSpawnMenu ]
  abstract: true
  components:
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 3
        Slash: 4
        Piercing: 2
        Heat: 4
        Caustic: 4
        Radiation: 3
        Shock: 2
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.7
        Radiation: 0.8
        Caustic: 0.6
        Shock: 0.9
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/ssp99_helm.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/ssp99_helm.rsi
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000

