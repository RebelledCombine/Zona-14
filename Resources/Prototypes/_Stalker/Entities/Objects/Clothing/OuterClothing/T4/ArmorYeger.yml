# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterBaseLargeToggleable
  id: ClothingOuterArmorYeger
  name: Jaeger
  description: Animalist-designed suit for fighting in anomalous zones. Due to the impregnation in the anomaly, it has excellent bullet resistance.
  suffix: ST, T4, Env
  components:
  - type: STWeight
    self: 7
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/yeger.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/yeger.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetYeger
    slot: head
  - type: Armor
    armorClass: 4
    modifiers:
      flatReductions:
        Blunt: 7
        Slash: 7
        Piercing: 6
        Radiation: 1
      coefficients:
        Blunt: 0.8
        Slash: 0.7
        Piercing: 0.7
        Heat: 0.6
        Radiation: 0.6
        Caustic: 0.75
        Shock: 0.7
        Psy: 0.55
        Compression: 0.65
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.9

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetYeger
  name: Jaeger Helmet
  description: Protects against anomalies and radiation, but definitely not against bullets.
  suffix: ST, T4
  categories: [ HideSpawnMenu ]
  components:
  - type: Armor
    armorClass: 1
    modifiers:
      coefficients:
        Heat: 0.85
        Shock: 0.85
        Radiation: 0.85
        Psy: 0.85
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/yeger_helm.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/yeger_helm.rsi
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: PointLight
    color: "#f9ffaf"
  - type: HideLayerClothing
    slots:
    - Hair

