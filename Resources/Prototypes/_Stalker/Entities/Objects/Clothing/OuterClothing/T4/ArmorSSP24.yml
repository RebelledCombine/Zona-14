# Zona14: translated Russian names/descriptions to English
# Base
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorSSP24Base
  name: SSP-24
  abstract: true
  suffix: ST, T4, Env
  components:
  - type: STWeight
    self: 7
  - type: PullDoAfter
    pullTime: 6
  - type: Craftable
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/ssp24.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/ssp24.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetSSP24
  - type: Storage
    maxItemSize: Huge
    grid:
      - 0,0,5,3
      - 7,0,12,3
  - type: Armor
    armorClass: 2
    modifiers:
      flatReductions:
        Blunt: 3
        Slash: 3
        Piercing: 3
        Heat: 3
        Caustic: 1
        Radiation: 3
        Shock: 1
        Psy: 1
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.90
        Heat: 0.60
        Caustic: 0.70
        Shock: 0.60
        Psy: 0.80
        Radiation: 0.80
        Compression: 0.80
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: Tag
    tags:
    - BlockBack
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []

- type: entity
  parent: ClothingHeadHardsuitBase
  id: STClothingHeadHelmetSSP24Base
  name: "Green Ecologist's helmet"
  description: Protects against anomalies and radiation, but definitely not against bullets.
  categories: [ HideSpawnMenu ]
  abstract: true
  components:
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Radiation: 2
        Caustic: 1
      coefficients:
        Heat: 0.55
        Radiation: 0.45
        Caustic: 0.55
        Shock: 0.55
        Psy: 0.8
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/ssp24_helm.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/ssp24_helm.rsi
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: HideLayerClothing
    slots:
    - Hair
# Ruby

- type: entity
  parent: STClothingOuterArmorSSP24Base
  id: ClothingOuterArmorSSP24Ruby
  name: Red SSP-24 "Ruby"
  description: High-quality modified SSP-24 overalls with improved protection against bullets and shrapnel, which is supplied to the vanguard squads of Ecologists when there is a possibility of collision with mutated animals.
  components:
  - type: Armor
    armorClass: 2
    modifiers:
      flatReductions:
        Blunt: 3
        Slash: 3
        Piercing: 3
        Heat: 2
        Caustic: 1
        Radiation: 2
        Shock: 1
        Cold: 2
        Psy: 1
      coefficients:
        Blunt: 0.55
        Slash: 0.55
        Piercing: 0.90
        Heat: 0.60
        Caustic: 0.80
        Shock: 0.80
        Psy: 0.90
        Radiation: 0.90
        Compression: 0.90
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/ruby.rsi
    state: icon-suit
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/ruby.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetSSP24Ruby

- type: entity
  parent: STClothingHeadHelmetSSP24Base
  id: ClothingHeadHelmetSSP24Ruby
  name: Red Ruby Helmet
  description: Protects against anomalies and radiation, but definitely not against bullets.
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/ruby.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/ruby.rsi

