  suffix: ST, T4, PvE
  components:
  - type: STWeight
    self: 10
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/psz9d.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/psz9d.rsi
  - type: Armor
    armorClass: 4
    modifiers:
      flatReductions:
        Blunt: 3
        Slash: 8
        Piercing: 8
      coefficients:
        Blunt: 0.9
        Slash: 0.5
        Heat: 0.85
        Piercing: 0.7
        Compression: 0.85
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants

