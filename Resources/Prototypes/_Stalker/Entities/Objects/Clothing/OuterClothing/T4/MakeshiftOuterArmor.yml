# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: ClothingOuterArmorStalkerCombat
  name: Pioneer Armor Suit
  description: Full-protection makeshift armor for confident combatants.
  suffix: ST, T4, Universal
  components:
  - type: STWeight
    self: 16
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/makeshift_armor.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/makeshift_armor.rsi
  - type: Armor
    armorClass: 4
    modifiers:
      flatReductions:
        Blunt: 6
        Slash: 7
        Piercing: 6
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.8
        Heat: 0.85
        Radiation: 0.6
        Caustic: 0.85
        Shock: 0.85
        Compression: 0.85
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.7

