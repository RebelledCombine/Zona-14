# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorVeryHeavy
  name: KSN-13 Behemoth
  description: Behemoth Special Purpose Suit, used by state operatives in the Chernobyl Exclusion Zone.
  suffix: ST, T4, PvE
  components:
  - type: STWeight
    self: 6.5
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/begemot_armor.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/begemot_armor.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,2,0,3
      - 1,0,1,0
      - 2,2,2,3
      - 3,0,3,0
      - 4,2,4,3
      - 5,0,5,0
      - 6,2,6,3
      - 7,0,7,0
      - 8,2,8,3
      - 9,0,9,0
      - 10,2,10,3
      - 11,0,11,0
      - 12,2,12,3
  - type: Armor
    armorClass: 4
    modifiers:
      flatReductions:
        Blunt: 8
        Slash: 8
        Piercing: 8
        Radiation: 2
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.7
        Heat: 0.85
        Radiation: 0.85
        Caustic: 0.75
        Shock: 0.85
        Compression: 0.85
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodMerc
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []

