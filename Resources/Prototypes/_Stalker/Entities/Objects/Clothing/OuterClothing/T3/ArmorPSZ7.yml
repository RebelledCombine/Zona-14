# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorLightPlateVestBasePSZ7
  name: PSZ-7 Officer
  suffix: ST, T3, PvP
  description: "The PSZ-7 series Army Body Armor (Personal Protection System) provides a level of protection sufficient to conduct combat operations against a lightly armed enemy. There is no protection against anomalous activity. Officer's version, in woodland coloring."
  components:
    - type: STWeight
      self: 10
    - type: Armor
      armorClass: 3
      modifiers:
        flatReductions:
          Blunt: 5
          Slash: 5
          Piercing: 6
        coefficients:
          Blunt: 0.9
          Slash: 0.85
          Piercing: 0.6
          Heat: 0.9
    - type: GrantsArtifactSlots
      slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
    - type: ExplosionResistance
      damageCoefficient: 0.6
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/psz7v2.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/psz7v2.rsi

