# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterBaseLargeToggleable
  id: ClothingOuterArmorUzk5
  name: UZK-5 suit
  suffix: ST, T3, Env
  description: A heavy suit designed specifically for the work of mercenary units in the highly dangerous and toxic conditions of the Chernobyl Exclusion Zone. It has several light armor plates and a thin rubberized substrate that protects against burns and radiation.
  components:
  - type: STWeight
    self: 10
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/uzk5.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/uzk5.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHardsuitUzk5Helm
    slot: head
  - type: Armor
    armorClass: 3
    modifiers:
      flatReductions:
        Blunt: 6
        Slash: 6
        Piercing: 2
        Caustic: 3
        Radiation: 2.5
        Heat: 2
      coefficients:
        Blunt: 0.6
        Slash: 0.55
        Piercing: 0.95
        Heat: 0.7
        Radiation: 0.7
        Caustic: 0.6
        Compression: 0.7
        Shock: 0.6
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.8
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1

- type: entity  # T3
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHardsuitUzk5Helm
  name: '"UZK-5" helmet'
  description: Built-in ultrasonic helmet with flashlight.
  categories: [ HideSpawnMenu ]
  components:
    - type: PointLight
      enabled: false
      radius: 6
      energy: 2
    - type: BreathMask
    - type: IngestionBlocker
    - type: IdentityBlocker
    - type: Tag
      tags:
        - BlockMask
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/hats/uzk5_helmet.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/hats/uzk5_helmet.rsi
      equipSound: null
      unequipSound: null
    - type: Armor
      armorClass: 2
      modifiers:
        coefficients:
            Blunt: 0.8
            Slash: 0.8
    - type: GrantsArtifactSlots
      slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
    - type: Reflect
      reflectProb: 0.05
      spread: 360
      reflects:
        - NonEnergy
    - type: HideLayerClothing
      slots:
      - Hair
      - Snout

- type: entity
  parent: ClothingOuterArmorUzk5
  id: STClothingOuterArmorSkyWalker
  name: PNB-4UVH exoskeleton
  suffix: ST, T3, PvP
  description: Turns its wearer into a true walking tank. Uses class 3 ceramic armor plates, with side belt mounts featuring protective screens that shield the flanks - which significantly increased its weight. Standardly comes with an S10 gas mask. Its only drawbacks are very weak protection against anomalies and the long-worn pneumatics of the exoskeleton, with the construction itself having outlived its time.
  components:
  - type: STWeight
    self: 50
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/skywalker_armor.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/skywalker_armor.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadArmorSkyWalkerHelm
    slot: head
  - type: Armor
    armorClass: 3
    modifiers:
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 8
        Caustic: 0
        Radiation: 0.5
        Heat: 0
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.6
        Heat: 0.97
        Caustic: 0.97
        Compression: 0.97
        Shock: 0.97
  - type: ExplosionResistance
    damageCoefficient: 0.8
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.75
