# Zona14: translated Russian names/descriptions to English
# Base
- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: STClothingOuterArmorSevaBase
  name: Seva Suit
  description: "A closed-cycle suit developed by the Kiev Research Institute, designed specifically for work in the conditions of the Zone."
  suffix: ST, T3, Env
  categories: [ HideSpawnMenu ]
  abstract: true
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/seva_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/seva_stalker.rsi
  - type: ToggleableClothing
    clothingPrototype: STClothingHeadHardsuitSevaHelmBase
    slot: head
  - type: Storage
    maxItemSize: Huge
    grid:
      - 0,0,5,3
      - 7,0,12,3
  - type: Craftable
  - type: STWeight
    self: 10
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 4
        Slash: 4
        Piercing: 3
        Heat: 3
        Radiation: 4
        Caustic: 3
        Shock: 2
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.6
        Radiation: 0.7
        Caustic: 0.55
        Shock: 0.60
        Compression: 0.65
        Psy: 0.7
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: Tag
    tags:
    - BlockBack
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []

- type: entity
  parent: ClothingHeadHardsuitBase
  id: STClothingHeadHardsuitSevaHelmBase
  name: Seva Helmet
  description: Despite the predominantly glass composition, it is quite durable.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/seva_helm.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/seva_helm.rsi
  - type: BreathMask
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
      - BlockMask
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Radiation: 4
        Caustic: 1
        Psy: 1
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Compression: 0.95
        Psy: 0.7
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
