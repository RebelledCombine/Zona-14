    tags:
      - BlockBelt
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/ANA/Green.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/ANA/Green.rsi
  - type: Armor
    armorClass: 3
    modifiers:
      flatReductions:
        Blunt: 1
        Slash: 1
        Piercing: 6
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.7
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.80
  - type: Craftable

