# Zona14: translated Russian names/descriptions to English

- type: entity
  parent: STClothingOuterArmorStorageBasic
  id: ClothingOuterArmorAborigineStalker
  name: Native Armor Suit
  suffix: ST, T3, Universal
  description: Decommissioned Beryl-5M armored suits were taken as a basis, and modernized in artisanal conditions. Bullet protection has dropped noticeably, but at the same time, all other indicators have increased, which made it possible to make the armored suit balanced for its price for staying in the zone.
  components:
  - type: STWeight
    self: 12
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/aborigine.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/aborigine.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,2,0,3
      - 1,0,1,0
      - 2,2,2,3
      - 3,0,3,0
      - 4,2,4,3
      - 5,0,5,0
      - 6,2,6,3
      - 7,0,7,0
      - 8,2,8,3
      - 9,0,9,0
      - 10,2,10,3
  - type: Armor
    armorClass: 3
    modifiers:
      flatReductions:
        Blunt: 6
        Slash: 6
        Piercing: 4
        Radiation: 2
        Caustic: 1
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.8
        Heat: 0.75
        Radiation: 0.8
        Caustic: 0.65
        Shock: 0.75
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.85
  - type: Craftable
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000

