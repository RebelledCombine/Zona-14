  suffix: ST, T3, Env
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/seva_cn.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/seva_cn.rsi
  - type: ToggleableClothing
    clothingPrototype: STClothingHeadHardsuitSevaHelmBase
    slot: head
  - type: ContainerContainer
    containers:
      storagebase: !type:Container { }
      toggleable-clothing: !type:ContainerSlot { }
  - type: Craftable
  - type: STWeight
    self: 10
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 4
        Slash: 4
        Piercing: 3
        Heat: 5
        Radiation: 5
        Caustic: 5
        Shock: 5
        Psy: 1
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.5
        Radiation: 0.6
        Caustic: 0.5
        Shock: 0.6
        Compression: 0.7
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.8
