    sprite: _Stalker/Objects/Clothing/outerClothing/renegade_armor.rsi
  - type: Storage
    maxItemSize: Large
    grid:
      - 0,0,0,0
      - 2,0,2,0
    blacklist:
      tags:
      - STArtifact
  - type: Armor
    armorClass: 3
    modifiers:
      flatReductions:
        Blunt: 5
        Slash: 5
        Piercing: 6
        Heat: 1
        Radiation: 1
