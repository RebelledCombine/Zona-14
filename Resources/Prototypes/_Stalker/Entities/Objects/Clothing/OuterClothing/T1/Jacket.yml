# Clear Sky

- type: entity
  parent: STClothingOuterJacketBase
  id: ClothingOuterJacketCN
  name: Clear Sky Jacket
  description: A lightly protective jacket made for the Clear Sky faction. This leather jacket was produced by the craftsmen of the "Clear Sky" before replacing it, outdated and poorly protected from the phenomena of the Zone. Almost no different from an ordinary leather jacket, but it protects quite well from bites, fire and cold.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/jacket_cn.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/jacket_cn.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodJacketCN
    slot: head
  - type: Storage
    maxItemSize: Large
    whitelist:
      components:
      - SuppressArtifactContainer
    grid:
    - 1,1,2,1
    - 1,2,2,2
    - 0,0,0,0
    - 3,0,3,0

- type: entity
