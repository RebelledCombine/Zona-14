# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: ClothingOuterStorageToggleableBase
  id: STClothingOuterJacketBase
  name: Basic Jacket
  description: Basic jacket description.
  suffix: ST, T0, Universal
  abstract: true
  components:
  - type: ToggleableClothing
    clothingPrototype: STClothingHeadHatHoodBase
    slot: head
  - type: STWeight
    self: 3.5
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 1
        Slash: 1
        Piercing: 1
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.90
        Heat: 0.95
        Radiation: 0.9
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,0,0,0
      - 1,2,1,3
      - 2,0,2,0
      - 3,2,3,3
      - 4,0,4,0
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      toggleable-clothing: !type:ContainerSlot {}
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ExplosionResistance
    damageCoefficient: 0.95
  - type: Craftable

- type: entity
  parent: STClothingHeadHatBase
  id: STClothingHeadHatHoodBase
  categories: [ HideSpawnMenu ]
  name: hood
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/jacket_hat_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/jacket_hat_stalker.rsi
  - type: HideLayerClothing
    slots:
    - Hair

# Bandit

- type: entity
  parent: STClothingOuterJacketBase
  id: ClothingOuterJacketBandit
  name: bandit jacket
  description: Black leather jacket is a traditional attribute of bandits. Unlike the jackets worn by beginners, this one has thin metal plates sewn into it that can slightly protect against pistol cartridges. Of course, it will not withstand anomalies and automatic bursts, but in a skirmish with some newcomer it can help significantly.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/jacket_bandit.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/jacket_bandit.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodJacketBandit
    slot: head
  # bandit's bonus
  - type: Storage
    grid:
    - 1,1,3,1
    - 1,2,3,2
    - 2,3,2,3
    - 0,0,0,0
    - 4,0,4,0

- type: entity
  parent: STClothingHeadHatHoodBase
  id: ClothingHeadHatHoodJacketBandit
  categories: [ HideSpawnMenu ]
  name: "{ ent-STClothingHeadHatHoodBase }"
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/jacket_hat_bandit.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/jacket_hat_bandit.rsi

