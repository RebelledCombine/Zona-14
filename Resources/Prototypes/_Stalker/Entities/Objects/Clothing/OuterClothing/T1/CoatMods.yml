# Zona14: translated Russian names/descriptions to English
# Brown

- type: entity
  parent: STClothingOuterCoatBase
  id: ClothingOuterArmourCoatBanditBrown
  name: Bandit Chainmail Leather Cloak
  description: Plain brown leather cloak, but lined with chainmail cloth. Quite inconvenient in the conditions of the Zone, but, nevertheless, it is often used by bandits - perhaps solely because of its appearance.
  suffix: ST, T2, PVP
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/coat_bandit_brown.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/coat_bandit_brown.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodCoatBanditBrown
    slot: head
  - type: Armor
    armorClass: 2
    modifiers:
      flatReductions:
        Blunt: 1
        Slash: 3
        Piercing: 5
        Caustic: 1
      coefficients:
        Blunt: 0.75
        Slash: 0.50
        Piercing: 0.75
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.7
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []

