# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STClothingOuterJacketBase
  id: ClothingOuterArmourJacketBandit
  name: Bandit Chainmail Jacket
  description: A basic, low-tier bandit flak jacket with chainmail sewn into the lining. Just about anyone can make one, but not everyone has the patience.
  suffix: ST, T2, PVP
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/jacket_bandit.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/jacket_bandit.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodJacketBandit
    slot: head
  # bandit's bonus
  - type: Storage
    grid:
    - 1,1,3,1
    - 1,2,3,2
    - 2,3,2,3
    - 0,0,0,0
    - 4,0,4,0
  - type: Armor
    armorClass: 2
    modifiers:
      flatReductions:
        Blunt: 4
        Slash: 4
        Piercing: 4
      coefficients:
        Blunt: 0.75
        Slash: 0.76
        Piercing: 0.65
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ExplosionResistance
    damageCoefficient: 0.7

