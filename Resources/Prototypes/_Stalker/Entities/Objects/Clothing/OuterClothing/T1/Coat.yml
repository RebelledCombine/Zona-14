# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: ClothingOuterStorageToggleableBase
  id: STClothingOuterCoatBase
  name: Basic Cloak
  description: Basic description of the cloak.
  suffix: ST, T1, Universal
  abstract: true
  components:
  - type: Item
    size: Ginormous
    shape:
    - 0,0,9,3
  - type: ToggleableClothing
    clothingPrototype: STClothingHeadHatHoodBase
    slot: head
  - type: STWeight
    self: 3.5
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 1
        Slash: 3
        Piercing: 1
      coefficients:
        Blunt: 0.95
        Slash: 0.65
        Piercing: 0.95
        Heat: 0.95
        Radiation: 0.9
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,9,1
    - 0,3,9,4
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ExplosionResistance
    damageCoefficient: 0.95
  - type: Craftable
  - type: Tag
    tags:
    - BlockBack
    - BlockCloak
    - BlockGloves
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []

# Brown

- type: entity
  parent: STClothingOuterCoatBase
  id: ClothingOuterCoatBanditBrown
  name: Bandit Leather Cloak
  description: Normal brown leather cloak. It does not provide noticeable protection to the carrier. Except that it will not let you freeze at night and soften the bite of a blind dog. Quite inconvenient in the conditions of the Zone, but, nevertheless, it is often used by bandits - perhaps solely because of its appearance.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/coat_bandit_brown.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/coat_bandit_brown.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodCoatBanditBrown
    slot: head

- type: entity
  parent: STClothingHeadHatHoodBase
  id: ClothingHeadHatHoodCoatBanditBrown
  categories: [ HideSpawnMenu ]
  name: hood
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/coat_bandit_hat_brown.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/coat_bandit_hat_brown.rsi

