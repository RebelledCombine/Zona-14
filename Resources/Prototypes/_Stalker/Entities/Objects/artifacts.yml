# Zona14: translated Russian names/descriptions to English
- type: entity
  name: Stone Blood
  parent: BaseArtifact
  id: ArtBlood
  description: Artifact of gravitational nature. Phony, but gives protection from physical damage.
  categories: [ HideSpawnMenu ]
  components:
  - type: RadiationSource
    slope: 1
    intensity: 1.5
  - type: PointLight
    radius: 1.5
    energy: 3.0
    color: "#FFA500"
    castShadows: false
  - type: Sprite
    state: blood
    scale: 0.5, 0.5
  - type: Armor
    armorClass: 8
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95

- type: entity
  name: artifact container
  parent: BoxCardboard
  id: BoxArtcont
  description: A lead container that completely blocks all properties of the artifact.
  suffix: Stalker
  components:
  - type: ExplosionSafe
  - type: PersonalDamageBlock
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,1
    whitelist:
      tags:
        - STArtifact
  - type: Clothing
    quickEquip: true
    slots:
      - ARTIFACT
  - type: RadiationBlockingContainer
    resistance: 2
  - type: SuppressArtifactContainer
  # EN start
  - type: Sprite
    layers:
      - map: [ base ]
        sprite: _Stalker_EN/Objects/Misc/ArtCont/green.rsi
        state: icon
        scale: 0.8, 0.8
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: icon-open }
          False: { state: icon }
  - type: Appearance
  - type: Craftable
  # EN end
  - type: STWeight
    self: 0.1

- type: entity
  name: advanced artifact container
  parent: BoxArtcont
  id: BoxArtcont1
  description: A lead container that holds up to 3 artifacts and completely blocks their properties. An improved artisanal version that is quite difficult to find.
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,5,1
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,5,1
    whitelist:
      tags:
        - STArtifact
  - type: PersonalDamageBlock
  - type: RadiationBlockingContainer
    resistance: 5
  - type: SuppressArtifactContainer
  - type: Sprite # EN
    layers:
    - map: [ base ]
      sprite: _Stalker_EN/Objects/Misc/ArtCont/advanced.rsi
      state: icon
      scale: 0.8, 0.8
  - type: STWeight
    self: 0.25


