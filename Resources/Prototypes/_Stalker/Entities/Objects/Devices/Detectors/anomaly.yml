# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseItem
  id: ZoneAnomalyBaseDetector
  suffix: Stalker, Detector
  abstract: true
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Devices/ZoneAnomalyDetectors/ad_1.rsi
      layers:
        - state: base
        - state: screen_off
          map: ["enum.ZoneAnomalyDetectorVisuals.Layer"]
          shader: unshaded
    - type: RepositoryItem
      categoryName: Detectors # Zona14: Детекторы
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.ZoneAnomalyDetectorVisuals.Enabled:
          enum.ZoneAnomalyDetectorVisuals.Layer:
            True: { state: screen_on }
            False: { state: screen_off }
    - type: ZoneAnomalyDetector
      level: 0
      distance: 7
    - type: Item
      size: Small

- type: entity
  parent: ZoneAnomalyBaseDetector
  id: ZoneAnomalyDetectorAD1
  name: AD-1
  description: A hand-held scanner built to collect information on various anomalous objects.
  suffix: Stalker, Detector
  components:
    - type: STWeight
      self: 0.5
    - type: Sprite
      sprite: _Stalker/Objects/Devices/ZoneAnomalyDetectors/ad_1.rsi
      layers:
        - state: base
        - state: screen_off
          map: ["enum.ZoneAnomalyDetectorVisuals.Layer"]
          shader: unshaded
    - type: ZoneAnomalyDetector
      beepSound: /Audio/_Stalker/Items/Detectors/Anomaly/da_beep2.ogg
      maxBeepInterval: 4.5
      minBeepInterval: 0.5
      level: 0
      distance: 10
    - type: Craftable

- type: entity
  parent: ZoneAnomalyBaseDetector
  id: ZoneAnomalyDetectorUpgradeAD1
  name: Advanced Model 1 Anomaly Detector (DA-1)
  description: Handheld scanner that has been modified, reduced distance and designed to react to anomalies at close range
  suffix: Stalker, Detector # Zona14: Stalker, Детектор
  components:
    - type: STWeight
      self: 0.8
    - type: Sprite
      sprite: _Stalker/Objects/Devices/ZoneAnomalyDetectors/ad_1.rsi
      layers:
        - state: base
        - state: screen_off
          map: ["enum.ZoneAnomalyDetectorVisuals.Layer"]
          shader: unshaded
    - type: ZoneAnomalyDetector
      beepSound: /Audio/_Stalker/Items/Detectors/Anomaly/da_beep2.ogg
      maxBeepInterval: 4.5
      minBeepInterval: 0.5
      level: 0
      distance: 5

