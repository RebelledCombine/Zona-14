# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseItem
  id: StalkerGrinder
  name: Manual Grinder
  description: Manual shredder, suitable for herbs and plants.
  suffix: Stalker
  components:
  - type: ReagentGrinder
  - type: Sprite
    sprite: _Stalker/Objects/Devices/grinder.rsi
    layers:
    - state: grinder
  - type: UserInterface
    interfaces:
      enum.ReagentGrinderUiKey.Key:
        type: ReagentGrinderBoundUserInterface
  - type: ActivatableUI
    key: enum.ReagentGrinderUiKey.Key
  - type: ContainerContainer
    containers:
      beakerSlot: !type:ContainerSlot {}
      inputContainer: !type:Container
        ents: []
  - type: ItemSlots
    slots:
      beakerSlot:
        whitelist:
          components:
          - FitsInDispenser
