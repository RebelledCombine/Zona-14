- type: entity
  parent: BookBase
  id: BookStalkerFAQ
  name: Zone Guide
  description: All about the zone...
  suffix: Stalker, book # Zona14: Stalker, book
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Misc/books.rsi
    layers:
    - state: stalker_book
  - type: Paper
    content: faq-stalker
    stampState: paper_stamp-cap
    stampedBy:
    - stampedName: Government # Zona14: Government
      stampedColor: "#3681bb"
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requireActiveHand: true
    requiresComplex: true
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: Trash
    time: 240

