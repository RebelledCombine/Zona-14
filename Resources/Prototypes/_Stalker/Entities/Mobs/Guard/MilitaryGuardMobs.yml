- type: entity
  name: Vova Vist
  suffix: Stalker, T6, mega-powerful, NPC # Zona14: Stalker, T6, mega-powerful, NPC
  parent: MobStalkerBaseGuard
  id: MobStalkerMilitaryVovaVist
  description: Vova Vist has excellent machine gun firing skills, combined with the anomalous power of his machine gun, which is enough to make a military man one of the most dangerous people in the Zone. Even such a legendary stalker as Scar demonstrated superhuman capabilities and all his skills, giving his all and receiving a huge portion of five-point pain to break into the Village of Rookies, avoiding the keen eye, brought to the limit of skill and deadly bullets of Vova Vista.
  components:
  - type: Sprite
    sprite: /Textures/_Stalker/Mobs/Military/Vist.rsi
  - type: PredictedBatterySelfRecharger
    autoRechargeRate: 50
  - type: PredictedBattery
    maxCharge: 100
    startingCharge: 100
  - type: BatteryAmmoProvider
    proto: Bullet918PGJ
    fireCost: 1
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/pkm_shot.ogg
    fireRate: 10
    useKey: false
    selectedMode: FullAuto
    minAngle: 5
    maxAngle: 20
    angleIncrease: 1
    angleDecay: 30
    availableModes:
    - FullAuto

