# Zona14: translated Russian names/descriptions to English
# Zona14: General
- type: entity
  id: SpawnerZoneAnomalyGravityGroupChance1
  name: gravity anomaly spawner (1% chance to spawn)
  suffix: Stalker
  parent: FlexibleMarker
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: _Stalker/Objects/Anomalies/springobard.rsi
        state: idle
      - sprite: _Stalker/Markers/numbers.rsi
        state: 1
  - type: RandomSpawner
    rarePrototypes:
      - ZoneAnomalyGrabber
      - AnomSEpicentre
    rareChance: 0.01
    prototypes:
      - ZoneAnomalyGravi
      - ZoneAnomalySpringboard
    chance: 0.1
    offset: 0.0

