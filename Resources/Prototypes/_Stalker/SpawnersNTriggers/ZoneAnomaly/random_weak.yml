# Zona14: translated Russian names/descriptions to English
# Zona14: Rift
- type: entity
  id: SpawnerZoneAnomalyRandomWeakChance1
  name: random weak anomaly spawner (1% chance to spawn)
  suffix: Stalker
  parent: FlexibleMarker
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: _Stalker/Objects/Other/Anomalys/rift.rsi
        state: idle
      - sprite: _Stalker/Markers/numbers.rsi
        state: 1
  - type: RandomSpawner
    prototypes:
      - ZoneAnomalyLamp
      - ZoneAnomalySpringboard
      - ZoneAnomalyGravi
      - ZoneAnomalyJarka
      - ZoneAnomalyElectra
      - ZoneAnomalyBurden
    chance: 0.1
    offset: 0.0

