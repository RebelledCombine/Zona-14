# Zona14: translated Russian names/descriptions to English
# Zona14: ОРУЖИЕ

- type: stUpgradeTree # Zona14: Это для теста.
  id: STAK104UpgradeTree
  upgrades:
  - id: firerate_1
    name: Enhanced Gas Block
    branchId: handling
    branchName: "Handling" # Zona14: Обращение
    requiredMaterials:
      Steel: 2
    requiredTools:
    - Welder
    weightMultiplier: 0.95
    gun:
      fireRateMultiplier: 1.2

  - id: recoil_1
    name: Recoil Stabilizer
    branchId: handling
    branchName: "Handling" # Zona14: Обращение
    requiredUpgrades:
    - firerate_1
    requiredMaterials:
      Steel: 1
      Glass: 1
    requiredTools:
    - Welder
    weightMultiplier: 0.95
    gun:
      angleIncreaseMultiplier: 0.7
      maxAngleMultiplier: 0.85

  - id: precision_1
    name: Bolt Polishing
    branchId: precision
    branchName: "Accuracy" # Zona14: Точность
    requiredMaterials:
      Glass: 2
    requiredTools:
    - Screwdriver
    weightMultiplier: 1.05
    gun:
      minAngleMultiplier: 0.85
      maxAngleMultiplier: 0.9

  - id: precision_2
    name: Barrel Group Fitting
    branchId: precision
    branchName: "Accuracy" # Zona14: Точность
    requiredUpgrades:
    - precision_1
    requiredMaterials:
      Steel: 1
    requiredTools:
    - Screwdriver
    weightMultiplier: 1.05
    gun:
      angleDecayMultiplier: 1.2
      minAngleMultiplier: 0.9


# Zona14: ШЛЕМЫ

