# Zona14: translated Russian names/descriptions to English
# Comment
- type: entity
  id: MapTeleportUsage
  parent: MapTeleportBase
  name: Map Teleport
  description: |- # Zona14: translated from Russian
    Basic teleport required for mapping
    locations for events. Or for permanent
    transitions between locations.

    For this portal to work,
    find component: NewMapTeleportComponent.
  suffix: Map, Mapping, Teleport
  components:
    - type: NewMapTeleport
      allowAll: true         #Boolean
      cooldownEnabled: false #Boolean
      cooldownTime: 0        #Float
      #godmodeCooldown: 0     #Float # Stalker-TODO: This field does not exist!
      portalName: "Name"

- type: entity
  id: MapTeleportUsageUncollide
  parent: MapTeleportBaseUncollide
  name: Map Teleport (No Collision)
  description: |- # Zona14: translated from Russian
    Basic teleport required for mapping
    locations for events. Or for permanent transitions between locations.
    Does not transport the player between locations.

    For this portal to work,
    find component: NewMapTeleportComponent.
  suffix: Map, Mapping, Teleport, Uncollibe
  components:
    - type: NewMapTeleport
      allowAll: true         #Boolean
      cooldownEnabled: false #Boolean
      cooldownTime: 0        #Float
      #godmodeCooldown: 0     #Float # Stalker-TODO: This field does not exist!
      portalName: "Name"

- type: entity
  id: LocaleTeleportUsage
  parent: LocalTeleportBase
  name: Map Teleport (Local)
  description: |- # Zona14: translated from Russian
    Basic teleport required for mapping
    locations for events. Or for permanent
    transitions to locations.

    For this portal to work,
    find component: LocalTeleportComponent.
  suffix: Local, Mapping, Teleport
  components:
    - type: LocalTeleport
      allowAll: true #Boolean
      portalName: "Name"
