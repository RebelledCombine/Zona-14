# Zona14: translated Russian names/descriptions to English
# AnomalyExpsShelter
- type: entity
  id: StalkerExplSafezoneTriggerIn
  parent: MarkerBase
  name: Emission protection
  description: Transports you to a linked destination!
  suffix: Stalker
  components:
    - type: AddOrDelOnCollideSafeZone
      MustAdd: true
    - type: Sprite
      layers:
        - state: blue
    - type: Transform
      anchored: True
    - type: InteractionOutline
    - type: Clickable
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        portalFixture:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.25,-0.48,0.25,0.48"
          mask:
            - FullTileMask
          layer:
            - WallLayer
          hard: false
- type: entity
  id: StalkerExplSafezoneTriggerOut
  name: Disabling Emission Protection
  description: Transports you to a linked destination!
  parent: MarkerBase
  suffix: Stalker
  components:
    - type: AddOrDelOnCollideSafeZone
      MustAdd: false
    - type: Transform
      anchored: True
    - type: InteractionOutline
    - type: Clickable
    - type: Physics
      bodyType: Static
    - type: Sprite
      layers:
        - state: red
    - type: Fixtures
      fixtures:
        portalFixture:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.25,-0.48,0.25,0.48"
          mask:
            - FullTileMask
          layer:
            - WallLayer
          hard: false
# Pacif
- type: entity
  id: StalkerPaciTriggerIn
  parent: MarkerBase
  name: Turning on pacifism
  description: Transports you to a linked destination!
  suffix: Stalker
  components:
    - type: Sprite
      layers:
        - state: blue
    - type: Transform
      anchored: True
    - type: InteractionOutline
    - type: Clickable
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        portalFixture:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.25,-0.48,0.25,0.48"
          mask:
            - FullTileMask
          layer:
            - WallLayer
          hard: false
    - type: StalkerPacifiedZone
      Pacified: true
    - type: STAnomalyGeneratorSpawnBlocker
      size: 10
    - type: EmissionLightningSpawnBlocker # ST14-EN: added emission lightning blocker
      radius: 5
- type: entity
  id: StalkerPaciTriggerOut
  name: Turning Off Pacifism
  description: Transports you to a linked destination!
  parent: MarkerBase
  suffix: Stalker
  components:
    - type: Transform
      anchored: True
    - type: InteractionOutline
    - type: Clickable
    - type: Physics
      bodyType: Static
    - type: Sprite
      layers:
        - state: red
    - type: Fixtures
      fixtures:
        portalFixture:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.25,-0.48,0.25,0.48"
          mask:
            - FullTileMask
          layer:
            - WallLayer
          hard: false
    - type: StalkerPacifiedZone
      Pacified: false

