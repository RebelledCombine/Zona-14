# Zona14: translated Russian names/descriptions to English
- type: entity
  id: STBonfire
  parent: Bonfire
  name: campfire
  description: What could be better than sitting by the fire with songs?
  components:
  - type: Craftable

- type: entity
  id: BonfireOff
  parent: BaseStructure
  name: campfire base
  description: "Shouldn't it be glowing?"
  suffix: TimeDesp 600
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Sprite
    noRot: true
    sprite: Structures/Decoration/bonfire.rsi
    layers:
      - state: bonfire
  - type: TimedDespawn
    lifetime: 600
  - type: Construction
    graph: BonfireCraft
    node: bonfireend
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 50
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
  - type: Craftable

- type: entity
  id: BonfireOn
  parent: STBonfire
  name: "{ ent-STBonfire }"
  description: What could be better than a late evening under the open sky with a guitar and friends.
  suffix: TimeDesp 300
  components:
  - type: Sprite
    noRot: true
    sprite: Structures/Decoration/bonfire.rsi
    layers:
      - state: bonfire
      - state: burning
  - type: PointLight
    radius: 5
    energy: 3
    color: "#FFC90C"
  - type: AmbientSound
    volume: -5
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg
  - type: AlwaysHot
  - type: TimedDespawn
    lifetime: 300
  - type: SpawnOnDespawn
    prototype: Ash
  - type: Craftable

# bonfire crafting

- type: construction
  id: BonfireCraft
  graph: BonfireCraft
  startNode: start
  targetNode: bonfireend
  category: construction-category-structures
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  hide: false
  conditions:
    - !type:TileNotBlocked
