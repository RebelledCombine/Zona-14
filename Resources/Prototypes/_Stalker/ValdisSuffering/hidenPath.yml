# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: BaseCraftItem
  id: BypassCard
  name: Gatekeeper Access Card
  description: Card to unlock the Anteroom Gateway in the subway. Unlocks it for 30 seconds.
  suffix: ST, card
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Craft/tech_card.rsi
      layers:
        - state: base
        - state: contacts_gold
        - state: label_orange
    - type: Craftable

- type: lightCraftingRecipe
  id: lightCraftActiveBypassPrivratnik
  results:
    - BypassActivated
  steps:
    firstIngredient: BypassDeactivated
    secondIngredient: BypassCard
    time: 2

- type: entity
  parent: BlastDoor
  id: BypassDeactivated
  name: "Gatekeeper's hermetic gateway"
  description: A special single-use card is needed to unlock this gateway.
  components:
  - type: Craftable


- type: entity
  id: BypassActivated
  name: "{ ent-BypassDeactivated }"
  parent: BlastDoorOpen
  description: A special single-use card is needed to unlock this gateway. Unlocked.
  suffix: Stalker
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 30
  - type: SpawnOnDespawn
    prototype: BypassDeactivated

# Zona14: Helicopter ticket to Red Forest
- type: entity
  parent: BypassCard
  id: STHelicopterToRedForestTicket
  name: Helicopter ticket to the Red Forest
  description: helicopter ticket to the Red Forest. Resale and forgery of tickets are prosecuted by law.
  suffix: ST, card

- type: lightCraftingRecipe
  id: lightCraftHelicopterToRedForestBypass
  results:
    - STHelicopterBypassActivated
  steps:
    firstIngredient: STHelicopterBypassDeactivated
    secondIngredient: STHelicopterToRedForestTicket
    time: 2

- type: entity
  parent: BypassDeactivated
  id: STHelicopterBypassDeactivated
  name: helicopter airlock
  description: to unlock the gateway you need to buy a ticket
  components:
  - type: Craftable


- type: entity
  parent: BypassActivated
  id: STHelicopterBypassActivated
  name: "{ ent-STHelicopterBypassDeactivated }"
  description: to unlock the gateway you need to buy the ticket Unlocked.
  suffix: Stalker
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 2
  - type: SpawnOnDespawn
    prototype: STHelicopterBypassDeactivated


# Zona14: Dollar exchange
- type: entity
  parent: BypassCard
  id: DollarBypassCard
  name: Black Market Access Card
  description: Dollar Exchanger Access Card in Dungeons Ch-4, opens the door for 5 minutes.
  suffix: ST, card

- type: lightCraftingRecipe
  id: lightCraftActiveBypassTrader
  results:
    - DollarBypassActivated
  steps:
    firstIngredient: DollarBypassDeactivated
    secondIngredient: DollarBypassCard
    time: 2


- type: entity
  parent: BypassDeactivated
  id: DollarBypassDeactivated
  name: exchanger hermetic gateway
  description: "{ ent-BypassDeactivated.desc }"
  components:
  - type: Craftable


- type: entity
  parent: BypassActivated
  id: DollarBypassActivated
  name: "{ ent-DollarBypassDeactivated }"
  description: "{ ent-BypassActivated.desc }"
  suffix: Stalker
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 300
  - type: SpawnOnDespawn
    prototype: DollarBypassDeactivated

# Zona14: Gym access
- type: entity
  parent: BypassCard
  id: FitnessCenterCard
  name: Fitness Center Access Card
  description: Fitness Center Access Card, Opens the door temporarily
  suffix: ST, card
  components:
    - type: Sprite
      layers:
        - state: base
        - state: contacts_gold
        - state: label_green

- type: lightCraftingRecipe
  id: lightCraftActiveBypassFitness
  results:
    - FitnessBypassActivated
  steps:
    firstIngredient: FitnessBypassDeactivated
    secondIngredient: FitnessCenterCard
    time: 2

- type: entity
  parent: BypassDeactivated
  id: FitnessBypassDeactivated
  name: Fitness Center Hermetic Door
  description: To unlock this gateway, you need a fitness center card.
  components:
    - type: Craftable

- type: entity
  parent: BypassActivated
  id: FitnessBypassActivated
  name: "{ ent-FitnessBypassDeactivated }"
  description: To unlock this gateway, you need a fitness center card. Unlocked.
  suffix: Stalker
  categories: [ HideSpawnMenu ]
  components:
    - type: TimedDespawn
      lifetime: 180
    - type: SpawnOnDespawn
      prototype: FitnessBypassDeactivated
