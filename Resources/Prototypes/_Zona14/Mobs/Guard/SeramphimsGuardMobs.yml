- type: entity
  name: Seraphim Patrolman
  suffix: Z14
  parent: MobStalkerBaseGuard
  id: Z14MobSeraphimSecurityLite
  categories: [ Zona14 ]
  description: Security guard for Seraphim.
  components:
  - type: NpcFactionMember
    factions:
    - Seraphims
  - type: Sprite
    sprite: /Textures/_Stalker/Mobs/Guards/Seraphims/Lite.rsi
  - type: Bands
    bandIcon: seraphim
  - type: PredictedBatterySelfRecharger
    autoRechargeRate: 2
  - type: BatteryAmmoProvider
    proto: Bullet545PC
    fireCost: 5
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/919.ogg
    fireRate: 4
    useKey: false
    selectedMode: FullAuto
    minAngle: 5
    maxAngle: 55
    angleIncrease: 1
    angleDecay: 5
    availableModes:
    - FullAuto
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Critical
      151: Dead
  - type: PassiveDamage
    allowedStates:
    - Alive
    - Critical
    damageCap: 135
    damage:
      groups:
        Burn: -100
        Toxin: -100
        Airloss: -100
        Brute: -1

