- type: entity
  name: Seraphim patrol
  parent: MobHostileGuardPatrool
  id: Z14MobSeraphimsGuardLite
  categories: [ Zona14 ]
  suffix: Z14
  description: A Seraphim patrol guard, delivering divine will through lead.
  components:
  - type: NpcFactionMember
    factions:
    - Seraphims
  - type: Bands
    bandIcon: seraphim
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/919.ogg
    fireRate: 5
    useKey: false
    selectedMode: FullAuto
    minAngle: 15
    maxAngle: 70
    angleIncrease: 1
    angleDecay: 15
    availableModes:
    - FullAuto
  - type: BatteryAmmoProvider
    proto: Bullet919PST
    fireCost: 5
  - type: Sprite
    sprite: /Textures/_Stalker/Mobs/Guards/Seraphims/Lite.rsi

