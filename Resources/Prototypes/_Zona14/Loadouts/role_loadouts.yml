# Role loadouts for the Zona-14 mid-rank jobs added in _Zona14/Roles/Jobs/faction_clones.yml.
#
# Without a roleLoadout named "Job<jobId>", StationSpawningSystem's TryIndex fails, the
# loadout stays null and EquipRoleLoadout is skipped entirely — the character spawns with
# nothing but their startingGear. For these three that is a PDA and a dogtag, i.e. naked.
#
# Each mirrors its parent rank's group list so the faction's clothing options are identical:
#   StalkerCutthroat -> JobStalkerBandit
#   StalkerScout     -> JobStalkerFreedom
#   StalkerDutyNCO   -> JobStalkerDolg

- type: roleLoadout
  id: JobStalkerCutthroat
  groups:
  - STTrinketsGroupOne
  - STTrinketsGroupTwo
  - STBackpackGroup
  - STStorageTrinkets
  - STShoesGroup
  - STMaskStalkerGroup
  - STBeltStalkerGroup
  - STlegsGroup
  - STTorsoGroupBandit
  - STSuitstorageGroup
  - STStorage
  - STStorageAmmunition
  - STGlasses
  - STOuterClothingBandit

- type: roleLoadout
  id: JobStalkerScout
  groups:
  - STTrinketsGroupOne
  - STTrinketsGroupTwo
  - STBackpackGroup
  - STStorageTrinkets
  - STShoesGroup
  - STMaskStalkerGroup
  - STBeltStalkerGroup
  - STlegsGroupFreedom
  - STTorsoGroupFreedom
  - STSuitstorageGroup
  - STStorage
  - STStorageAmmunition
  - STGlasses
  - STOuterClothingFreedom

- type: roleLoadout
  id: JobStalkerDutyNCO
  groups:
  - STTrinketsGroupOne
  - STTrinketsGroupTwo
  - STBackpackGroup
  - STStorageTrinkets
  - STShoesGroup
  - STMaskStalkerGroup
  - STBeltStalkerGroup
  - STlegsGroup
  - STTorsoGroupDolg
  - STSuitstorageGroup
  - STStorage
  - STStorageAmmunition
  - STGlasses
  - STOuterClothingDolg
