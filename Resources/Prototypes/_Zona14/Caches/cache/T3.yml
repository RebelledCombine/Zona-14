# Zona14: cloned from _Stalker/Caches/cache/T3.yml so the high tiers
# have a Zona-14 loot table. Consumables and BLUEPRINTS use the Z14 twins;
# raw materials stay on the upstream ids.
# Zona14: the split is deliberate and load-bearing - crafting matches ingredients
# by exact prototype id (SharedCraftingSystem.DictEquals), so:
#   - materials: every loot table grants the upstream id, so recipes must ask for
#     the upstream id or they silently never match.
#   - blueprints: the Z14 recipe asks for the Z14 blueprint. That is what keeps it
#     distinguishable from its _Stalker twin, which has identical ingredients and a
#     different result - recipe selection is first-match-and-return over an
#     arbitrarily ordered enumeration, so identical ingredient sets are a coin flip.
#     If this table hands out the upstream blueprint, the Z14 recipe is uncraftable.
# Zona14: translated Russian names/descriptions to English
- type: entity
  parent: STBaseCache
  id: Z14STCacheStorageFillT3
  categories: [ Zona14 ]
  abstract: true
  suffix: Z14, Cache, T3
  name: crate
  description: "A rather old crate. Maybe it's worth searching. Perhaps something useful can be found inside."
  components:
    # Zona-14 tables carry far more entries than upstream's (blueprints for all
    # T3+ crafting live here), and TestSufficientSpaceForFill demands the grid
    # fit the WORST-CASE fill - every prob entry spawning at once.
    - type: Storage
      grid:
        - 0,0,17,17
    - type: InteractionOutline
