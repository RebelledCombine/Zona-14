# HUD gauge for gas-mask filter charge (always shown while a filter is installed).
# Placeholder icons (breath/internals) until a dedicated gauge (full/low/spent) is drawn.
- type: alert
  id: Z14GasFilter
  icons:
    - sprite: Interface/Alerts/internals.rsi
      state: internal2 # severity 0: healthy
    - sprite: Interface/Alerts/internals.rsi
      state: internal1 # severity 1: low
    - sprite: Interface/Alerts/internals.rsi
      state: internal0 # severity 2: spent
  minSeverity: 0
  maxSeverity: 2
  name: zona14-alert-gasfilter-name
  description: zona14-alert-gasfilter-desc
