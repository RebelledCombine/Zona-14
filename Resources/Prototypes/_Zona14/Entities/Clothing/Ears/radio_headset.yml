- type: entity
  id: Z14STRadioHeadset
  categories: [ Zona14 ]
  parent: BaseItem
  name: radio headset
  suffix: Z14
  description: A compact radio headset. The speaker is always on if it is installed; toggle the microphone with the action button.
  components:
  - type: RadioMicrophone
    powerRequired: false
    unobstructedRequired: false
    listenRange: 1
    toggleOnInteract: false
    broadcastChannel: StalkerInternal
  - type: RadioStalker
    requiresPower: false
  - type: Speech
    speechVerb: Robotic
  - type: Clothing
    slots: [ears]
    sprite: _Stalker_EN/Objects/Clothing/Ears/radio_headset.rsi
  - type: Item
    size: Small
  - type: STRadioHeadset
  - type: ActivatableUI
    key: enum.STRadioHeadsetUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.STRadioHeadsetUiKey.Key:
        type: STRadioHeadsetBoundUserInterface
  - type: Sprite
    sprite: _Stalker_EN/Objects/Clothing/Ears/radio_headset.rsi
    state: icon
  - type: Clickable
  - type: InteractionOutline
