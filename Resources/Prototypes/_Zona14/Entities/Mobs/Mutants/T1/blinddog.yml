- type: entity
  parent: Z14STBaseMobMutant
  id: Z14BaseMobMutantBlindDog
  categories: [ Zona14 ]
  name: Blind Dog Base
  abstract: true
  components:
    - type: Damageable
      damageModifierSet: Z14STMutantT1DamageModifierSet
    - type: HTN
      rootTask:
        task: STBlindDogRedCompound
      blackboard:
        VisionRadius: !type:Single
          20
        AggroVisionRadius: !type:Single
          10
    - type: Butcherable
      spawned:
        - id: Z14MutantPartBlindDogTail
          amount: 1
          prob: 0.7
        - id: Z14FoodMeatDog
          maxAmount: 1
          prob: 0.7
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
        Critical:
          Base: dead
        Dead:
          Base: dead
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 90
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                collection: STBlindDogDeath
    - type: MobThresholds
      thresholds:
        0: Alive
        90: Dead
    - type: MeleeWeapon
      attackRate: 1
      angle: 30
      range: 1.1
      soundHit:
        path: /Audio/_Stalker/Mutants/bdog_hit_0.ogg
        params:
            variation: 0.125
            pitch: 0
      soundSwing:
        collection: STBlindDogAttack
        params:
            variation: 0.125
      animation: WeaponArcClaw
      wideAnimation: WeaponArcClaw
      damage:
        types:
          Slash: 12
    - type: BonusMeleeDamage
      heavyDamageMultiplier: 1.5
    - type: MovementSpeedModifier
      baseWalkSpeed: 2
      baseSprintSpeed: 4
    - type: Sprite
      sprite: /Textures/_Stalker/Mobs/Mutants/Blind_Dogs/red.rsi
      layers:
        - map: ["enum.DamageStateVisualLayers.Base"]
          state: alive
    - type: SlowOnDamage
    - type: StaminaDamageOnHit
      damage: 5
    - type: STWeight
      self: 35

- type: entity
  parent: Z14BaseMobMutantBlindDog
  id: Z14MobMutantBlindDogSmall
  categories: [ Zona14 ]
  suffix: Z14
  name: Blind Dog
  description: A small blind dog, a mix of bull terrier and radiation.
  components:
    - type: HTN
      rootTask:
        task: STBlindDogSmallCompound
    - type: Butcherable
      spawned:
        - id: Z14MutantPartBlindDogTail
          amount: 1
          prob: 0.9
        - id: Z14FoodMeatDog
          maxAmount: 1
          prob: 0.7
    - type: Sprite
      sprite: /Textures/_Stalker/Mobs/Mutants/Blind_Dogs/small.rsi
      layers:
        - map: ["enum.DamageStateVisualLayers.Base"]
          state: alive
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 50
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                collection: STBlindDogDeath
                params:
                    pitch: 1.5
    - type: MobThresholds
      thresholds:
        0: Alive
        50: Dead
    - type: STWeight
      self: 5
    - type: MovementSpeedModifier
      baseWalkSpeed: 2
      baseSprintSpeed: 5
    - type: MeleeWeapon
      wideAnimation: WeaponArcClaw
      damage:
        types:
          Slash: 12
      soundHit:
        path: /Audio/_Stalker/Mutants/bdog_hit_0.ogg
        params:
            variation: 0.125
            pitch: 0.5
      soundSwing:
        collection: STBlindDogAttack
        params:
            pitch: 1.5
    # Stalker-EN start
    - type: STMobVariantConfig
      variants:
      - chance: 0.08
        quality: Uncommon
        nameOverride: st-mob-variant-uncommon-blinddog
        healthMultiplier: 1.1
        damageMultiplier: 1.1
        spriteScale: 1.05
        spriteTint: "#604020FF"
        spriteSaturation: 1.3
        spriteBrightness: 0.8
        minWeightMultiplier: 0.95
        maxWeightMultiplier: 1.25
        butcherSwaps:
          Z14MutantPartBlindDogTail: Z14STMutantPartUncommonBlindDogTail
      - chance: 0.02
        quality: Rare
        nameOverride: st-mob-variant-rare-blinddog
        healthMultiplier: 1.2
        damageMultiplier: 1.2
        spriteScale: 1.1
        spriteTint: "#C0D0FFFF"
        spriteSaturation: 0.2
        spriteBrightness: 1.5
        minWeightMultiplier: 1.1
        maxWeightMultiplier: 1.4
        butcherSwaps:
          Z14MutantPartBlindDogTail: Z14STMutantPartRareBlindDogTail
      - chance: 0.001
        quality: Legendary
        nameOverride: st-mob-variant-legendary-blinddog
        healthMultiplier: 1.3
        damageMultiplier: 1.3
        spriteScale: 1.15
        spriteTint: "#FF3020FF"
        spriteSaturation: 1.4
        spriteBrightness: 1.2
        minWeightMultiplier: 1.3
        maxWeightMultiplier: 1.6
        butcherSwaps:
          Z14MutantPartBlindDogTail: Z14STMutantPartLegendaryBlindDogTail
    # Stalker-EN end

