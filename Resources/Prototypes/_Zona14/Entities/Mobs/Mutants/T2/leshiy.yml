- type: entity
  name: Leshy
  parent: Z14BaseMobMutant
  id: Z14MobMutantLeshiy
  categories: [ Zona14 ]
  suffix: Z14
  components:
  - type: Damageable
    damageModifierSet: Z14STMutantT2DamageModifierSet
  - type: Bloodstream
    bloodReagents:
      reagents:
      - ReagentId: Water
        Quantity: 1
    bloodMaxVolume: 650
  - type: Butcherable
    spawned:
      - id: STCraftBirchPlankT2
        amount: 1
        prob: 0.4
      - id: Z14MutantPartLeshiyRoot
        maxAmount: 1
        prob: 0.5
  - type: Sprite
    sprite: _Stalker/Mobs/Mutants/leshiy.rsi
    layers:
      - map: ["enum.DamageStateVisualLayers.Base"]
        state: leshiy
  - type: DamageStateVisuals
    states:
      Alive:
        Base: leshiy
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: MobThresholds
    thresholds:
      0: Alive
      500: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      250: 0.7
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
    blackboard:
      VisionRadius: !type:Single
        20
      AggroVisionRadius: !type:Single
        15
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 3
  - type: BasicEntityAmmoProvider
    proto: Z14STBulletAcid
    capacity: 3
    count: 3
  - type: Gun
    fireRate: 2
    useKey: false
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot: /Audio/Weapons/Xeno/alien_spitacid.ogg
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 235
        mask:
        - MobMask
        layer:
        - MobLayer
  # Stalker-EN start
  - type: STMobVariantConfig
    variants:
    - chance: 0.08
      quality: Uncommon
      nameOverride: st-mob-variant-uncommon-leshiy
      healthMultiplier: 1.1
      spriteScale: 1.05
      spriteTint: "#805030FF"
      spriteSaturation: 1.5
      spriteBrightness: 0.7
      minWeightMultiplier: 0.95
      maxWeightMultiplier: 1.25
      butcherSwaps:
        Z14MutantPartLeshiyRoot: Z14STMutantPartUncommonLeshiyRoot
    - chance: 0.02
      quality: Rare
      nameOverride: st-mob-variant-rare-leshiy
      healthMultiplier: 1.2
      spriteScale: 1.1
      spriteTint: "#E0D8FFFF"
      spriteSaturation: 0.15
      spriteBrightness: 1.6
      minWeightMultiplier: 1.1
      maxWeightMultiplier: 1.4
      butcherSwaps:
        Z14MutantPartLeshiyRoot: Z14STMutantPartRareLeshiyRoot
    - chance: 0.001
      quality: Legendary
      nameOverride: st-mob-variant-legendary-leshiy
      healthMultiplier: 1.3
      spriteScale: 1.15
      spriteTint: "#FFC040FF"
      spriteSaturation: 1.3
      spriteBrightness: 1.4
      minWeightMultiplier: 1.3
      maxWeightMultiplier: 1.6
      butcherSwaps:
        Z14MutantPartLeshiyRoot: Z14STMutantPartLegendaryLeshiyRoot
  # Stalker-EN end
