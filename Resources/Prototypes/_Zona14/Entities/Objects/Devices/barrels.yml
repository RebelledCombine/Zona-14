# IRON BARRELS

- type: entity
  id: Z14BaseBarrel
  categories: [ Zona14 ]
  abstract: true
  parent: STBaseStructure
  name: barrel
  description: A large cylindrical vessel for liquids with two flat bottoms and slightly convex walls held together by hoops.
  placement:
    mode: PlaceFree
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Misc/barrels.rsi
    state: base

- type: entity
  id: Z14Barrel1
  categories: [ Zona14 ]
  suffix: Z14
  parent: Z14BaseBarrel

- type: entity
  id: Z14Barrel2
  categories: [ Zona14 ]
  suffix: Z14
  parent: Z14BaseBarrel
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Misc/barrels.rsi
    state: blue

- type: entity
  id: Z14Barrel3
  categories: [ Zona14 ]
  suffix: Z14
  parent: Z14BaseBarrel
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Misc/barrels.rsi
    state: rusted

- type: entity
  id: Z14BarrelExpl
  categories: [ Zona14 ]
  parent: BaseStructureDynamic
  suffix: Z14
  name: barrel
  components:
  - type: InteractionOutline
  - type: Physics
  - type: Damageable
    damageContainer: Inorganic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 200
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: Sprite
    sprite: _Stalker/Objects/Misc/barrels.rsi
    state: explosive
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ExplodeBehavior
      - !type:SpawnEntitiesBehavior
        spawn:
          MachineFrameDestroyed:
            min: 1
            max: 1
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
            - 0 # oxygen
            - 0 # nitrogen
            - 340.5701689 # carbon dioxide
          temperature: 373.15
  - type: Explosive
    explosionType: Default
    maxIntensity: 200
    intensitySlope: 3
    totalIntensity: 300

