- type: entity
  parent: BaseItem
  id: Z14STCamera
  categories: [ Zona14 ]
  name: camera
  suffix: Z14
  description: A battered Zenit camera. Still takes decent pictures in the Zone.
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Devices/camera.rsi
    state: camera
  - type: Item
    size: Small
    storedRotation: 90
  - type: ItemSlots
    slots:
      film_slot:
        name: st-camera-film-slot-name
        startingItem: Z14STCameraFilm
        swap: true
        whitelist:
          tags:
          - STCameraFilm
  - type: ContainerContainer
    containers:
      film_slot: !type:ContainerSlot { }
  - type: STCamera
  - type: STWeight
    self: 0.5
  - type: RepositoryItem # stalker-en change
    categoryName: repository-tools-category

- type: entity
  parent: Z14STCamera
  id: Z14STCameraVintage
  categories: [ Zona14 ]
  name: vintage camera
  suffix: Z14
  description: An old FED rangefinder. Produces warm, faded photos with a Polaroid look.
  components:
  - type: STCamera
    effect: Polaroid
  - type: Sprite
    sprite: _Stalker_EN/Objects/Devices/camera.rsi
    state: camera_vintage

- type: entity
  parent: Z14STCamera
  id: Z14STCameraDamaged
  categories: [ Zona14 ]
  name: damaged camera
  suffix: Z14
  description: A camera with fried internals. Photos come out glitchy and distorted.
  components:
  - type: STCamera
    effect: Glitch
  - type: Sprite
    sprite: _Stalker_EN/Objects/Devices/camera.rsi
    state: camera_broken

- type: entity
  parent: BaseItem
  id: Z14STPhoto
  categories: [ Zona14 ]
  name: photograph
  suffix: Z14
  description: A printed photograph.
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Misc/misc.rsi
    state: photo
  - type: Item
    size: Tiny
  - type: ActivatableUI
    key: enum.STPhotoUiKey.Key
    inHandsOnly: false
  - type: UserInterface
    interfaces:
      enum.STPhotoUiKey.Key:
        type: STPhotoBoundUserInterface
  - type: STPhoto
  - type: STWeight
    self: 0.1
  - type: RepositoryItem # stalker-en change
    categoryName: repository-miscellaneous-category
  - type: Tag
    tags:
    - Document

- type: entity
  parent: BaseItem
  id: Z14STCameraFilm
  categories: [ Zona14 ]
  name: camera film
  suffix: Z14
  description: A roll of photographic film. Holds 5 exposures.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Craft/tech_card.rsi
    state: base
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - STCameraFilm
  - type: LimitedCharges
    maxCharges: 5
  - type: STWeight
    self: 0.1
