  - type: Sprite
    layers:
    - state: crypt_gray
    - state: configurable_label

- type: entity
  parent: EncryptionKey
  id: Z14EncryptionKeyMercStalker
  categories: [ Zona14 ]
  suffix: Z14
  name: Mercenary Encryption Key
  description: Mercenary encryption key with a secure communication channel
  components:
  - type: EncryptionKey
    channels:
    - Merc
    defaultChannel: Merc
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: common_label
