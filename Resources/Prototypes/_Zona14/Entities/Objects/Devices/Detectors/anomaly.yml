- type: entity
  parent: BaseItem
  id: Z14ZoneAnomalyBaseDetector
  categories: [ Zona14 ]
  abstract: true
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Devices/ZoneAnomalyDetectors/ad_1.rsi
      layers:
        - state: base
        - state: screen_off
          map: ["enum.ZoneAnomalyDetectorVisuals.Layer"]
          shader: unshaded
    - type: RepositoryItem
      categoryName: Detectors
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.ZoneAnomalyDetectorVisuals.Enabled:
          enum.ZoneAnomalyDetectorVisuals.Layer:
            True: { state: screen_on }
            False: { state: screen_off }
    - type: ZoneAnomalyDetector
      level: 0
      distance: 7
    - type: Item
      size: Small

- type: entity
  parent: Z14ZoneAnomalyBaseDetector
  id: Z14ZoneAnomalyDetectorAD1
  categories: [ Zona14 ]
  name: AD-1
  description: A hand-held scanner built to collect information on various anomalous objects.
  suffix: Z14
  components:
    - type: STWeight
      self: 0.5
    - type: Sprite
      sprite: _Stalker/Objects/Devices/ZoneAnomalyDetectors/ad_1.rsi
      layers:
        - state: base
        - state: screen_off
          map: ["enum.ZoneAnomalyDetectorVisuals.Layer"]
          shader: unshaded
    - type: ZoneAnomalyDetector
      beepSound: /Audio/_Stalker/Items/Detectors/Anomaly/da_beep2.ogg
      maxBeepInterval: 4.5
      minBeepInterval: 0.5
      level: 0
      distance: 10
    - type: Craftable

- type: entity
  parent: Z14ZoneAnomalyBaseDetector
  id: Z14ZoneAnomalyDetectorUpgradeAD1
  categories: [ Zona14 ]
  name: Advanced Model 1 Anomaly Detector (DA-1)
