- type: entity
  parent: [ BaseItem, BaseFoldable ]
  id: Z14BaseMachineAnomalyDestructor
  categories: [ Zona14 ]
  name: Scientific Equipment
  description: Such a complex mechanism that only scientists can use it.
  suffix: Z14
  components:
    - type: Tag
      tags:
        - Structure
    - type: STWeight
      self: 7.5
    - type: Item
      sprite: _Stalker/Objects/Devices/Anomaly/Destructors/pad.rsi
      size: Huge
    - type: Sprite
      noRot: true
      sprite: _Stalker/Objects/Devices/Anomaly/Destructors/pad.rsi
      layers:
        - state: base
          map: ["unfoldedLayer"]
        - state: screen
          map: ["screenUnfoldedLayer"]
          shader: unshaded
        - state: icon
          map: ["foldedLayer"]
          visible: false
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.FoldedVisuals.State:
          foldedLayer:
            True: {visible: true}
            False: {visible: false}
          unfoldedLayer:
            True: {visible: false}
            False: {visible: true}
          screenUnfoldedLayer:
            True: {visible: false}
            False: {visible: true}
    - type: PointLight
      color: "#33b41f"
      enabled: true
      radius: 1.5
      softness: 5

- type: entity   
  parent: Z14BaseMachineAnomalyDestructor
  id: Z14BaseMachineAnomalyDestructorFolded
  categories: [ Zona14 ]
  suffix: Z14
  components:
    - type: Foldable
      folded: true

