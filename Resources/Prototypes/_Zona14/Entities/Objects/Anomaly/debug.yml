- type: entity
  parent: Z14STAnomalyBase
  id: Z14STAnomalyDebug
  categories: [ Zona14 ]
  suffix: Z14
  components:
    - type: STAnomalyTriggerGroupsStateTransition
    - type: STAnomalyTriggerStartCollide
      blacklist:
        components:
          - Projectile
    - type: STAnomalyTriggerTimeDelay
      options:
        ActiveSmall:
          group: TimeDelayActive
          delay: 5
        ActiveNormal:
          group: TimeDelayActive
          delay: 10
    - type: STAnomaly
      state: Idle
      states:
        Idle:
          - group: WeightSmall
            state: ActiveSmall
          - group: WeightNormal
            state: ActiveNormal
        ActiveNormal:
          - group: TimeDelayActive
            state: Idle
        ActiveSmall:
          - group: TimeDelayActive
            state: Idle
    - type: STAnomalyEffectThrow
      options:
        StateActiveNormal:
          range: 0.5
          distance: 10
          force: 20
          type: FromAnomaly
    - type: Sprite
      sprite: Effects/optionsvisualizertest.rsi
      state: none
