# Spawned by Electra, Garland
- type: entity
  parent: Z14BaseArtifact
  id: Z14ZoneArtifactSparkler
  categories: [ Zona14 ]
  suffix: Z14
  components:
  - type: Sprite
    state: sparkler
    scale: 0.5, 0.5
  - type: ZoneArtifact
    anomaly: Z14ZoneAnomalyElectra
  - type: ZoneArtifactDetectorTarget
    detectedLevel: 1
  - type: PointLight
    radius: 1.5
    energy: 4.5
    color: "#09efff"
    castShadows: false
  - type: PersonalDamage
    damage:
      types:
        Compression: -0.1
        Shock: -0.1
    interval: 1
  - type: ArtifactSelfRadiation
    rads: 1.0
  - type: Armor
    hiddenExamine: true
    armorClass: 2
    modifiers:
      coefficients:
        Shock: 0.9
        Compression: 0.9
  - type: Tag
    tags:
    - Khabar
    - STArtifact
    - STArtifactTier1

