
- type: entity
  parent: BaseItem
  id: Z14BaseHealingItemStalker
  categories: [ Zona14 ]
  abstract: true
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 10
  - type: Trash
    time: 900
  - type: RepositoryItem
    categoryName: Medicine
  - type: Sprite
    sprite: _Stalker/Objects/Counsumable/Medicine/newmed.rsi
  # Inherited
  - type: Item
    size: Small
    sprite: _Stalker/Objects/Counsumable/Medicine/newmed.rsi
    shape:
      - 0,0,0,0

- type: reagent
  id: Z14antirad
  name: reagent-name-antirad
  group: Medicine
  desc: reagent-desc-antirad
  physicalDesc: reagent-physical-desc-salvation
  flavor: salvation
  color: "#AE0101"
  boilingPoint: 212.0
  meltingPoint: 170.0
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        damage:
          types:
            Radiation: -0.75
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Z14antirad
          min: 31
        damage:
          types:
            Asphyxiation: 0.75
            Poison: 1.5
      - !type:Jitter
        conditions:
        - !type:ReagentCondition
          reagent: Z14antirad
          min: 31

