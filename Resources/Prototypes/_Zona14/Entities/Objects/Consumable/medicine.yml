- type: entity
  id: Z14antiradpill
  categories: [ Zona14 ]
  parent: BaseItem
  name: Anti-radiation drugs
  suffix: Z14
  description: can cure you... or kill you, depending on luck.
  components:
  - type: Tag
    tags:
      - Pill
  - type: Item
    size: Tiny
    sprite: _Stalker/Objects/medicine.rsi # Stalker-TODO: Need an inhand sprite for this item
  - type: RepositoryItem
    categoryName: Medicine
  - type: Sprite
    sprite: _Stalker/Objects/medicine.rsi
    scale: 0.6, 0.6
    state: antirad
  - type: Edible
    forceFeedDelay: 1
    transferAmount: null
    edible: Pill
  - type: BadFood
  - type: FlavorProfile
    ignoreReagents: []
  - type: SolutionSpiker
    sourceSolution: food
  - type: DeleteOnTrigger
  - type: Extractable
    grindableSolutionName: food
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:SpillBehavior
        solution: food
        #transferForensics: true  # Stalker-TODO: This field does not exist!
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Z14antirad
          Quantity: 10

