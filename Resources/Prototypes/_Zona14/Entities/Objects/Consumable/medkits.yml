  categories: [ Zona14 ]
  suffix: Z14
  name: tourniquet
  description: Strongly compresses the limb, cutting off blood flow. If applied improperly, can tear skin and leave bruises.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Specific/Medical/Other
      state: esmarch
      scale: 0.6, 0.6
    - type: Healing
      damageContainers:
      - Biological
      damage:
        groups:
          Brute: 1 # Tourniquets HURT!
        types:
          Asphyxiation: 2 # Essentially Stopping all blood reaching a part of your body
      bloodlossModifier: -20 # Tourniquets stop bleeding
      delay: 2
      healingBeginSound:
        path: "/Audio/Items/Medical/brutepack_begin.ogg"
      healingEndSound:
        path: "/Audio/Items/Medical/brutepack_end.ogg"

