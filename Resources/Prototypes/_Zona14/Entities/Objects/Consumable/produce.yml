# Barberry

- type: entity
  name: Barberry
  parent: FoodProduceBase
  id: Z14StalkerFoodBarbaris
  categories: [ Zona14 ]
  description: This is a cherished fruit that can be found in abandoned gardens and abandoned areas of the Zone. Its bright red berries contrast with the dull palette of dead forests and crumbling buildings, attracting the attention of stalkers sophisticated in cooking and alchemy. Despite its beauty, barberry is an ambiguous symbol its sweet taste is deceptive, and only experienced stalkers are aware of its possible properties.
  suffix: Z14
  components:
  - type: FlavorProfile
    flavors:
      - berry
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 11
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Vitamin
          Quantity: 4
  - type: Sprite
    sprite: _Stalker/Objects/Counsumable/Food/Plants.rsi
    state: StalkerFoodBarbaris
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Z14StalkerOilBarbaris
        Quantity: 10
  - type: Tag
    tags:
    - Fruit
  - type: Craftable

- type: ore
  id: Z14StalkerOreBerries1
  oreEntity: Z14StalkerFoodBarbaris

- type: entity
  name: shrub with berries
  parent: BaseStructure
  id: Z14StalkerBarriesStructureBarbaris
  categories: [ Zona14 ]
  suffix: Z14
  description: To be honest, I've seen more pleasant shrubs. It's usually a prickly, gnarled mess, covered in gnarled branches, as if the tree has arthritis. The leaves are small, withered, with red veins — a sign of radiation damage. But the most important thing is the berries. At first glance, these berries are quite appetizing. Large and juicy. But don't rush to eat them, rookie! These aren't raspberries from Grandma's garden.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Counsumable/Food/Plants.rsi
      state: plant-01
      scale: 1.1, 1.1
    - type: Transform
      anchored: true
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.2
    - type: InteractionOutline
    - type: OreVein
      oreChance: 1.0
      currentOre: Z14StalkerOreBerries1
    - type: Gatherable
      toolWhitelist:
        components:
          - Hands
    - type: Damageable
      damageContainer: Inorganic
      damageModifierSet: Wood
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 150
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]

