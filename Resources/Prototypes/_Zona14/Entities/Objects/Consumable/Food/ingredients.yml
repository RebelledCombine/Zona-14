- type: entity
  name: beans
  description: A shelf stable world-wide staple.
  parent: FoodBase
  id: Z14FoodSTBeans
  categories: [ Zona14 ]
  suffix: Z14
  components:
    - type: STWeight
      self: 0.4
    - type: Item
      size: Small
      shape:
        - 0,0,0,1
    - type: Sprite
      sprite: _Stalker_EN/Objects/Consumable/Food/ingredients.rsi
      state: beans
    - type: SolutionContainerManager
      solutions:
        food:
          reagents:
          - ReagentId: Nutriment
            Quantity: 15
    - type: Craftable

