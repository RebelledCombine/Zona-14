# BEAR
- type: entity
  name: bear meat
  parent: FoodMeatRawBase
  id: Z14FoodMeatSTBear
  categories: [ Zona14 ]
  description: Greasy greasy raw bear meat.
  suffix: Z14
  components:
  - type: STWeight
    self: 1.0
  - type: Sprite
    sprite: Objects/Consumable/Food/meat.rsi
    state: bear
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 10
        - ReagentId: Fat
          Quantity: 10
        - ReagentId: Z14MToxin
          Quantity: 10
  - type: InternalTemperature
    conductivity: 0.43
  - type: Construction
    graph: Z14MeatSteakSTBear
    node: start
    defaultTarget: steak stbear
  - type: Tag
    tags:
    - Meat
  - type: Craftable

- type: entity
  name: roasted bear meat
  parent: FoodMeatBase
  id: Z14FoodMeatSTBearCooked
  categories: [ Zona14 ]
  description: It's a little tough but what can you do.
  suffix: Z14
  components:
  - type: STWeight
    self: 0.8
  - type: Craftable
  - type: Tag
    tags:
    - Cooked
    - Meat
    - Steak
  - type: Sprite
    sprite: Objects/Consumable/Food/meat.rsi
    state: product-cooked
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 7
        - ReagentId: Protein
          Quantity: 13
        - ReagentId: Fat
          Quantity: 5
        - ReagentId: Z14MToxin
          Quantity: 5
  - type: Construction
    graph: Z14MeatSteakSTBear
    node: steak stbear

- type: constructionGraph
  id: Z14MeatSteakSTBear
  start: start
  graph:
  - node: start
    edges:
    - to: steak stbear
      completed:
      - !type:PlaySound
        sound: /Audio/Effects/sizzle.ogg
      steps:
      - minTemperature: 335
  - node: steak stbear
    entity: Z14FoodMeatSTBearCooked

- type: lightCraftingRecipe
  id: Z14MeatSTBearCraft
  results:
  - Z14FoodMeatSTBearCooked
  steps:
    firstIngredient: Z14FoodMeatSTBear
    secondIngredient: STBonfire
    keepSecond: true
    exactSecond: false
    time: 20

- type: lightCraftingRecipe
  id: Z14MeatSTBearCraftGas
  results:
  - Z14FoodMeatSTBearCooked
  steps:
    firstIngredient: Z14FoodMeatSTBear
    secondIngredient: GasStoveS1
    keepSecond: true
    exactSecond: false
    time: 20

