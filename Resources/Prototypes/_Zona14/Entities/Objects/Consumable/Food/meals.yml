# jarred and preserved goods
- type: entity
  name: canned food
  parent: FoodBase
  id: Z14STFoodJarBase
  categories: [ Zona14 ]
  description: A can of preserved food.
  abstract: true
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Drinks/jar.rsi
    state: icon
    scale: 0.7,0.7
  - type: Edible
    trash:
    - Z14STDrinkJar
  - type: STWeight
    self: 2
  - type: Item
    size: Small
    shape:
    - 0,0,0,1
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 5
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -8
      - !type:SpillBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 1
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Craftable

- type: entity
  name: canned cherries
  parent: Z14STFoodJarBase
  id: Z14STFoodJarCherriesFresh
  categories: [ Zona14 ]
  suffix: Z14
  description: Freshly pitted cherries packed in jars for pickling. They need to sit at room temperature for a while before pickling.
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Food/jarred.rsi
    state: cherries
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Vinegar
          Quantity: 10
        - ReagentId: JuiceCherry
          Quantity: 15
        - ReagentId: Sugar
          Quantity: 5
  - type: TimedDespawn
    lifetime: 900 # 15 min
  - type: SpawnOnDespawn
    prototype: Z14STFoodJarCherriesPickled

