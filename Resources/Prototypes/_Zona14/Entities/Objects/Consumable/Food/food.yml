############### Meat

- type: reagent
  id: Z14MToxin
  name: reagent-name-mtoxin
  parent: Toxin
  desc: reagent-desc-mtoxin
  physicalDesc: reagent-physical-desc-sweet
  flavor: salty
  color: "#660099"
  metabolisms:
    Poison:
      metabolismRate: 0.2
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.3

- type: entity
  name: rotten meat
  parent: FoodMeatBase
  id: Z14FoodMeatRotten
  categories: [ Zona14 ]
  suffix: Z14
  description: Halfway to becoming fertilizer for your garden.
  components:
  - type: Tag
    tags:
    - Raw
    - Meat
    - Trash
    - Recyclable
  - type: Sprite
    state: rotten
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
        - ReagentId: GastroToxin
          Quantity: 4
        - ReagentId: Fat
          Quantity: 4
  - type: Trash
    time: 300

- type: reagent
  id: Z14MRadin
  name: reagent-name-mradin
  group: Medicine
  desc: reagent-desc-mradin
  physicalDesc: reagent-physical-desc-cloudy
  flavor: medicine
  color: "#bd5902"
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        damage:
          types:
            Radiation: -1

- type: entity
  name: raw salo (fat)
  parent: FoodMeatBase
  id: Z14STFoodMeatSalo
  categories: [ Zona14 ]
  description: A piece of raw boar fat.
  suffix: Z14
  components:
  - type: STWeight
    self: 1.0
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Food/meat.rsi # EN
    state: salo # EN
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 9
        - ReagentId: Fat
          Quantity: 9
        - ReagentId: Z14MToxin
          Quantity: 10
  - type: InternalTemperature
    conductivity: 0.43
  - type: SliceableFood # EN
    slice: Z14FoodSaloSlice
    count: 3
  - type: Construction
    graph: Z14MeatSaloCook
    node: start
    defaultTarget: salo
  - type: Tag
    tags:
    - Meat
  - type: Craftable

- type: entity
  name: cooked salo
  parent: FoodMeatBase
  id: Z14STFoodMeatSaloCooked
  categories: [ Zona14 ]
  description: Cooked boar fat.
  suffix: Z14
  components:
  - type: STWeight
    self: 0.8
  - type: Craftable
  - type: Tag
    tags:
    - Cooked
    - Meat
    - Steak
  - type: Sprite
    layers:
    - state: goliath-cooked
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Protein
          Quantity: 5
        - ReagentId: Z14MRadin
          Quantity: 10
  - type: Construction
    graph: Z14MeatSaloCook
    node: salo

- type: constructionGraph
  id: Z14MeatSaloCook
  start: start
  graph:

  - node: start
    edges:
    - to: salo
      completed:
      - !type:PlaySound
        sound: /Audio/Effects/sizzle.ogg
      steps:
      - minTemperature: 335

  - node: salo
    entity: Z14STFoodMeatSaloCooked

