- type: entity
  id: Z14STEnergyDrink
  categories: [ Zona14 ]
  parent: DrinkCanBaseFull
  name: energy drink
  suffix: Z14
  description: Often used by stalkers on multi-day hikes when there is no opportunity to stop and rest. The drink contains easily digestible carbohydrates, as well as drugs that cause the release of adrenaline into the blood.
  components:
  - type: STWeight
    self: 0.8
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 15
        reagents:
        - ReagentId: STTaurine
          Quantity: 15
  - type: Sprite
    sprite: Objects/Consumable/Drinks/energy_drink.rsi
  - type: Item
    sprite: Objects/Consumable/Drinks/energy_drink.rsi

