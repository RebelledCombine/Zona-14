# Z14 PDA overrides — balance changes moved from _Stalker/pda.yml
# Each entity parents from the original and adds only the Roland-branch delta.

# BaseStalkerPDA: pen slot priority fix + toggleOnInteract:false + PointLight upgrade
- type: entity
  abstract: true
  parent: BaseStalkerPDA
  id: Z14BaseStalkerPDA
  suffix: Z14
  categories: [ HideSpawnMenu, Zona14 ]
  components:
  - type: Pda
    paiSlot:
      priority: -2
      whitelist:
        components:
          - PAI
    penSlot:
      priority: 4
      whitelist:
        tags:
          - Write
    idSlot:
      name: ID Card
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Machines/id_insert.ogg
      whitelist:
        components:
          - IdCard
  - type: Boombox
  - type: ItemSlots
    slots:
      cassette_slot:
        name: Cassete
        priority: 3
        whitelist:
          tags:
            - Cassete
  - type: HandheldLight
    addPrefix: false
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
    toggleOnInteract: false
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 5
    energy: 2.5
    netsync: false

# StalkerPDA: add Boombox, HandheldGPS, GPS tag, cassette_slot, PointLight, PowerCellHyper
- type: entity
  parent: StalkerPDA
  id: Z14StalkerPDA
  suffix: Z14
  categories: [ Zona14 ]
  components:
  - type: Boombox
  - type: HandheldGPS
  - type: Tag
    tags:
    - GPS
    - Flashlight
  - type: HandheldLight
    addPrefix: false
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
    toggleOnInteract: false
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 5
    energy: 2.5
    netsync: false
  - type: ItemSlots
    slots:
      cassette_slot:
        name: Cassete
        priority: 3
        whitelist:
          tags:
            - Cassete
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
      dogtag_slot:
        name: Dogtag
        startingItem: ClothingNeckDogtagStalker
        whitelist:
          tags:
            - Dogtag

