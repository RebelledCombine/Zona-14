- type: entity
  id: Z14ZoneAnomalyInversion
  categories: [ Zona14 ]
  parent: Z14ZoneAnomalyBaseGravity
  suffix: Z14
  components:
    - type: ZoneAnomalyUpdateTriggerCollide
      blacklist:
        components:
          - MobState
          - ZoneAnomalyEffectInversionIgnore
    - type: ZoneAnomalyEffectInversion
      whitelist:
        components:
          - MobState
    - type: ZoneAnomaly
      collisionBlacklist:
        components:
          - MobState
          - ZoneAnomalyEffectInversionIgnore
      activationDelay: 0
      preparingDelay: 0
      chargingTime: 0
      detected: false
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 2
          density: 50
          hard: false
          mask:
            - MobMask
            - FlyingMobMask
          layer:
            - MobLayer
            - LowImpassable
    - type: ZoneArtifactSpawner
      artifacts:
        - id: null
          ratio: 400
        - id: Z14ZoneArtifactFocus
          tier: 5
          ratio: 5
        - id: Z14ZoneArtifactStuntman
          tier: 5
          ratio: 3
        - id: Z14ZoneArtifactDistorter
          tier: 5
          ratio: 1

