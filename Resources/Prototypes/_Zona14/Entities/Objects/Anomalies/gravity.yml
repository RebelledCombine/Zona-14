- type: entity
  parent: Z14ZoneAnomalyBase
  id: Z14ZoneAnomalyBaseGravity
  categories: [ Zona14 ]
  abstract: true
  components:
  - type: STAnomalyTips
    icon:
      sprite: /Textures/_Stalker/Interface/Overlays/anomaly_tips.rsi
      state: gravity

- type: entity
  id: Z14ZoneAnomalyGravi
  categories: [ Zona14 ]
  parent: Z14ZoneAnomalyBaseGravity
  suffix: Z14
  components:
    - type: ZoneAnomalyTriggerStartCollide
    - type: ZoneAnomalyEffectDamage
      damageUpdate: true
      damage:
        types:
          Compression: 0.5
    - type: ZoneAnomalyEffectGravityWell
      distance: 0.5 # Zona14 change
      period: 0.005
      radial: 40
      tangential: 0.1
      gradient: Linear
    - type: Stealth
    - type: ZoneAnomalyEffectStealth
      idle: 0.4 # Zona14 change
      activated: 1
    - type: ZoneAnomaly
      detectedLevel: 1
      activationDelay: 10
      preparingDelay: 0
      chargingTime: 5
    - type: Sprite
      sprite: _Stalker/Objects/Anomalies/gravi.rsi
      layers:
        - state: idle
          map: ["base"]
    - type: GenericVisualizer
      visuals:
        enum.ZoneAnomalyVisuals.Layer:
          base:
            Activated: { state: active }
            Charging: { state: charging }
            Idle: { state: idle }
    - type: AmbientSound
      enabled: true
      volume: -5
      range: 3
      sound:
        path: /Audio/_Stalker/Effects/anomaly_gravy_idle.ogg
# Zona14 change
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.45
          density: 50
          hard: false
          mask:
            - MobMask
          layer:
            - MobLayer
            - LowImpassable
# End Zona14
    - type: ZoneArtifactSpawner
      artifacts:
      - id: null
        ratio: 500
      - id: Z14ZoneArtifactVyvert
        tier: 1
        ratio: 15
      - id: Z14ZoneArtifactAmoeba
        tier: 2
        ratio: 15

