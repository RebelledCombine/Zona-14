# true Cloak of Sin
- type: entity
  parent: Z14STClothingCloakBase
  id: Z14ClothingOuterCoatGrehLight
  categories: [ Zona14 ]
  name: Flagellant Cloak
  description: Lightweight cloak of the faithful. Cloak of the Zone Mother's defender
  suffix: Z14
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/coat_greh.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/coat_greh.rsi
    equipDelay: 8
    slots:
    - outerClothing
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetGrehCoat
    requiredSlot:
    - outerClothing
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []
  - type: Tag
    tags:
    - GrehCanTakeOnly
  - type: ClothingSpeedModifier
    walkModifier: 1.2
    sprintModifier: 1.2
