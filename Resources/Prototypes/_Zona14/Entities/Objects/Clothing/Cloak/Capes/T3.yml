# Reinforced cloak
- type: entity
  parent: Z14STClothingCloakBase
  id: Z14STClothingCapeCoatReinforced
  categories: [ Zona14 ]
  name: reinforced cloak
  description: Cloak with sewn-in chainmail and reinforced with aramid fabric, providing roughly class 3 protection. Heavy and won't fit body armor underneath.
  suffix: Z14
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/coat_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/coat_stalker.rsi
- type: entity
  parent: Z14STClothingCloakBase
  id: Z14ClothingOuterCoatLoyalistLight
  categories: [ Zona14 ]
  name: Hunting Cloak
  description: a cloak made specifically for hunting in extreme conditions such as the CEZ, painted in green camo.
  suffix: Z14
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/hunterskiy.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/hunterskiy.rsi
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetLoyalistCoatlight
    requiredSlot:
    - cloak
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []
- type: entity
  parent: STClothingHeadHatBase
  id: Z14ClothingHeadHelmetLoyalistCoatlight
  categories: [ Zona14 ]
  name: Hunting Hood
  description: protects the head... from rain... probably?
  suffix: Z14
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/coat_hat_hunter.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/coat_hat_hunter.rsi
  - type: HideLayerClothing
    slots:
    - Hair

