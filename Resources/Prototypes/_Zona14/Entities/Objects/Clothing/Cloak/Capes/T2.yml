# Leather cloak
- type: entity
  parent: Z14STClothingCloakBase
  id: Z14ClothingOuterCoatStalker
  categories: [ Zona14 ]
  suffix: Z14
  name: leather raincoat
  description: A standard black leather cloak. No significant protection — just keeps you warm at night and softens a blind dog's bite. Rather uncomfortable in the Zone, yet often used by bandits — possibly just for the look.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/coat_stalker.rsi
  - type: Clothing
