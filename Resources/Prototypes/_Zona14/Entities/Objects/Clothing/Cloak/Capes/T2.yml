# Swamp
- type: entity
  parent: Z14STClothingCloakBase
  id: Z14ClothingOuterCoatBolotniy
  categories: [ Zona14 ]
  name: '"swamp" raincoat'
  suffix: Z14
  description: a thick cloak with leaf, grass, and stick camouflage applied on top.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/cloak/bolotniy.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/cloak/bolotniy.rsi
