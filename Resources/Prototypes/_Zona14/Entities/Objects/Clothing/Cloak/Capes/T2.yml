    clothingPrototype: Z14ClothingHeadHelmetBolotniyCoat
- type: entity
  parent: STClothingHeadHatBase
  id: Z14ClothingHeadHelmetBolotniyCoat
  suffix: Z14
  name: hood of the "swamp man" cloak
  categories: [ HideSpawnMenu, Zona14 ]
  description: Covers your head
  components:
  - type: STWeight
    self: 4
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/bolotniy_hat.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/bolotniy_hat.rsi
  - type: HideLayerClothing
    slots:
    - Hair

