- type: entity
  parent: STClothingOuterBaseLargeToggleable
  id: Z14ClothingOuterArmorUzk5
  categories: [ Zona14 ]
  name: UZK-5 suit
  suffix: Z14
  description: Heavy suit designed for mercenary operations in especially dangerous and toxic conditions of the CEZ. Light armor plates and thin rubberized lining protect from burns and radiation.
  components:
  - type: STWeight
    self: 5
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/uzk5.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/uzk5.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHardsuitUzk5Helm
    slot: head
  - type: Armor
    modifiers:
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
        Heat: 1
        Cold: 1
        Shock: 1
        Radiation: 1
        Caustic: 1
        Compression: 1
        Psy: 1
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.90
        Heat: 0.90
        Cold: 0.90
        Shock: 0.90
        Radiation: 0.90
        Caustic: 0.90
        Compression: 0.90
        Psy: 0.90
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1

- type: entity  # T3
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: Z14ClothingHeadHardsuitUzk5Helm
  suffix: Z14
  name: '"UZK-5" helmet'
  description: Built-in UZK-5 helmet with flashlight.
  categories: [ HideSpawnMenu, Zona14 ]
  components:
    - type: STWeight
      self: 1
    - type: PointLight
      enabled: false
      radius: 6
      energy: 2
    - type: BreathMask
    - type: IngestionBlocker
    - type: IdentityBlocker
    - type: Tag
      tags:
        - BlockMask
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/hats/uzk5_helmet.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/hats/uzk5_helmet.rsi
      equipSound: null
      unequipSound: null
    - type: HideLayerClothing
      slots:
      - Hair
      - Snout

