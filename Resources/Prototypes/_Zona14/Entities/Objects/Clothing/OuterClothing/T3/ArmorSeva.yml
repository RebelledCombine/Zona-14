# Base
- type: entity
  parent: Z14ArmorBaseT1PvP
  id: Z14STClothingOuterArmorSevaBase
  name: Seva Suit
  description: "A closed-cycle suit developed by the Kyiv Research Institute, designed specifically for work in the Zone."
  categories: [ HideSpawnMenu, Zona14 ]
  abstract: true
  components:
  # Closed-cycle: supplies its own air, so no gas-mask filter is needed against airborne hazards.
  - type: Z14SealedSuit
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/seva_stalker.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/seva_stalker.rsi
  - type: ToggleableClothing
    clothingPrototype: STClothingHeadHardsuitSevaHelmBase
    slot: head

  - type: Craftable

- type: entity
  parent: ClothingHeadHardsuitBase
  id: Z14STClothingHeadHardsuitSevaHelmBase
  suffix: Z14
  name: Seva Helmet
  description: Despite being mostly glass, quite durable.
  categories: [ HideSpawnMenu, Zona14 ]
  components:
  - type: STWeight
    self: 1
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/seva_helm.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/seva_helm.rsi
  - type: BreathMask
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
      - BlockMask
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.9
        Radiation: 0.25
