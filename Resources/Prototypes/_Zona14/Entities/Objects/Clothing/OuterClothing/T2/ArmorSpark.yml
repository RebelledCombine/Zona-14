- type: entity
  parent: Z14ArmorBaseT1PvP
  id: Z14ClothingOuterArmorSpark
  categories: [ Zona14 ]
  name: Spark Costume
  suffix: Z14
  description: A makeshift suit produced by NII craftsmen from improvised materials. Passively removes radiation at 0.1 per second
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/spark.rsi
      state: icon-suit
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/spark.rsi
    - type: ToggleableClothing
      clothingPrototype: Z14ClothingHeadHelmetSpark
    - type: ClothingSpeedModifier
      walkModifier: 1
      sprintModifier: 1

    - type: PersonalDamage
      interval: 1
      damage:
        types:
          Radiation: -0.1

- type: entity
  parent: STClothingHeadHatBase
  id: Z14ClothingHeadHelmetSpark
  suffix: Z14
  name: Spark Hood
  description: A thick piece of rubber on your head.
  categories: [ HideSpawnMenu, Zona14 ]
  components:
    - type: STWeight
      self: 1
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/spark.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/spark.rsi
- type: entity
  parent: Z14ClothingOuterArmorSpark
  id: Z14ClothingOuterArmorMilitarySpark
  categories: [ Zona14 ]
  name: "'ITF' 'Military' Outfit"
  suffix: Z14
  description: ISSG suit, nothing more is known. Passively removes radiation at 0.25 per second
  components:
    - type: STWeight
      self: 5
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/military-spark.rsi
      state: icon-suit
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/military-spark.rsi
    - type: ToggleableClothing
      clothingPrototype: Z14ClothingHeadHelmetMilitarySpark
    - type: PersonalDamage
      interval: 1
      damage:
        types:
          Radiation: -0.25
    - type: ContainerContainer
      containers:
        toggleable-clothing: !type:ContainerSlot {}
        storagebase: !type:Container
          ents: []
    - type: Storage
      maxItemSize: Normal
      grid:
        - 0,3,0,5
        - 2,3,2,4
        - 2,0,3,1
        - 4,3,4,4
        - 5,0,6,1
        - 6,3,6,4
        - 8,3,8,5
      blacklist:
        tags:
        - STArtifact
- type: entity
  parent: Z14ClothingHeadHelmetSpark
  id: Z14ClothingHeadHelmetMilitarySpark
  categories: [ Zona14 ]
  suffix: Z14
  name: "'ITF' 'Military' hood"
  description: A thick piece of rubber on your head.
  components:
    - type: STWeight
      self: 1
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/military-spark.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/military-spark.rsi
