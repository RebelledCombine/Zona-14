- type: entity
  parent: STClothingOuterBaseLarge
  id: Z14STClothingOuterArmorRCBZ
  categories: [ Zona14 ]
  name: Seeker CBRN Suit
  suffix: Z14
  description: Designed for CBRN protection. Used in expeditions to hazardous chemical zones. Not intended for combat, specialized for radiation, chemical, and biological threat protection.
  components:
  - type: STWeight
    self: 5
  - type: Craftable
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/rhbz_iskatel.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/rhbz_iskatel.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHelmRCBZ
    slot: head
  - type: Armor
    modifiers:
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
        Heat: 1
        Cold: 1
        Shock: 1
        Radiation: 1
        Caustic: 1
        Compression: 1
        Psy: 1
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.90
        Heat: 0.90
        Cold: 0.90
        Shock: 0.90
        Radiation: 0.90
        Caustic: 0.90
        Compression: 0.90
        Psy: 0.90
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: Z14ClothingHelmRCBZ
  suffix: Z14
  name: CBRN Mask
  categories: [ HideSpawnMenu, Zona14 ]
  description: Effective personal protective equipment against various chemical, biological, and radioactive threats. Provides reliable air filtration, trapping harmful substances and particles to protect airways and skin.
  components:
  - type: STWeight
    self: 5
  - type: Tag
    tags:
    - BlockMask
  - type: BreathMask
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Craftable
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/mask/gasmask_rhbz.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/mask/gasmask_rhbz.rsi
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.9
        Cold: 0.9
        Shock: 0.9
        Radiation: 0.9
        Caustic: 0.9
        Compression: 0.9
        Psy: 0.9
      flatReductions:
        Heat: 1
        Cold: 1
        Shock: 1
        Radiation: 1
        Caustic: 1
        Compression: 1
        Psy: 1
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
  - type: PointLight
    color: orange
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
