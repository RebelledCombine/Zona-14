# Base
- type: entity
  parent: Z14ArmorBaseT1PvP
  id: Z14STClothingOuterArmorSSP24Base
  categories: [ Zona14 ]
  name: SSP-24
  abstract: true
  components:
  - type: Craftable
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/ssp24.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/ssp24.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetSSP24
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,0,5,3
      - 7,0,12,3
    blacklist:
      tags:
      - STArtifact
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95

- type: entity
  parent: ClothingHeadHardsuitBase
  id: Z14STClothingHeadHelmetSSP24Base
  name: Green Ecologist's helmet
  description: Protects from anomalies and radiation, but definitely not from bullets.
  categories: [ HideSpawnMenu, Zona14 ]
  abstract: true
  components:
  - type: STWeight
    self: 1
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/ssp24_helm.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/ssp24_helm.rsi
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: HideLayerClothing
    slots:
    - Hair
# Ruby

- type: entity
  parent: Z14STClothingOuterArmorSSP24Base
  id: Z14ClothingOuterArmorSSP24Ruby
  categories: [ Zona14 ]
  suffix: Z14
  name: 'Red SSP-24 "Ruby"'
  description: High-quality modified SSP-24 suit with improved bullet and shrapnel protection, supplied to Ecologist advance teams when mutant encounters are likely.
  components:
  - type: STWeight
    self: 5
  - type: Armor
    modifiers:
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
        Heat: 1
        Cold: 1
        Shock: 1
        Radiation: 1
        Caustic: 1
        Compression: 1
        Psy: 1
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.90
        Heat: 0.90
        Cold: 0.90
        Shock: 0.90
        Radiation: 0.90
        Caustic: 0.90
        Compression: 0.90
        Psy: 0.90
  - type: GrantsArtifactSlots
    slots: 4 # Stalker-Changes | Number of artifact slots this armor grants
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/ruby.rsi
    state: icon-suit
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/Jewelry/ruby.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetSSP24Ruby

- type: entity
  parent: Z14STClothingHeadHelmetSSP24Base
  id: Z14ClothingHeadHelmetSSP24Ruby
