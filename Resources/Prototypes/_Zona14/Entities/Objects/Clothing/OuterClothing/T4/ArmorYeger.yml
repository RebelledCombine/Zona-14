- type: entity
  parent: [ Z14ArmorBaseT4PvP, STClothingOuterBaseLargeToggleable ]
  id: Z14ClothingOuterArmorYeger
  categories: [ Zona14 ]
  name: Jaeger
  description: A suit developed by anomalists for combat in anomalous zones. Anomaly-treated for excellent bullet resistance.
  suffix: Z14
  components:
  - type: STWeight
    self: 5
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/outerClothing/yeger.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/outerClothing/yeger.rsi
  - type: ToggleableClothing
    clothingPrototype: Z14ClothingHeadHelmetYeger
    slot: head
- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: Z14ClothingHeadHelmetYeger
  name: Jaeger Helmet
  description: Protects from anomalies and radiation, but definitely not from bullets.
  suffix: Z14
  categories: [ HideSpawnMenu, Zona14 ]
  components:
  - type: STWeight
    self: 1
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/yeger_helm.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/yeger_helm.rsi
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: PointLight
    color: "#f9ffaf"
  - type: HideLayerClothing
    slots:
    - Hair
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.9
        Radiation: 0.25

