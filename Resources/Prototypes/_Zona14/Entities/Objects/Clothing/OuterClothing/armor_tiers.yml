# Abstract base armor prototypes. THREE INDEPENDENT AXES:
#
#   1. ROLE  — PvP (fights people and mutants) vs PvE (survives the Zone).
#   2. TIER  — 1-5, how advanced the suit is. Drives every number below.
#   3. PLATE — `armorClass`, how well the inserts stop BULLETS. Set PER ITEM,
#              independent of tier: a T5 SEVA is plate 0-1, a T5 combat suit is plate 5.
#              The bases default plate = tier; override `armorClass` on the item to differ.
#
# Base ladder: coefficient = 1 − Tier × 0.10 for both physical and elemental.
#   PvP: physical −0.10 (better), elemental +0.10 (worse), phys flat Tier × 2, elem flat Tier × 1.
#   PvE: physical +0.10 (worse),  elemental −0.10 (better), phys flat Tier × 1, elem flat Tier × 2.
#   Artifact slots: PvP = Tier, PvE = Tier + 1.
#
# Elemental flats matter because matching-tier armor FULLY negates its own tier's ambient
# radiation zone (MapRadiation ticks just below Tier × 1), the remainder being headroom for
# rad-emitting artifacts. PvE's doubled elemental flat IS its artifact-capacity advantage —
# which is why the slot gap is only 1, so the two do not compound.
#
# ⚠ "No plates" is `armorClass: 0`, NEVER an absent armorClass. BuildPenetrationDict only
#   adds a piece when ArmorClass.HasValue, so a null class is never penetrated and the armor
#   becomes the strongest in the game — the exact opposite of the intent.
#
# ⚠ Ceiling: T5 PvP at plate 5 already sits AT the 25% projectile damage floor versus standard
#   rifle ammo. No coefficient or flat can go below it — to make heavy armor tankier you must
#   move `playtest.min_projectile_damage_floor`. (This is why a T6 tier was evaluated and
#   dropped: it was numerically identical to T5 against every normal round.)

# ── T1 ──────────────────────────────────────────────

- type: entity
  parent: Z14STClothingOuterBase
  id: Z14ArmorBaseT1
  categories: [ Zona14 ]
  abstract: true
  name: T1 Armor Base
  components:
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      toggleable-clothing: !type:ContainerSlot {}
  - type: PullDoAfter
    pullTime: 4
  - type: STWeight
    self: 5
  # A worn suit is free, but a spare fills most of a pack (36 cells) — that's the swap cost.
  - type: Item
    size: Ginormous
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,3,0,5
      - 2,3,2,4
      - 2,0,3,1
      - 4,3,4,4
      - 5,0,6,1
      - 6,3,6,4
      - 8,3,8,5
    blacklist:
      tags:
      - STArtifact
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
        Heat: 1
        Cold: 1
        Shock: 1
        Radiation: 1
        Caustic: 1
        Compression: 1
        Psy: 1
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.90
        Heat: 0.90
        Cold: 0.90
        Shock: 0.90
        Radiation: 0.90
        Caustic: 0.90
        Compression: 0.90
        Psy: 0.90

- type: entity
  parent: Z14ArmorBaseT1
  id: Z14ArmorBaseT1PvP
  categories: [ Zona14 ]
  abstract: true
  name: T1 PvP Armor Base
  components:
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
        Heat: 1
        Cold: 1
        Shock: 1
        Radiation: 1
        Caustic: 1
        Compression: 1
        Psy: 1
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.80
        Heat: 1.00
        Cold: 1.00
        Shock: 1.00
        Radiation: 1.00
        Caustic: 1.00
        Compression: 1.00
        Psy: 1.00
  - type: GrantsArtifactSlots
