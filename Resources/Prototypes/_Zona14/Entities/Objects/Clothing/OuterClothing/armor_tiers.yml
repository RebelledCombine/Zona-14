# Abstract base armor prototypes for each tier.
# Physical: Tier × 10% coefficient, Tier × 2 flat reductions.
# Elemental: Tier × 10% coefficient, Tier × 0.5 flat reductions.
# PvP: +10% physical protection, -10% elemental protection, no flat elemental, tier+1 artifact slots.
# PvE: -10% physical protection, +10% elemental protection, no flat physical, tier+1 artifact slots.

# ── T1 ──────────────────────────────────────────────

- type: entity
  parent: Z14STClothingOuterBase
  id: Z14ArmorBaseT1
  categories: [ Zona14 ]
  abstract: true
  name: T1 Armor Base
  components:
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      toggleable-clothing: !type:ContainerSlot {}
  - type: PullDoAfter
    pullTime: 10
  - type: STWeight
    self: 5
  - type: Storage
    maxItemSize: Normal
    grid:
      - 0,3,0,5
      - 2,3,2,4
      - 2,0,3,1
      - 4,3,4,4
      - 5,0,6,1
      - 6,3,6,4
      - 8,3,8,5
    blacklist:
      tags:
      - STArtifact
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
        Heat: 0.5
        Cold: 0.5
        Shock: 0.5
        Radiation: 0.5
        Caustic: 0.5
        Compression: 0.5
        Psy: 0.5
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.90
        Heat: 0.90
        Cold: 0.90
        Shock: 0.90
        Radiation: 0.90
        Caustic: 0.90
        Compression: 0.90
        Psy: 0.90

- type: entity
  parent: Z14ArmorBaseT1
  id: Z14ArmorBaseT1PvP
  categories: [ Zona14 ]
  abstract: true
  name: T1 PvP Armor Base
  components:
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.80
        Heat: 1.00
        Cold: 1.00
        Shock: 1.00
        Radiation: 1.00
        Caustic: 1.00
        Compression: 1.00
        Psy: 1.00
  - type: GrantsArtifactSlots
    slots: 2

- type: entity
  parent: Z14ArmorBaseT1
  id: Z14ArmorBaseT1PvE
  categories: [ Zona14 ]
  abstract: true
  name: T1 PvE Armor Base
  components:
  - type: Armor
    armorClass: 1
    modifiers:
      flatReductions:
        Heat: 0.5
        Cold: 0.5
        Shock: 0.5
        Radiation: 0.5
        Caustic: 0.5
        Compression: 0.5
        Psy: 0.5
      coefficients:
        Blunt: 1.00
        Slash: 1.00
        Piercing: 1.00
        Heat: 0.80
        Cold: 0.80
        Shock: 0.80
        Radiation: 0.80
        Caustic: 0.80
        Compression: 0.80
        Psy: 0.80
  - type: GrantsArtifactSlots
