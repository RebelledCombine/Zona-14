- type: entity
  parent: [ClothingMaskBaseButcherable, BaseFoldable]
  id: Z14ClothingMaskBalaklavaBase
  categories: [ Zona14 ]
  abstract: true
  components:
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
  - type: FoldableClothing
    foldedSlots:
    - HEAD
    unfoldedSlots:
    - MASK
    foldedHideLayers: []
    unfoldedHideLayers:
    - Snout
    - Hair
    - FacialHair
  - type: IdentityBlocker
    enabled: true # _Zona14: matches post-init state set by FoldableClothing; otherwise UninitializedSaveTest flags a modify-on-spawn diff.
    coverage: MOUTH
  - type: Sprite
    layers:
    - state: icon_head
      map: ["foldedLayer"]
      visible: true
    - state: icon
      map: [ "unfoldedLayer" ]
      visible: false
  - type: HideLayerClothing
    slots:
    - Snout
    - Hair
    - FacialHair
    hideOnToggle: true

