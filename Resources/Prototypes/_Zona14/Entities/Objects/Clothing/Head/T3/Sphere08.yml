- type: entity
  abstract: true
  parent: Z14HelmetBase
  id: Z14STClothingHeadHelmetEnvironmentT3Base
  categories: [ Zona14 ]
  name: T3 Environment Protection Helmet Base
  components:
  - type: HideLayerClothing
    slots:
    - Hair

- type: entity
  parent: Z14STClothingHeadHelmetEnvironmentT3Base
  id: Z14ClothingHeadHelmetBerill5MMilitary
  categories: [ Zona14 ]
  suffix: Z14
  name: Sphere-08 helmet
  description: A helmet for fortunate soldiers and military stalkers, designed against piercing attacks. Part of the Berill-5M set.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/hats/berill5m_helm_military.rsi
    layers:
    - state: icon
    - state: light-icon
      shader: unshaded
      visible: false
      map: [ "light" ]
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/hats/berill5m_helm_military.rsi
    equippedPrefix: off
  - type: Item
    heldPrefix: off
  - type: ItemTogglePointLight
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 8
    netsync: false
  - type: Appearance
  - type: HandheldLight
    addPrefix: false
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: radiating
        interpolate: Linear
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        startValue: 0.1
        endValue: 2.0
        isLooped: true
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: on-equipped-HELMET
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: Sphere-08 helmet
        startingItem: PowerCellHyper
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot

