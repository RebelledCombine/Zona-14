- type: entity
  abstract: true
  parent: Z14HelmetBase
  id: Z14STClothingHeadHelmetTacticalT3Base
  categories: [ Zona14 ]
  name: T3 Tactical Helmet Base
  components:
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
      - BlockMask
  - type: HelmetVisor
    toggleAction: ActionToggleHelmetVisor
    equippedPrefixUp: visor-up
    iconStateUp: icon-visor-up
    visorUpReflectProb: 0.09
    visorUpModifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.85
    isToggleable: true
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
  - type: SlotBlockOverride
    tag: BlockMask

