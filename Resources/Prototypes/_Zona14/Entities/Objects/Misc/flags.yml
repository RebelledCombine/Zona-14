# i fucking hate construction graphs
#BAND
- type: construction
  id: Z14FlagBandCraft
  graph: FlagBandCraft
  startNode: start
  targetNode: flagbandend
  category: construction-category-structures
  objectType: Structure
  placementMode: SnapgridCenter
  hide: false
  canBuildInImpassable: true

- type: constructionGraph
  id: Z14FlagBandCraft
  start: start
  graph:
    - node: start
      edges:
        - to: flagbandend
          steps:
            - tag: FoldedFlagBand
              name: construction-step-st-foldedflag-band
              icon:
                sprite: _Stalker_EN/Objects/Fun/flags_folded.rsi
                state: band
              doAfter: 7
    - node: flagbandend
      entity: Banner1

