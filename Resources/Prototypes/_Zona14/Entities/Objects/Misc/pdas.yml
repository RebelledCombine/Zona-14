- type: entity
  parent: BaseStalkerPDAEN
  id: Z14STRuggedPdaEN
  categories: [ Zona14 ]
  name: Rugged PDA
  suffix: Z14
  description: A PDA modified for use in dangerous areas of the zone, it has all the utilities needed to survive in harsh environments.
  components:
  - type: Icon
    state: rugged_off
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        rugged_on
  - type: PdaBorderColor
    borderColor: "#61614F"
  - type: Pda
    penSlot:
      startingItem: Pen
      priority: 1
      whitelist:
        tags:
        - Write
  - type: ItemSlots
    slots:
      cassette_slot:
        name: Cassete
        priority: 2
        whitelist:
          tags:
            - Cassete
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
      dogtag_slot:
        name: Dogtag
        whitelist:
          tags:
            - Dogtag
  - type: HealthAnalyzer
    scanDelay: 2
    scanningEndSound:
      path: "/Audio/Items/Medical/healthscanner.ogg"
  - type: Boombox
  - type: HandheldGPS
  - type: PointLight
    enabled: false
    radius: 7
    energy: 3.5
    netsync: false

- type: entity
  parent: BaseStalkerPDA
  id: Z14OldPDA
  categories: [ Zona14 ]
  name: Old Stalker's PDA
  suffix: Z14
  description: A worn, bloodstained PDA with cracks, very dusty, dirt here and there. Does it work at all?
  components:
  - type: PdaBorderColor
    borderColor: "#717059"
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       old_pda
  - type: Sprite
    sprite: _Stalker_EN/Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: old_pda
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Pda # stalker-en-changes-start
    penSlot:
      startingItem: Pen
      priority: 1
      whitelist:
        tags:
        - Write
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmall
      dogtag_slot:
        name: Dogtag
#        startingItem: Z14ClothingNeckDogtagStalker
        whitelist:
          tags:
            - Dogtag
  - type: PointLight
    enabled: false
    radius: 5
    energy: 2.5
    netsync: false # stalker-en-changes-end
