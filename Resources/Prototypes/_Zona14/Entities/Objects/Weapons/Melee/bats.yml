- type: entity
  parent: BaseItem
  id: Z14StalkerBaseBallBat
  categories: [ Zona14 ]
  name: baseball bat
  description: A robust baseball bat.
  abstract: true
  components:
    - type: Tag
      tags:
        - BaseballBat
    - type: Sprite
      sprite: Objects/Weapons/Melee/baseball_bat.rsi
      state: icon
    - type: Clothing
      quickEquip: false
      slots:
        - suitStorage
        - back
    - type: UseDelay
      delay: 1
    - type: StaminaDamageOnHit
      damage: 50
    - type: MeleeWeapon
      wideAnimationRotation: -135
      damage:
        types:
          Blunt: 10
          Structural: 5
    - type: IncreaseDamageOnWield
      damage:
        types:
          Blunt: 5
          Structural: 10
    - type: Item
      size: Large
    - type: Tool
      qualities:
        - Rolling
      speedModifier: 0.75 # a bit unwieldly but does the job
    - type: Wieldable

- type: entity
  parent: Z14StalkerBaseBallBat
  id: Z14StalkerBallBat
  categories: [ Zona14 ]
  name: baseball bat
  description: A robust baseball bat.
  suffix: Z14
  components:
    - type: Sprite
      sprite: Objects/Weapons/Melee/baseball_bat.rsi
      state: icon
    - type: StaminaDamageOnHit
      damage: 25
    - type: MeleeWeapon
      wideAnimationRotation: -135
      damage:
        types:
          Blunt: 5
          Structural: 5
    - type: IncreaseDamageOnWield
      damage:
        types:
          Blunt: 10
          Structural: 10

- type: entity
  parent: Z14StalkerBaseBallBat
  id: Z14SpikyBallBat
  categories: [ Zona14 ]
  name: spiky ball bat
  description: Bonk!
  suffix: Z14
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Melee/spiky_bat.rsi
      state: icon
    - type: StaminaDamageOnHit
      damage: 10
    - type: MeleeWeapon
      wideAnimationRotation: -135
      damage:
        types:
          Blunt: 5
          Piercing: 5
          Structural: 5
    - type: IncreaseDamageOnWield
      damage:
        types:
          Piercing: 15
          Blunt: 10
          Structural: 15

# skins
- type: entity
  parent: Z14StalkerBallBat
  id: Z14STBatMolitoslov
  categories: [ Zona14 ]
  name: heavy tome
  description: A thick, hardcover tome, dense and heavy enough to swing as a blunt weapon.
  suffix: Z14
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Melee/molitoslov.rsi
      state: icon
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Melee/molitoslov.rsi
      quickEquip: false
      slots:
        - suitStorage
        - back
        - belt
    - type: Paper
      contentSize: 20000
    - type: ActivatableUI
      key: enum.PaperUiKey.Key
      requiresComplex: false
    - type: UserInterface
      interfaces:
        enum.PaperUiKey.Key:
          type: PaperBoundUserInterface
    - type: PaperVisuals
      backgroundImagePath: "/Textures/Interface/Paper/paper_background_book.svg.96dpi.png"
      backgroundPatchMargin: 23.0, 16.0, 14.0, 15.0
      contentMargin: 20.0, 20.0, 20.0, 20.0
