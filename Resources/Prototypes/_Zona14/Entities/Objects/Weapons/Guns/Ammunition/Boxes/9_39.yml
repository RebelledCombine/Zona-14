- type: entity
  parent:
  - BaseAmmoBoxStalker
  - STBaseEntity
  id: Z14STBaseBox9x39
  categories: [ Zona14 ]
  abstract: true
  components:
  - type: MagazineVisuals
    magState: aa-open
    steps: 2
    zeroVisible: false
  - type: BallisticAmmoProvider
    capacity: 40
    proto: Z14STCartridge9x39SP5
    whitelist:
      tags:
      - STCartridge939
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Boxes/9_39/base.rsi
    layers:
    - state: aa
      map: ["enum.GunVisualLayers.Base", "base"]
    - state: aa-open-1
      map: ["enum.GunVisualLayers.Mag", "mag"]
  - type: STIcon
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Boxes/9_39/world.rsi
    layers: ["base", "mag"]

