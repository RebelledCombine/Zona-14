- type: entity
  parent: BaseAmmoBoxStalker
  id: Z1445ACPLFMJBox
  suffix: Z14
  categories: [ Zona14 ]
  name: Ammo Box (.45 ACP) Lasermatch FMJ
  description: For select pistols and revolvers, 30 rounds per box. Penetrates only class 1 armor.
  components:
    - type: MagazineVisuals
      magState: 45ammo
    - type: BallisticAmmoProvider
      capacity: 30
      proto: Cartridge45ACPLFMJ
      whitelist:
        tags:
          - Cartridge45ACP
    - type: Sprite
      layers:
      - state: 45(1)
        map: ["enum.GunVisualLayers.Base"]
      - state: 45ammo-1
        map: ["enum.GunVisualLayers.Mag"]

