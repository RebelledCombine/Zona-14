- type: entity
  abstract: true
  parent: STBaseWeaponSniper
  id: Z14STVBaseWeaponSniperVepr
  categories: [ Zona14 ]
  components:
  - type: STWeight
    self: 3
  - type: PullDoAfter
    pullTime: 4
  - type: GunWieldBonus
    minAngle: -43
    maxAngle: -72
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/VEPR/base.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/VEPR/base.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/VEPR/base.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/svd.ogg
    minAngle: 45
    maxAngle: 100
    fireRate: 3
    angleIncrease: 1.2
    angleDecay: 7
    projectileSpeed: 75
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Stalker/Weapons/Guns/RifleGen/Cock/rifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: 754Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 4
        whitelist:
          tags:
          - Magazine754
      gun_module_scope:
        name: Scope
        priority: 3
        whitelist:
          tags:
          - STWeaponModuleSniperSight
      gun_module_muzzle:
        name: Muzzle
        priority: 2
        whitelist:
          tags:
          - STWeaponModuleSniperSilencer
      gun_chamber:
        name: Chamber
        startingItem:
        priority: 1
        whitelist:
          tags:
          - STCartridge754
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_module_muzzle: !type:ContainerSlot
      gun_module_scope: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: STWeaponAccuracy
    accuracyMultiplier: 5
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.2

- type: entity
  parent: Z14STVBaseWeaponSniperVepr
  id: Z14STWeaponSniperVepr
  suffix: Z14
  categories: [ Zona14 ]
  name: VPO-129 "Vepr" 7.62x54mm
  description: The VPO-129 Vepr-1V is a civilian hunting carbine with rifled barrel, based on the legendary Soviet Army light machine gun design. Chambered in powerful 7.62x54mmR, it's a favorite among Zone marksmen for its reliability.

- type: entity
  parent: Z14STVBaseWeaponSniperVepr
  id: Z14STWeaponSniperVeprSeraphim
  suffix: Z14
  categories: [ Zona14 ]
  name: 'Tactical VPO-129 "Emerald"'
  description: Custom tactical VPO-129 variant with distinctive markings and modifications. The green finish provides both visibility and an intimidation factor in Zone operations.
  components:
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Guns/Snipers/VEPR/seraphim.rsi
    - type: Item
      sprite: _Stalker/Objects/Weapons/Guns/Snipers/VEPR/seraphim.rsi
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Guns/Snipers/VEPR/seraphim.rsi

- type: entity
  parent: Z14STVBaseWeaponSniperVepr
  id: Z14STWeaponSniperVeprGrass
  categories: [ Zona14 ]
  name: VPO-129 "Grass" Camo
  suffix: Z14, Custom
  description: A bushman's dream - this Vepr variant features custom camouflage netting and vegetation attachments for maximum concealment in the Zone's wilderness.
  components:
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Guns/Snipers/VEPR/trava.rsi
