- type: entity
  parent: Z14STBaseWeaponRifleSVDS
  id: Z14STWeaponSniperSVUTop
  categories: [ Zona14 ]
  name: SVU "Swamp"
  suffix: Z14, Custom
  description: A shortened semi-automatic bullpup sniper rifle developed by TsKIB SOO based on the SVD. Development of a shortened SVD-based sniper rifle for Soviet airborne troops began at TsKIB SOO in 1977. The barrel is equipped with a massive suppressor designed by L. V. Bondarev. The suppressor reduces the sound of the shot by 10-12% compared to the SVD, nearly eliminates muzzle flash, and disperses the sound so that pinpointing the shooter's position becomes impossible. The furniture is made of polyamide. This particular specimen has most of its body, including the stock, wrapped in camouflage tape, with additional wrapping on the scope and muzzle device to break up the weapon's silhouette against vegetation.
  components:
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi

