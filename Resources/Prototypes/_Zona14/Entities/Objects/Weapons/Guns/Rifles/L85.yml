- type: entity
  parent: Z14STBaseWeaponRifleL85
  id: Z14STWeaponRifleL85
  suffix: Z14
  categories: [ Zona14 ]
  name: L85
  description: After being replaced by a more modern rifle in the British Army, the L85 appeared in large numbers on the black market and eventually in the Zone. Its main advantages are the standard 4x optical sight and high first-shot accuracy. Burst fire accuracy drops sharply and the core mechanisms show insufficient reliability.
  components:
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/n_l85_shot.ogg

