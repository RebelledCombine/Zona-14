- type: entity
  abstract: true
  parent: Z14STBaseWeaponRifle
  id: Z14STBaseWeaponRifleG36
  categories: [ Zona14 ]
  components:
  - type: STWeight
    self: 3.3
  - type: PullDoAfter
    pullTime: 3
  - type: GunWieldBonus
    minAngle: -50
    maxAngle: -62
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/g36.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/g36.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/g36.rsi
    equipDelay: 2
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/n_g36_shot.ogg
      params:
        volume: -2
    minAngle: 45
    maxAngle: 95
    fireRate: 7
    angleIncrease: 2.0
    angleDecay: 8
    projectileSpeed: 60
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto

  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_module_muzzle: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}

  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base556Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 4
        whitelist:
          tags:
          - Magazine556

      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModuleRifleSilencerNato

      gun_chamber:
        name: Chamber
        startingItem:
        priority: 1
        whitelist:
          tags:
          - STCartridge556

  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true

  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8

  - type: STWeaponAccuracy
    accuracyMultiplier: 1.45

  - type: Scope
    zoom: 1.1
    offset: 21


- type: entity
  parent: Z14STBaseWeaponRifleG36
  id: Z14STWeaponRifleG36
  suffix: Z14
  categories: [ Zona14 ]
  name: 'HK G-36 "Outlander"'
  description: The embodiment of new trends in Western-made automatic weapons, the principle of operation of the automatic system is based not on a semi-free bolt, but on a short stroke of the gas piston. It must be said that the changes have clearly been beneficial, this assault rifle is a first-class example of a modern weapon - light, reliable and ergonomic.


