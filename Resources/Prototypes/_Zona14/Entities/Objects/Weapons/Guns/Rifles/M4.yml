- type: entity
  abstract: true
  parent: Z14STBaseWeaponRifle
  id: Z14STBaseWeaponRifleM4
  categories: [ Zona14 ]
  components:
  - type: STWeight
    self: 3.5
  - type: PullDoAfter
    pullTime: 3.5
  - type: GunWieldBonus
    minAngle: -50
    maxAngle: -60
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/inhands/M4.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/m_4.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/inhands/M4.rsi
    equipDelay: 2
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/m4.ogg
      params:
        volume: -2
    minAngle: 50
    maxAngle: 95
    fireRate: 8
    angleIncrease: 2.0
    angleDecay: 8
    projectileSpeed: 60
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_auto_sear: !type:ContainerSlot {}
      gun_module_muzzle: !type:ContainerSlot {}
      gun_module_scope: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base556Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 5
        whitelist:
          tags:
          - Magazine556
      gun_auto_sear:
        name: Insides
        priority: 4
        whitelist:
          tags:
          - STModuleAutoSear
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModuleRifleSilencerNato
      gun_module_scope:
        name: Scope
        priority: 2
        whitelist:
          tags:
          - STWeaponModuleRifleScopeNato
      gun_chamber:
        name: Chamber
        startingItem:
        priority: 1
        whitelist:
          tags:
          - STCartridge556
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.46

- type: entity
  parent: Z14STBaseWeaponRifleM4
  id: Z14STWeaponRifleM4
  suffix: Z14
  categories: [ Zona14 ]
  name: Colt M4 "Cobra"
  description: American assault rifle that became an icon of modern warfare. Appears in the Zone with western mercenaries and military expeditions. Lightweight, accurate and reliable in any conditions.

