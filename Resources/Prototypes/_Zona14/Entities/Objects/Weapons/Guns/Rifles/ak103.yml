# MARK: AK-103 Base & Variants
- type: entity
  abstract: true
  parent: Z14STBaseWeaponRifle
  id: Z14STBaseWeaponRifleAK103
  categories: [ Zona14 ]
  components:
  - type: STWeight
    self: 4
  - type: PullDoAfter
    pullTime: 3.5
  - type: GunWieldBonus
    minAngle: -50
    maxAngle: -60
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/ak103.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/ak103.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/ak103.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/103_shoot.ogg
    minAngle: 55
    maxAngle: 110
    fireRate: 6
    angleIncrease: 2.0
    angleDecay: 8
    projectileSpeed: 65
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base739Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 4
        whitelist:
          tags:
          - Magazine739
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModuleRifleSilencerRu
      gun_module_scope:
        name: Scope
        priority: 2
        whitelist:
          tags:
          - STWeaponModuleRifleScopeRu
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
          - STCartridge739
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.56

- type: entity
  parent: Z14STBaseWeaponRifleAK103
  id: Z14STWeaponRifleAK103
  suffix: Z14
  categories: [ Zona14 ]
  name: AK-103
  description: Modern Kalashnikov variant chambered in 7.62x39mm. Prized in the Zone for reliability and firepower. Main weapon of many factions.

