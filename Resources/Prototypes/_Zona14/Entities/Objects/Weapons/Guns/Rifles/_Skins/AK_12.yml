# Seraphim custom
- type: entity
  name: AK-12
  suffix: Z14, t4, Custom
  parent: Z14STBaseWeaponRifle
  id: Z14STWeaponRifleStalkerAK12
  categories: [ Zona14 ]
  description: This model represents the pinnacle of AK system development, distinguished from previous generations by refined ergonomics, adaptation for all-day use, and improved accuracy and grouping.
  components:
  - type: STWeight
    self: 3.5
  - type: PullDoAfter
    pullTime: 3.5
  - type: GunWieldBonus
    minAngle: -50
    maxAngle: -62
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/_Skins/ak12.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/_Skins/ak12.rsi
    scale: 0.7, 0.7
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/_Skins/ak12.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/ak.ogg
    minAngle: 48
    maxAngle: 90
    fireRate: 7
    angleIncrease: 2.0
    angleDecay: 8
    projectileSpeed: 60
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    - Burst
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base545Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 4
        whitelist:
          tags:
            - Magazine545
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
            - STWeaponModuleRifleSilencerRu
      gun_module_scope:
        name: Scope
        priority: 2
        whitelist:
          tags:
            - STWeaponModuleRifleScopeRu
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
            - STCartridge545
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.45
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.7

