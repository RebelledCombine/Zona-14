# MARK: AKS-74 Base & Variants
- type: entity
  abstract: true
  parent: Z14STBaseWeaponRifle
  id: Z14STBaseWeaponRifleAKS74
  categories: [ Zona14 ]
  components:
  - type: STWeight
    self: 3.5
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/aks74.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/aks74.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/aks74.rsi
  - type: GunWieldBonus
    minAngle: -50
    maxAngle: -60
  - type: PullDoAfter
    pullTime: 3.5
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/ak.ogg
    minAngle: 50
    maxAngle: 95
    angleIncrease: 2.0
    angleDecay: 8
    projectileSpeed: 55
    fireRate: 6.5
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base545Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 4
        whitelist:
          tags:
          - Magazine545
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModuleRifleSilencerRu
      gun_module_scope:
        name: Scope
        priority: 2
        whitelist:
          tags:
          - STWeaponModuleRifleScopeRu
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
          - STCartridge545
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.45

