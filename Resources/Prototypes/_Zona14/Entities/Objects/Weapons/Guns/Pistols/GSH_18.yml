- type: entity
  name: GSh-18
  parent: Z14STBaseWeaponPistol
  id: Z14WeaponPistolGSH18
  suffix: Z14
  categories: [ Zona14 ]
  description: The GSh-18 pistol was developed in the late 1990s at the Tula Instrument Design Bureau (KBP). Its name derives from the first letters of its designers' surnames — Vasily Gryazev and Arkady Shipunov — and the number 18, indicating the original magazine capacity. It is now supplied with various magazines.
  components:
    - type: STWeight
      self: 1
    - type: Sprite
      scale: 0.8, 0.8
      sprite: _Stalker/Objects/Weapons/Guns/Pistols/gsh-18.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-0
          map: ["enum.GunVisualLayers.Mag"]
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Guns/Pistols/gsh-18.rsi
    - type: Gun
      projectileSpeed: 45
      minAngle: 8
      maxAngle: 25
      angleIncrease: 2.0
      angleDecay: 8
      fireRate: 4
      availableModes:
        - SemiAuto
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: BaseGSH-18Mag10
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 3
          whitelist:
            tags:
              - MagazineGSH-18
        gun_auto_sear:
          name: Insides
          priority: 2
          whitelist:
            tags:
              - STModuleAutoSear
        gun_chamber:
          name: Chamber
          startingItem: Z14STCartridge919PSOGJ
          priority: 1
          whitelist:
            tags:
              - STCartridge919
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot {}
        gun_auto_sear: !type:ContainerSlot {}
        gun_chamber: !type:ContainerSlot {}
    - type: Craftable
    - type: STWeaponDamageFalloff
      falloffMultiplier: 1.4
    - type: STWeaponAccuracy
      accuracyMultiplier: 1.4
