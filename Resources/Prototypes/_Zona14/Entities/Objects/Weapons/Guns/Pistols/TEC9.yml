- type: entity
  name: TEC-9
  parent: Z14STBaseWeaponPistol
  id: Z14WeaponStalkerPistolTec9
  suffix: Z14
  categories: [ Zona14 ]
  description: A semi-automatic pistol developed in Sweden in the 1980s and released to market in 1984.
  components:
  - type: STWeight
    self: 1
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/tec-9.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    projectileSpeed: 45
    minAngle: 10
    maxAngle: 35
    angleIncrease: 2.0
    angleDecay: 8
    fireRate: 5
    availableModes:
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: BaseTEC9Mag
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 3
        whitelist:
          tags:
            - MagazineTEC
      gun_auto_sear:
        name: Insides
        priority: 2
        whitelist:
          tags:
            - STModuleAutoSear
      gun_chamber:
        name: Chamber
        startingItem: Z14STCartridge919PSOGJ
        priority: 1
        whitelist:
          tags:
            - STCartridge919
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_auto_sear: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}
  - type: STWeaponDamageFalloff
    falloffMultiplier: 1.4
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.4
