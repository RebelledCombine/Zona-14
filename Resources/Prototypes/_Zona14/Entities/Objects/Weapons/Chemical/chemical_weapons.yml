- type: entity
  parent: SmokeGrenade
  id: Z14HydrocyanicGrenadeStalker
  categories: [ Zona14 ]
  name: Cyclone-B gas bomb
  description: Long-range, highly potent chemical weapon with the longest-lasting gas effect. Hydrogen cyanide is extremely toxic, causing lung damage — you'll likely die from oxygen deprivation and suffocation. Used in World War I. Stalkers found this in the CEZ, their fate unknown. Criminal groups use it for torture or execution. Not widely used due to its reportedly small area of effect.
  suffix: Z14
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Chemical/hydrocyanicgrenade.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Chemical/hydrocyanicgrenade.rsi
