##############################
#          REAGENTS          #
##############################

- type: reagent
  id: Z14ChlorineStalker
  name: reagent-name-chlorine-stalker
  group: Elements
  desc: reagent-desc-chemical-weapon
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#d2ff85"
  meltingPoint: -101.5
  boilingPoint: -34.04
  plantMetabolism:
    - !type:PlantAdjustWater
      amount: -0.5
    - !type:PlantAdjustToxins
      amount: 15
    - !type:PlantAdjustWeeds
      amount: -3
    - !type:PlantAdjustHealth
      amount: -1
  metabolisms:
    Poison:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 3
    Narcotic:
      effects:
      - !type:PopupMessage
        type: Local
        probability: 0.08
        messages: # Stalker-TODO: Localize these
        - Your eyes are burning intensely.
        - Your eye is bleeding.
        - Your eyes are starting to water.
        - You feel drowsiness and eye pain.
        - You feel dizzy.
        - Your lungs seem to stop breathing.
        - You feel an incredibly sharp pain in your stomach!
      - !type:PopupMessage
        type: Local
        visualType: MediumCaution
        probability: 0.03
        messages:
        - Your eyes feel like they're disconnecting!
        - Your eyes stop working!
        - You feel your vision deteriorating.
        - Your eyelids are twitching rapidly.
        conditions:
        - !type:ReagentCondition
          reagent: Z14ChlorineStalker
          min: 5
      - !type:Emote
        emote: STCrying
        probability: 0.1
      - !type:Emote
        emote: STScream
        probability: 0.2
      - !type:GenericStatusEffect
        key: TemporaryBlindness
        component: TemporaryBlindness
        conditions:
        - !type:ReagentCondition
          reagent: Z14ChlorineStalker
          min: 1
    Medicine:
      effects:
      - !type:Vomit
        conditions:
        - !type:ReagentCondition
          reagent: Z14ChlorineStalker
          min: 10
        probability: 0.2

