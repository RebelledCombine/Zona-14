##############################
#          WEAPONS           #
##############################

- type: entity
  parent: SmokeGrenade
  id: Z14ChlorineBalloonStalker
  categories: [ Zona14 ]
  name: chlorine cylinder
  description: Chemical weapon banned after April 29, 1997, but chlorine canisters were found in CEZ laboratories. Ignoring the ban, used in large-scale battles — quite powerful and dangerous, capable of spreading over large areas. Best to stock up on oxygen tanks and gas masks.
  suffix: Z14
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Chemical/chlorine_balloon_stalker.rsi
  - type: SmokeOnTrigger
    keysIn:
    - timer
    duration: 90
    spreadAmount: 8000
    solution:
      reagents:
      - ReagentId: Z14ChlorineStalker
        Quantity: 100
  - type: STWeight
    self: 15.5
  - type: Item
    size: Ginormous
  - type: TriggerOnUse
  - type: TimerTrigger
    delay: 1
  - type: EmitSoundOnTrigger
    keysIn:
    - timer
    sound: /Audio/Effects/smoke.ogg
  - type: DeleteOnTrigger
    keysIn:
    - timer
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/Smoke-grenade.ogg

