# MARK: Frag Grenades
- type: entity
  name: F1 grenade
  description: Also known as "Limonka". Not the ultimate weapon, but an extremely powerful one, with fragmentation as its primary damage factor.
  parent: GrenadeBase
  id: Z14FragGrenade
  categories: [ Zona14 ]
  suffix: Z14, Grenade
  components:
    - type: Explosive
      explosionType: Default
      maxIntensity: 8
      intensitySlope: 3
      totalIntensity: 120
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
    - type: ScatteringGrenade
      fillPrototype: PelletClusterLethal
      capacity: 60
    - type: ContainerContainer
      containers:
        cluster-payload: !type:Container
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo

- type: entity
  name: RGD-5 grenade
  description: A Soviet offensive hand grenade. Classified as an anti-personnel fragmentation hand grenade of the offensive type.
  parent: GrenadeBase
  id: Z14RGD5Grenade
  categories: [ Zona14 ]
  suffix: Z14, Grenade
  components:
    - type: Explosive
      explosionType: Default
      maxIntensity: 4
      intensitySlope: 2
      totalIntensity: 65
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
    - type: ScatteringGrenade
      fillPrototype: PelletClusterLethal
      capacity: 60
    - type: ContainerContainer
      containers:
        cluster-payload: !type:Container
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Grenades/rgdgrenade.rsi
      layers:
      - state: icon
        map: ["enum.TriggerVisualLayers.Base"]
    - type: GenericVisualizer
      visuals:
        enum.Trigger.TriggerVisuals.VisualState:
          enum.ConstructionVisuals.Layer:
            Primed: { state: primed }
            Unprimed: { state: icon }
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 60
        behaviors:
        - !type:TriggerBehavior
        - !type:DoActsBehavior
          acts: ["Destruction"]

# MARK: Incendiary Grenades
- type: entity
  parent: GrenadeBase
  id: Z14KhattabkaGrenade
  categories: [ Zona14 ]
  name: Khattabka grenade
  description: Not the ultimate weapon, but extremely powerful.
  suffix: Z14, Grenade
  components:
    - type: Explosive
      explosionType: Default
      maxIntensity: 10
      intensitySlope: 3.99
      totalIntensity: 10
      canCreateVacuum: false
    - type: TriggerOnUse
    - type: TimerTrigger
      delay: 2
    - type: TwoStageTrigger
      keysIn:
      - timer
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
          keysIn:
          - stageTwo
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Grenades/khatabka.rsi
      layers:
        - state: icon
          map: ["enum.TriggerVisualLayers.Base"]
# MARK: Smoke & Signal Grenades
- type: entity
  name: signal flare
  description: Calls in mortar fire with smoke rounds.
  parent: GrenadeBase
  id: Z14SignalSmoke
  categories: [ Zona14 ]
  suffix: Z14, Grenade
  components:
    - type: Sprite
      sprite: Objects/Weapons/Grenades/smoke.rsi
    - type: TimerTriggerVisuals
      primingSound:
        path: /Audio/Effects/Smoke-grenade.ogg
    - type: TriggerOnUse
    - type: TimerTrigger
      delay: 4
    - type: DeleteOnTrigger
      keysIn:
      - timer
    - type: SpawnOnTrigger
      proto: HowitzerTimedSpawnerfast


- type: entity
  parent: SmokeGrenade
  id: Z14TearGasGrenadeStalker
  suffix: Z14
  categories: [ Zona14 ]
  name: K-51 grenade
  description: A Soviet tear gas grenade. Designed not for crowd control, but for the battlefield. Inhaling the gas is highly inadvisable.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Grenades/tear_gas_stalker.rsi
  - type: SmokeOnTrigger
    duration: 30
    spreadAmount: 20
    solution:
      reagents:
      - ReagentId: TearGas
        Quantity: 100
  - type: STWeight
    self: 0.20
  - type: EmitSoundOnTrigger
    keysIn:
    - timer
    sound: /Audio/Effects/smoke.ogg
  - type: DeleteOnTrigger
    keysIn:
    - timer
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/Smoke-grenade.ogg

