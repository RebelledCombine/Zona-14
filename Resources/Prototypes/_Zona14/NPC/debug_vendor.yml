- type: entity
  parent: NPCDoll
  id: Z14NPCDebugVendor
  name: Debug Vendor
  suffix: Z14, Debug
  description: A developer-only vendor that sells every catalogued item for a single rouble. Hidden from the spawn menu.
  categories: [ HideSpawnMenu, Zona14 ]
  components:
  - type: Sprite
    sprite: _Stalker_EN/NPC/uncle.rsi
    state: unc
  - type: Physics
    bodyType: Static
  - type: Vocalizer
  - type: ActivatableUI
    key: enum.ShopUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.ShopUiKey.Key:
        type: ShopBoundUserInterface
  - type: Shop
    moneyId: Roubles
    shopPresetId: Z14DebugDevVendorPreset
  - type: TypingIndicator
    proto: robot
  - type: TTS # Corvax-TTS
    voice: TrainingRobot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Alto
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
  - type: ActiveRadio
    channels:
    - Binary
    - Common
