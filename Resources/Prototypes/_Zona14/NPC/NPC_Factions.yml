# MARK: Duty

- type: entity
  parent: NPCDoll
  id: Z14NPCDolg
  name: Sergeant Prokopenko[→   ←]
  suffix: Z14, Duty, Trader
  description: Sells good hunting gear and supplies that are very important for survival in the zone.
  components:
  - type: Sprite
    sprite: _Stalker/NPC/Groups/Dolg.rsi
    state: icon
  - type: Physics
    bodyType: Static
  - type: DatasetVocalizer
    dataset: NPCStalkerTraderAds
  - type: ActivatableUI
    key: enum.ShopUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.ShopUiKey.Key:
        type: ShopBoundUserInterface
  - type: Shop
    moneyId: Roubles
    shopPresetId: Z14DolgShopPreset
  - type: TypingIndicator
    proto: robot
  - type: TTS # Corvax-TTS
    voice: TrainingRobot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Alto
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
  - type: ActiveRadio
    channels:
    - Binary
    - Common

