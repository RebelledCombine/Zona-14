# Physical world map with server-sided, shared annotations.
- type: entity
  parent: BaseItem
  id: Z14WorldMap
  name: map of the Zone
  suffix: Z14
  categories: [ Zona14 ]
  description: A weathered paper map of the Zone. Share your land-navigation notes with others.
  components:
  - type: WorldMap
    mapTexturePath: _Zona14/WorldMap/Maps/STWorld.png # backdrop image of the map itself
    mapTitle: The Zone
    worldBounds: "-512,-512,512,512" # TODO: adjust to the real map extents once the world map is finalized
  - type: Sprite
    sprite: _Stalker/Objects/Other/Maps/kordonnorthmap.rsi
    layers:
    - state: kordonnorthmap
  - type: Item
    size: Small
  - type: ActivatableUI
    inHandsOnly: false
    singleUser: true
    key: enum.WorldMapUiKey.Key
  - type: UserInterface
    interfaces:
      enum.WorldMapUiKey.Key:
        type: WorldMapBoundUserInterface
  - type: Tag
    tags:
    - Document
