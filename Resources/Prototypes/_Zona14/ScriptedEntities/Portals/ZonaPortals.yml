#Put Zona14 portals here
#For one-way portals, the format is portal, then another portal with uncollide, portal name must be the same, and the access check is on the entrance
#For regular portals, the portal only has to be declared here once, and then the same portal is put on both ends

#Lobby Portals -> Dytiatky (tutorial zone), Rookie Village, Bar, Factions, etc.

- type: entity
  parent: MapTeleportBase
  id: Zona-Lobby-Dytiatky
  suffix: Z14
  name: Zona-Lobby-Dytiatky
  components:
    - type: NewMapTeleport
      allowAll: false
      portalName: Zona-Lobby-Dytiatky
    - type: AccessReader
      access: [["Rookie"]]
- type: entity
  parent: MapTeleportBaseUncollide
  id: Zona-Lobby-Dytiatky-Exit
  suffix: Z14
  name: Zona-Lobby-Dytiatky-Exit
  components:
    - type: NewMapTeleport
      allowAll: false
      portalName: Zona-Lobby-Dytiatky

#End of lobby portals



#Local Teleports (RV->Sidorovich bunker)

- type: entity
  parent: LocalTeleportBase
  id: Zona-RV-Sidorovich1
  suffix: Z14, Zona14, LocalTeleport
  name: Zona-RV-Sidorovich1
  components:
    - type: LocalTeleport
