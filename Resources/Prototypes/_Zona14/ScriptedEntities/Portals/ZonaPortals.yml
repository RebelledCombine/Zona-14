  name: Zona-RV-Sidorovich3
  components:
    - type: LocalTeleport
      portalName: Zona-RV-Sidorovich3

#End of local teleports


#Cross-map Teleports (teleports that can be used to travel between maps, but are not in the lobby, such as Cordon-Garbage)

- type: entity
  parent: MapTeleportBase
  id: Zona-Cordon-Garbage
  suffix: Z14
  name: Zona-Cordon-Garbage
  components:
  - type: NewMapTeleport
    portalName: Zona-Cordon-Garbage

#End of cross-map teleports
