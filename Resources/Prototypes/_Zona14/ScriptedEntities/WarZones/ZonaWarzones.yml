#Zona 14 specific warzones to be placed here

# MARK: War Zone Meta-Prototypes
# Reward of 100 points per period is a temporary placeholder until balance is finalized.

# ── Cordon ──────────────────────────────────────────────

- type: stWarZone
  id: Z14CordonRailwayCheckpoint # Zone ID. Persisted in DB, do not change.
  rewardPointsPerPeriod: 100 # Temporary placeholder until balance is finalized
  rewardPeriod: 1230 # Reward period in seconds
  captureCooldownHours: 2
  captureTime: 10 # Capture time in seconds
  requirements:
    - !type:ZoneOwnershipRequirenment
      requiredZones: []

