# MARK: War Zone Entities (place these markers on the maps)

# ── Cordon ──────────────────────────────────────────────

- type: entity
  id: Z14WarZoneEntity_CordonRailwayCheckpoint
  categories: [ Zona14 ]
  suffix: Z14
  parent: MarkerBase
  name: Cordon - Railway Checkpoint
  description: A physical marker for the Cordon Railway Checkpoint War Zone.
  components:
    - type: WarZone
      proto: Z14CordonRailwayCheckpoint
      portalName: Railway Checkpoint
    - type: Physics
      bodyType: Static
      canCollide: true
    - type: Fixtures
      fixtures:
        trigger:
          shape:
            !type:PhysShapeCircle
            radius: 5
          hard: false
          mask:
            - MobMask
          layer:
            - MidImpassable
    - type: PointLight
      enabled: true
      radius: 15
      color: Cyan
      energy: 1

