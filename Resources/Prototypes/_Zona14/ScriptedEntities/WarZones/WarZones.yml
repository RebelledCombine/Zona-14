# MARK: War Zone Meta-Prototypes
- type: stWarZone
  id: Z14KordonVillage # Zone ID. Persisted in DB, do not change.
  rewardPointsPerPeriod: 1 # Points awarded per period
  rewardPeriod: 1230 # Reward period in seconds
  captureCooldownHours: 2 # Capture cooldown in hours
  captureTime: 10 # Capture time in seconds. 30 minutes.
  requirements:
    - !type:ZoneOwnershipRequirenment
      requiredZones: [] # Zones that must be owned before this zone can be captured. Untested.

- type: stWarZone
  id: Z14SvalkaDepo
  rewardPointsPerPeriod: 1
  rewardPeriod: 1230 # Reward period in seconds
  captureCooldownHours: 96
  shouldAwardWhenDefenderPresent: true
  captureTime: 850 # Capture time in seconds.
  requirements:
  - !type:ZoneOwnershipRequirenment
    requiredZones: []
  - !type:TimeWindowRequirenment
    startHourUtc: 16 # Start hour in UTC (e.g., 10:00 UTC = 10)
    endHourUtc: 17   # End hour in UTC (e.g., 18:00 UTC = 18)

# MARK: War Zone Entities
- type: entity
  id: Z14WarZoneEntity_Kordon
  categories: [ Zona14 ]
  suffix: Z14
  parent: MarkerBase
  name: Kordon Village War Zone
  description: A physical marker for the Kordon War Zone.
  components:
    - type: WarZone # Required component. Persists zone state.
      proto: KordonVillage
      portalName: Kordon Village
    - type: Physics
      bodyType: Static
      canCollide: true
    - type: Fixtures
      fixtures:
        trigger:
          shape:
            !type:PhysShapeCircle
            radius: 3 # Capture zone radius. Leaving the zone cancels capture.
          hard: false
          mask:
            - MobMask
          layer:
            - MidImpassable
    - type: PointLight # Highlights the zone
      enabled: true
      radius: 4
      color: Cyan
      energy: 1

