# Blueprints for the T3+ suits that had no recipe. Every armour craftRecipe in the
# repo takes a blueprint as catalyzer (37 of 37), so a recipe without one would be
# the odd exception rather than a shortcut.
#
# `blueprint:` names the craftRecipe id this unlocks.

- type: entity
  parent: STBaseBlueprint
  id: Z14ClothingOuterArmorDolgPS5MBlueprint
  categories: [ Zona14 ]
  suffix: Z14
  name: PS5-M Recipe
  components:
    - type: STBlueprint
      blueprint: Z14newrecipeClothingOuterArmorDolgPS5M

