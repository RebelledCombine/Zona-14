# Recipes for T3+ suits that had none. Vendors stop at T2, so without these the
# suits are unobtainable except by loot.
#
# Formula (crafting-scheme.md §2), by SUIT tier - the Z14ArmorBaseT<n> it inherits,
# not armorClass, which is the plate tier:
#
#   T3  blueprint + ToolkitTearOne   + 2x tier-2 mats + 2x low-tier mutant drop
#   T4  blueprint + ToolkitTearTwo   + 4x tier-3 mats + 2x T2 part + 1x T3 suit
#   T5  blueprint + ToolkitTearThree + 4x tier-4 mats + 2x T3 part + 1x T4 suit + artifact
#
# INGREDIENTS COME FROM ONE TIER BELOW THE ITEM. Asking for tier-N materials to
# build a tier-N suit makes the top of the tree unreachable, because the materials
# only drop where you already need the suit to survive.
#
# Lower-tier suits are consumed as the base, so a craft reads as an UPGRADE of the
# thing you already own rather than a fresh build. T5 eats a T4, which eats a T3.
# With vendors capped at T2: buy T2 -> craft T3 -> upgrade to T4 -> upgrade to T5.
#
# Material and toolkit ids are the UPSTREAM ones on purpose - crafting matches
# ingredients by exact prototype ID and every loot table grants those. Mutant parts
# use the Z14 ids, because _Zona14 spawners are what place mutants (23:1) and the
# shops already trade in Z14 parts (385:32).

# ── T3 ──────────────────────────────────────────────

- type: craftRecipe
  id: Z14newrecipeClothingOuterArmorDolgPS5M
  resultProtos:
    - Z14ClothingOuterArmorDolgPS5M
  craftTime: 15
  items:
    Z14ClothingOuterArmorDolgPS5MBlueprint:
      amount: 1
      catalyzer: true
    ToolkitTearOne:
      amount: 1
      catalyzer: true
    STCraftSheetIronT2:
      amount: 2
    CraftHide:
      amount: 2

