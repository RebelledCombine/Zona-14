- type: craftRecipe
  id: Z14recipeFoodSTGauzeBarbaris
  resultProtos:
    - STGauzeBarbaris
  craftTime: 3
  items:
    StalkerFoodBarbarisPulb:
      amount: 1
    STGauze:
      amount: 5

# The berry pulps stay on the upstream ids, like Z14recipeFoodSTGauzeBarbaris above.
# Nothing produces the Z14 pulp clones - every mortar-and-pestle lightcraft that makes a
# pulp lives in _Stalker/LightCraftRecipes/produce.yml and grants the upstream id - so a
# Z14 ingredient here matches nothing and the whole uni-pulp -> gauze chain goes dead.
# Result ids are upstream for the same reason: identical ingredients AND identical output
# make this a harmless duplicate of the upstream recipe rather than an ambiguous one.
- type: craftRecipe
  id: Z14recipeStalkerFoodUniPulb
  resultProtos:
    - StalkerFoodUniPulb
  craftTime: 3
  items:
    StalkerFoodBarbarisPulb:
      amount: 1
    StalkerFoodGojiPulb:
      amount: 1
    StalkerFoodIrgaPulb:
      amount: 1
    StalkerFoodVolkPulb:
      amount: 1

- type: craftRecipe
  id: Z14recipeFoodSTGauzeUni
  resultProtos:
    - STGauzeUniversal
  craftTime: 3
  items:
    StalkerFoodUniPulb:
      amount: 1
    STGauze:
      amount: 5
