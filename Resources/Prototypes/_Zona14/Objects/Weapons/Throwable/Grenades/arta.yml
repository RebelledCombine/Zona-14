- type: explosion
  id: Z14Artillery
  damagePerIntensity:
    types:
      Heat: 5
      Blunt: 5
      Piercing: 5
  tileBreakChance: [0, 0, 0]
  tileBreakIntensity: [0, 0, 0]
  tileBreakRerollReduction: 20
  lightColor: Orange
  texturePath: /Textures/Effects/fire.rsi
  fireStates: 3

- type: entity
  id: Z14ArtilleryLanding
  suffix: Z14
  name: Arrival of the explosion
  categories: [ Spawner, StSkipSpawnTest, Zona14 ]
  components:
  - type: TimedDespawn
    lifetime: 3
  - type: Transform
    noRot: true
    anchored: true
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Stalker/Effects/artillery.ogg
  - type: SpawnOnDespawn
    prototype: ArtilleryExplosive

- type: entity
  name: Arrival of the explosion
  id: Z14ArtilleryExplosive
  suffix: Z14
  categories: [ Spawner, StSkipSpawnTest, Zona14 ]
  components:
  - type: TriggerOnSpawn
    keyOut: spawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Artillery
    maxIntensity: 5
    intensitySlope: 5
    totalIntensity: 120
    canCreateVacuum: false
  - type: DeleteOnTrigger
    keysIn:
    - spawn
  
- type: entity
  name: explosion
  id: Z14HowitzerExplosive
  suffix: Z14
  categories: [ Spawner, StSkipSpawnTest, Zona14 ]
  components:
  - type: TriggerOnSpawn
