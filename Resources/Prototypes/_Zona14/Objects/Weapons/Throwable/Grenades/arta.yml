- type: entity
  name: HowitzerSpawner
  id: Z14HowitzerTargetBase
  suffix: Z14
  categories: [ HideSpawnMenu, Spawner, StSkipSpawnTest, Zona14 ]
  parent: MarkerBase
  components:
    - type: Marker
    - type: Clickable
    - type: InteractionOutline
    - type: Sprite
      drawdepth: Overdoors
      sprite: Markers/cross.rsi
      state: red
    - type: RandomSpawner
      prototypes:
        - HowitzerLanding
      chance: 0.8
      offset: 13

- type: entity
  name: HowitzerSpawner
  id: Z14HowitzerTimedSpawnerIntensive
  suffix: Z14
  parent: MarkerBase
  categories: [ Spawner, StSkipSpawnTest, Zona14 ]
  components:
  - type: Sprite
    layers:
      - state: blue
  - type: Timer
  - type: TimedSpawner
    prototypes:
      - HowitzerTargetBase
    chance: 0.75
    intervalSeconds: 1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 30
  - type: TimedDespawn
    lifetime: 60

