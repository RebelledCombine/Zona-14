- type: entity
  name: Four Checkers Dynamite
  description: This is the most destructive and powerful version of explosive weapons, designed for a wide range of military and sabotage operations.
  parent: BasePlasticExplosive
  id: Z14StalkerTimerBombDynamite
  categories: [ Zona14 ]
  suffix: Z14
  components:
  - type: Item
    size: Normal
    shape:
      - 0,0,2,2
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Bombs/dynamite.rsi
    state: icon
    layers:
    - state: icon
      map: ["base"]
      scale: 0.7, 0.7
  - type: TriggerOnActivate
  - type: TriggerOnSignal
  - type: TriggerOnStuck
    keyOut: stuck
  - type: ToggleTriggerCondition # for toggling the start on stuck ability
    keys:
    - stuck
    toggleVerb: toggle-trigger-condition-stick-verb
    toggleOn: toggle-trigger-condition-stick-on
    toggleOff: toggle-trigger-condition-stick-off
  - type: TimerTrigger
    keysIn:
    - trigger
    - stuck
    delay: 1
    delayOptions: [1, 5, 10]
    initialBeepDelay: 0
    beepSound: /Audio/_Stalker/Items/Detectors/Anomaly/da_beep2.ogg
  - type: DeviceLinkSink
    ports:
      - Trigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 20
    totalIntensity: 100
    canCreateVacuum: true
  - type: ExplodeOnTrigger
    keysIn:
    - timer

- type: entity
  name: Homemade Explosive with Timer
  description: Homemade explosives on a timer, a complex design because you had to convert the anomaly detector into a timer. Be careful, it is not configured correctly.
  parent: BasePlasticExplosive
  id: Z14StalkerDistBomb
  categories: [ Zona14 ]
  suffix: Z14
  components:
  - type: Item
    size: Normal
    shape:
      - 0,0,1,1
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Bombs/distbomb.rsi
    state: icon
    layers:
    - state: icon
      map: ["base"]
      scale: 0.7, 0.7
  - type: TriggerOnActivate
  - type: TriggerOnSignal
  - type: TriggerOnStuck
    keyOut: stuck
  - type: ToggleTriggerCondition # for toggling the start on stuck ability
    keys:
    - stuck
    toggleVerb: toggle-trigger-condition-stick-verb
    toggleOn: toggle-trigger-condition-stick-on
    toggleOff: toggle-trigger-condition-stick-off
  - type: TimerTrigger
    keysIn:
    - trigger
    - stuck
    delay: 60
    delayOptions: [5, 10, 20, 30, 40, 50, 60, 120, 180, 240, 300, 360, 420, 480, 540, 600, 900, 1200, 1800, 3600]
    initialBeepDelay: 0
    beepSound: /Audio/Machines/Nuke/general_beep.ogg
  - type: DeviceLinkSink
    ports:
      - Trigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 80
    totalIntensity: 500
    canCreateVacuum: false
  - type: ExplodeOnTrigger
    keysIn:
    - timer
