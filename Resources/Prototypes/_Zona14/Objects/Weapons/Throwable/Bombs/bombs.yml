- type: entity
  name: Stick of Dynamite with Wick
  description: The Wick Stick of Dynamite is a compact weapon that can be devastating.
  parent: BaseBomb
  id: Z14DynamiteTwo
  categories: [ Zona14 ]
  suffix: Z14
  components:
    - type: STWeight
      self: 3
    - type: Item
      size: Normal
      shape:
        - 0,0,1,2
    - type: SpaceGarbage
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Bombs/dynamite2.rsi
      scale: 0.7, 0.7
      layers:
        - state: icon
    - type: FireVisuals
      sprite: _Stalker/Objects/Weapons/Bombs/dynamite2.rsi
      normalState: primed
    - type: ContainerContainer
      containers:
        cluster-payload: !type:Container
    - type: TwoStageTrigger
      triggerDelay: 0
      components:
        - type: ExplodeOnTrigger
    - type: PointLight
      enabled: false
      radius: 1.1
      color: darkorange
    - type: Damageable
      damageContainer: Inorganic
    - type: Explosive
      explosionType: Default
      maxIntensity: 10
      totalIntensity: 100
      canCreateVacuum: true
    - type: PacifismDangerousAttack
    - type: Appearance
    - type: Flammable
      fireSpread: true
      canResistFire: false
      alwaysCombustible: true
      canExtinguish: false
      damage:
        types:
          Heat: 1
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 10
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:ExplodeBehavior
    - type: Craftable

