- type: entity
  parent: STBaseWeaponShotgunUSAS
  id: Z14STWeaponShotgunAA
  categories: [ Zona14 ]
  name: AA-12
  description: Automatic Shotgun.
  suffix: Z14
  components:
    - type: STWeight
      self: 5
    - type: Clothing
      sprite: _Stalker/Objects/Weapons/Guns/Shotguns/aa12/aa12.rsi
    - type: Item
      sprite: _Stalker/Objects/Weapons/Guns/Shotguns/aa12/aa12.rsi
    - type: Sprite
      sprite: _Stalker/Objects/Weapons/Guns/Shotguns/aa12/aa12.rsi
    - type: Gun
      soundGunshot:
        path: /Audio/_Stalker/Effects/Guns/saiga_shoot.ogg
      projectileSpeed: 35
      minAngle: 60
      maxAngle: 120
      angleIncrease: 10
      angleDecay: 35
      fireRate: 4
      selectedMode: FullAuto
      availableModes:
        - SemiAuto
        - FullAuto
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: DrumAutoAssSmall
          insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
          priority: 3
          whitelist:
            tags:
              - DrumAutoAss

