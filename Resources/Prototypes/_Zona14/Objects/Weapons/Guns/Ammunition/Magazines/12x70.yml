- type: entity
  id: Z14Base1270Mag
  categories: [ Zona14 ]
  name: Saiga magazine 12x70 (5)
  description: 12x70 Saiga magazine for AK shotguns. Fraction capacity 5. They sell empty.
  parent: Base545Mag10
  suffix: Z14
  components:
  - type: STWeight
    self: 0.2
  - type: Tag
    tags:
      - MagazineSaiga
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - ShellShotgun
    capacity: 5
  - type: Item
    size: Small
    shape:
      - 0,0,0,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      storagebase: !type:Container
        ents: [ ]
      item_slot: !type:ContainerSlot { }
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/1270/Saiga/5.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: ItemSlots
    slots:
      item_slot:
        name: mop-bucket-slot-component-slot-name-item123
        ejectVerbText: mop-bucket-slot-component-eject-verb123
        whitelist:
          tags:
            - STElasticRubberRed
            - STElasticRubberGreen
            - STElasticRubberBlue
  - type: ItemMapper
    mapLayers:
      red_5:
        whitelist:
          tags:
            - STElasticRubberRed
      green_5:
        whitelist:
          tags:
            - STElasticRubberGreen
      blue_5:
        whitelist:
          tags:
            - STElasticRubberBlue
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/1270/Saiga/elastic_rubber.rsi

