- type: entity
  id: Z14BasePMMag
  categories: [ Zona14 ]
  name: 9x18 PM magazine (10)
  description: 9x18 mm magazine for PMm. Bullet capacity 10. They sell empty.
  parent: BaseItem
  suffix: Z14
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 10
  - type: Trash
    time: 900
  - type: STWeight
    self: 0.15
  - type: Tag
    tags:
      - MagazinePM
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - STCartridge918
    capacity: 10
  - type: Item
    size: Small
    shape:
      - 0,0,0,0
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      item_slot: !type:ContainerSlot { }
  - type: Appearance
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/Pistol/pistol_mag.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-1
        map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: RepositoryItem
    categoryName: Magazines

