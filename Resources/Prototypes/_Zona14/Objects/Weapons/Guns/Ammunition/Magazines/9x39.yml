- type: entity
  id: Z14Base939Mag10
  categories: [ Zona14 ]
  name: 9x39 magazine (10)
  description: 9x39 magazine for assault rifles and special sniper vintifications. Bullet capacity 10. They sell empty.
  parent: Base545Mag10
  suffix: Z14
  components:
    - type: STWeight
      self: 0.2
    - type: Tag
      tags:
        - Magazine939
    - type: BallisticAmmoProvider
      mayTransfer: true
      whitelist:
        tags:
          - STCartridge939
      capacity: 10
    - type: Item
      size: Small
      shape:
        - 0,0,0,0
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
        storagebase: !type:Container
          ents: [ ]
        item_slot: !type:ContainerSlot { }
    - type: Sprite
      scale: 0.8, 0.8
      sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/939/10.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-1
          map: ["enum.GunVisualLayers.Mag"]
    - type: MagazineVisuals
      magState: mag
      steps: 2
      zeroVisible: false
    - type: Appearance
    - type: ItemSlots
      slots:
        item_slot:
          name: mop-bucket-slot-component-slot-name-item123
          ejectVerbText: mop-bucket-slot-component-eject-verb123
          whitelist:
            tags:
              - STElasticRubberRed
              - STElasticRubberGreen
              - STElasticRubberBlue
    - type: ItemMapper
      mapLayers:
        red_10:
          whitelist:
            tags:
              - STElasticRubberRed
        green_10:
          whitelist:
            tags:
              - STElasticRubberGreen
        blue_10:
          whitelist:
            tags:
              - STElasticRubberBlue
      sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/939/elastic_rubber.rsi

