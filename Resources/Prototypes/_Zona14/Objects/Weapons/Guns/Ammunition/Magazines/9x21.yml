- type: entity
  id: Z14SR1Mag
  categories: [ Zona14 ]
  name: SR-1 magazine (18)
  description: Magazine for the SR-1 "Gyurza". 18-round capacity. Sold empty.
  parent: BaseGlockMag10
  suffix: Z14
  components:
    - type: Tag
      tags:
        - MagazineSR1
    - type: STWeight
      self: 0.2
    - type: BallisticAmmoProvider
      mayTransfer: true
      whitelist:
        tags:
          - STCartridge921
      capacity: 18
    - type: Item
      size: Small
      shape:
        - 0,0,0,0
    - type: Sprite
      scale: 0.8, 0.8
      sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/919/glock/17.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-1
          map: ["enum.GunVisualLayers.Mag"]

