  suffix: Z14
  components:
  - type: STWeight
    self: 0.1
  - type: Tag
    tags:
      - MagazineSR2M
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - STCartridge921
    capacity: 20
  - type: Item
    size: Small
    shape:
      - 0,0,0,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      item_slot: !type:ContainerSlot { }
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/919/pp-91.rsi
