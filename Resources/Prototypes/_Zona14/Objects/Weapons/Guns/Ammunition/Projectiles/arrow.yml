- type: entity
  parent: BaseArrow
  id: Z14Arrowboltrust
  categories: [ Zona14 ]
  suffix: Z14
  name: Rusty Bolt
  description: A makeshift bolt quickly assembled from a rusty nail and duct tape. Cheap but not very effective against small mutants.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/arrows.rsi
    layers:
    - state: tail
      color: white
    - state: rod
      color: darkgray
    - state: tip
      color: green
    - state: solution1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Projectile
    projectileClass: 1
    damage:
      types:
        Piercing: 10
        Mutant: 50
  - type: Construction
    graph: ImprovisedArrowUranium
    node: ImprovisedArrowUranium

