- type: entity
  id: Z14STAcidBubbles
  categories: [ Zona14 ]
  parent: STBaseToxic
  name: acid bubbles
  description: probably you shouldn't touch it, but who we are to give advises to a brave stalker?
  suffix: Z14
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Environment/acid_bubbles.rsi
      state: base
    - type: SyncSprite
    - type: STChemicalsDelivery
      reagent: Chlorine
      amount: 20
      deliverSound: /Audio/Items/hiss.ogg
      entry:
        id: STAcidicEffect
        amount: 2


- type: entity
  id: Z14STAcidCrystal
  categories: [ Zona14 ]
  parent:
    - STBaseEntity
    - BaseStructure
  suffix: Z14
  name: acid crystal
  description: toxically looking crystal
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Environment/acid_crystals.rsi
      state: base
    - type: Reflect
      reflectProb: 0.5
      reflects:
      - Energy
      spread: 75
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.45
          density: 60
          mask:
            - MachineMask
          layer:
            - MidImpassable
            - LowImpassable
            - BulletImpassable
            - Opaque
    - type: PointLight
      radius: 3
      energy: 3
      color: "#52ff39"
    - type: Damageable
      damageContainer: Inorganic
      damageModifierSet: Glass
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 80
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                collection: GlassBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                STCraftQuartzCrystalT3:
                  min: 1
                  max: 1
            - !type:DoActsBehavior
              acts: [ "Destruction" ]

- type: entity
  parent: STBaseToxic
  id: Z14STPoisonShroom
  categories: [ Zona14 ]
  name: poison shrooms
  description: looks delicios. Try to make soup from it.
  suffix: Z14
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Environment/poison_shrooms.rsi
      state: base
    - type: STChemicalsDelivery
      reagent: Ipecac
      amount: 30
      deliverSound: /Audio/Items/hiss.ogg
      entry:
        id: STAcidicEffect
        amount: 1

- type: entity
  id: Z14STToxicBarrel1
  categories: [ Zona14 ]
  suffix: Z14
  parent: STToxicBarrelBase
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Environment/toxic_barrels.rsi
    state: barrel1

- type: entity
  id: Z14STToxicBarrel2
  categories: [ Zona14 ]
  suffix: Z14
  parent: STToxicBarrelBase
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Environment/toxic_barrels.rsi
    state: barrel2

- type: entity
  name: Acid T3 Steel and Glass Trigger (20%)
  id: Z14STCraftGlassMetallT3Trigger
  categories: [ Zona14 ]
  parent: MarkerBase
  suffix: Z14
  components:
    - type: ApproachTrigger
    - type: Sprite
      layers:
        - state: blue
        - sprite: _Stalker/Objects/Environment/toxic_barrels.rsi
          state: barrel1
        - state: ai
    - type: SpawnOnApproach
      prototypes:
        - STToxicBarrel2
        - STToxicBarrel1
        - STAcidCrystal
      minAmount: 1
      maxAmount: 2
      maxOffset: 5
      minOffset: 1
      cooldown: 3600
      chance: 0.20
      timeoutOnRoll: true
      restricted:
        - STToxicBarrel2
        - STAcidCrystal
        - STToxicBarrel1
