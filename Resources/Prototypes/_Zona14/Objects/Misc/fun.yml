- type: entity
  parent: BaseDice
  id: Z14d20GoldDice
  categories: [ Zona14 ]
  name: d20
  suffix: Z14
  description: A gold die with 20 sides. The preferred die for throwing at the Game Master.
  components:
  - type: Dice
    sides: 20
    currentValue: 20
  - type: Sprite
    sprite: _Stalker/Objects/Misc/gold_dice.rsi
    state: d20_20
    noRot: true

- type: entity
  parent: BaseDice
  id: Z14GoldPercentileDie
  categories: [ Zona14 ]
  suffix: Z14
  name: Golden Percentile Die
  description: A gold die with 10 sides. Better for rolling a d100 than this gold golf ball.
  components:
  - type: Dice
    sides: 10
    multiplier: 10
    offset: 1 # first side is a 0
    currentValue: 0
  - type: Sprite
    sprite: _Stalker/Objects/Misc/gold_dice.rsi
    state: percentile_0
    noRot: true

- type: entity
  parent: DiceBag
  id: Z14GoldDiceBag
  categories: [ Zona14 ]
  name: golden bag with golden dice
  suffix: Z14
  description: Contains all the luck collected throughout the zone.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Misc/gold_dice.rsi
    state: dicebag
  - type: Storage
    grid:
    - 0,0,3,1
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: d20GoldDice
        - id: GoldPercentileDie

- type: entity
  parent: BaseDice
  id: Z14LoadedD6Dice
  categories: [ Zona14 ]
  name: d6
  description: A die with six sides. Basic and serviceable.
  suffix: Z14
  components:
  - type: Dice
    sides: 6
    currentValue: 6
  - type: Sprite
    state: d6_6
