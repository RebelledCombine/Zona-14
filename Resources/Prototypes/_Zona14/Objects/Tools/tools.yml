- type: entity
  name: saw
  parent: BaseItem
  id: Z14ChainsawStalker
  categories: [ Zona14 ]
  suffix: Z14
  description: A type of manual chainsaw equipped with an internal combustion engine, usually a two-stroke engine.
  components:
  - type: STWeight
    self: 4.5
  - type: Wieldable
    wieldSound: !type:SoundPathSpecifier
      path: /Audio/Weapons/chainsawwield.ogg
      params:
        volume: -3
  - type: Sharp
  - type: Sprite
    sprite: _Stalker/Objects/Tools/chainsaw.rsi
    state: icon
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -135
    attackRate: 4
    damage:
      types:
        Slash: 15
        Blunt: 5
        Structural: 10
    soundHit:
      path: /Audio/Weapons/chainsaw.ogg
      params:
        volume: -3
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 10
        Structural: 5
  - type: Item
    size: Normal
    sprite: _Stalker/Objects/Tools/chainsaw.rsi
  - type: DisarmMalus
  - type: RefillableSolution
    solution: Welder
  - type: SolutionContainerManager
    solutions:
      Welder:
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 300
        maxVol: 300
  - type: UseDelay
    delay: 1
  - type: Craftable
  - type: RepositoryItem
    categoryName: Tools

