- type: entity
  parent: ClothingBeltStorageStalkerBase
  id: Z14ClothingBeltMedicalStalker
  categories: [ Zona14 ]
  name: Medical Belt
  description: A portable medical belt used in combat to carry medicine.
  suffix: Z14
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Clothing/belt/medical_belt.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Clothing/belt/medical_belt.rsi
  - type: Dumpable
  - type: Storage
    maxItemSize: Large
    quickInsert: true
    areaInsert: true
    grid:
    - 0,0,2,4
    whitelist:
      tags:
        - Wrench
        - Bottle
        - Spray
        - Brutepack
        - Bloodpack
        - Gauze
        - Ointment
        - CigPack
        - PillCanister
        - DiscreteHealthAnalyzer
        - GlassBeaker
        - Syringe
        - Medkit
        - SecBeltEquip
      components:
        - Hypospray
        - Injector
        - Pill
        - Healing
  - type: Item
    size: Ginormous
    shape:
    - 0,0,2,4
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface

- type: entity
  parent: ClothingBackpackDuffelGreenStalker
