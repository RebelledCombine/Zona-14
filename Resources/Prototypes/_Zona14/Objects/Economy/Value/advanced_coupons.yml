- type: entity
  parent: BaseItem
  id: Z14PremiumSupplyTalons
  categories: [ Zona14 ]
  name: Premium Supply Coupon
  description: Institute supply coupons.
  suffix: Z14
  components:
    - type: Stack
      stackType: PremiumSupplyTalons
      count: 1
      baseLayer: base
    - type: Sprite
      sprite: _Stalker/Objects/Economy/vex.rsi
      state: green
      layers:
      - state: green
        map: ["base"]
    - type: Item
      sprite: _Stalker/Objects/Economy/vex.rsi
      size: Small
    - type: Physics
      bodyType: Dynamic
    - type: Fixtures
      fixtures:
        fix1:
          density: 30
          shape:
            !type:PhysShapeAabb
            bounds: "-0.35,-0.2,0.25,0.1"
          mask:
            - ItemMask
    - type: Appearance
