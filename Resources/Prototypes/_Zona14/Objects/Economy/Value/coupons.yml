- type: entity
  parent: BaseItem
  id: Z14SupplyTalons
  categories: [ Zona14 ]
  name: Supply Coupon
  description: Institute supply coupons.
  suffix: Z14
  components:
    - type: Stack
      stackType: SupplyTalons
      count: 1
      baseLayer: base
    - type: Sprite
      sprite: _Stalker/Objects/Economy/vex.rsi
      state: red
      layers:
      - state: red
        map: ["base"]
    - type: Item
      sprite: _Stalker/Objects/Economy/vex.rsi
      size: Small
    - type: Physics
      bodyType: Dynamic
    - type: Fixtures
      fixtures:
        fix1:
          density: 30
          shape:
            !type:PhysShapeAabb
            bounds: "-0.35,-0.2,0.25,0.1"
          mask:
            - ItemMask
    - type: Appearance
    - type: Tag
      tags:
        - SupplyTalons

- type: currency
  id: Z14SupplyTalons
  displayName: store-currency-display-supply-talons
  cash:
    1: SupplyTalons
  canWithdraw: true

- type: stack
  id: Z14SupplyTalons
  name: stack-supply-talons
  icon: { sprite: /Textures/_Stalker/Objects/Economy/vex.rsi, state: red }
  spawn: SupplyTalons

