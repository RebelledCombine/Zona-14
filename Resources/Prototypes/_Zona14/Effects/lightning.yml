- type: entity
  name: source lightning
  id: Z14SourceLightning
  suffix: Z14
  parent: ChargedLightning
  categories: [ HideSpawnMenu, Zona14 ]
  components:
    - type: Sprite
      sprite: /Textures/Effects/lightning.rsi
      drawdepth: Effects
      layers:
        - state: blue_lightning
          shader: unshaded
    - type: Electrified
      #ignoreInsulation: true # Stalker-TODO: This field does not exist!
      requirePower: false
      shockDamage: 150
      shockTime: 0
    - type: Lightning
      canArc: true
      lightningPrototype: SourceLightning
    - type: PointLight
      enabled: true
      color: "#f2fdff"
      radius: 3.5
      softness: 1
      autoRot: true
      castShadows: false

