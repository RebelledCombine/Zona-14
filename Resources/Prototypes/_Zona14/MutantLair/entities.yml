- type: entity
  id: Z14MutantLair
  parent: BaseStructure
  name: mutant lair (T1)
  description: A twisted nest of mutant biomass. Destroy it before it spawns more mutants.
  suffix: Z14
  categories: [ Zona14 ]
  components:
  - type: Sprite
    sprite: _Zona14/Structures/MutantLair/lair.rsi
    state: icon
    noRot: true
  - type: InteractionOutline
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Web
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: BlowoutTarget
  - type: Z14MutantLair
    maxMutants: 3
    maxSpawns: 12
    spawnInterval: 30
    spawnRadius: 4
    rewardCount: 2
    mutantPrototypes:
    - Z14MobMutantFleshAgressive
    - Z14MobMutantBlindDogSmall
    - Z14MobMutantBoar
    rewardPrototypes:
    - Z14MutantPartFleshEye
    - Z14MutantPartBlindDogTail
    - Z14MutantPartBoarHoof

