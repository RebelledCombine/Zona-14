name: Test Packaging

on:
  push:
    branches: [ master, staging, stable ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.git**'
      - '**.yml'
      # no docs on which one of these is supposed to work, so
      # why not just do both
      - 'RobustToolbox'
      - 'RobustToolbox/**'
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.git**'
      - '**.yml'
      - 'RobustToolbox'
      - 'RobustToolbox/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Zona14: parallel packaging smoke test. Each platform (and the client) packages on its own runner so
  # they run concurrently instead of serially, dropping wall-clock toward (build + one platform). Coverage
  # is unchanged - every platform's packaging step is still exercised on every PR. The aggregate
  # "Test Packaging" check (ci-success) waits on all shards and fails if any of them fails.
  package:
    name: Package (${{ matrix.name }})
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: win-x64,    name: server win-x64,    target: server, platform: win-x64 }
          - { id: win-arm64,  name: server win-arm64,  target: server, platform: win-arm64 }
          - { id: linux-x64,  name: server linux-x64,  target: server, platform: linux-x64 }
          - { id: linux-arm64,name: server linux-arm64,target: server, platform: linux-arm64 }
          - { id: osx-x64,    name: server osx-x64,    target: server, platform: osx-x64 }
          - { id: osx-arm64,  name: server osx-arm64,  target: server, platform: osx-arm64 }
          - { id: client,     name: client,            target: client, platform: "" }

    steps:
      - name: Checkout Master
        uses: actions/checkout@v4.2.2

      - name: Setup Submodule
        run: |
          git submodule update --init --recursive

      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5

      - name: Update Engine Submodules
        run: |
          cd RobustToolbox/
          git submodule update --init --recursive

      # ubuntu-latest has .NET 10
      # - name: Setup .NET Core
      #   uses: actions/setup-dotnet@v4.1.0
      #   with:
      #     dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install dependencies
        run: dotnet restore

      - name: Build Packaging
        run: dotnet build Content.Packaging --configuration Release --no-restore /m

      - name: Package server
        if: matrix.target == 'server'
        run: dotnet run --project Content.Packaging server --log-build --platform ${{ matrix.platform }}

      - name: Package client
        if: matrix.target == 'client'
        run: dotnet run --project Content.Packaging client --log-build --no-wipe-release

      - uses: actions/upload-artifact@v4
        with:
          name: binlogs-${{ matrix.id }}
          path: release/*.binlog
          retention-days: 7
  ci-success:
    name: Test Packaging
    if: always()
    needs:
      - package
    runs-on: ubuntu-latest
    steps:
      - name: Packaging succeeded
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: exit 0
      - name: Packaging failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
