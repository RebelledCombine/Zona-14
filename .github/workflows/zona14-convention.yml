name: Zona14 convention check

on:
  pull_request:
    paths:
      - 'Content.**'
      - 'Resources/**'
      - 'Tools/_Zona14/check-conventions.sh'
      - '.github/workflows/zona14-convention.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Zona14 convention check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run Zona14 conventions check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash Tools/_Zona14/check-conventions.sh origin/${{ github.base_ref }} HEAD
